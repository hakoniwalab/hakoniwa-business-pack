      - bodies/agilex_tracer/generated/tracer_v1.actuated.collision.xml
      - bodies/agilex_tracer/generated/tracer_v1.actuated.collision.contact.xml
      - bodies/agilex_tracer/generated/tracer_v1.minimal_world.xml
    notes:
      - Canonical MJCF and minimal-world MJCF were generated and loaded in MuJoCo.
      - Actuators, primitive collision geoms, contact excludes, and the minimal world are produced from config inputs rather than by hand-editing generated MJCF.
  visualization_artifacts:
    description: GLB assets optionally produced by the MBody forge pipeline.
    status: verified
    artifacts:
      - bodies/agilex_tracer/generated/tracer_v1.glb
      - bodies/agilex_tracer/generated/parts/*.glb
    notes:
      - forge.sh generated a single Tracer GLB and 11 split body-local GLB parts.
  pdu_artifacts:
    description: PDU artifacts used by the first rover Twist runtime smoke.
    status: verified
    artifacts:
      - config/rover-twist-pdutypes.json
      - config/rover-twist-pdudef-compact.json
      - config/endpoint/rover_twist_endpoint.json
      - config/endpoint/comm/shm_rover_twist_comm.json
    notes:
      - PDU artifacts are not prerequisites for URDF-to-MJCF validation, but they were locally verified in the downstream Twist runtime smoke.
  runtime_artifacts:
    description: Runtime-specific files needed after body conversion.
    status: partially_verified
    artifacts:
      - config/actuator/joint/agilex_tracer_left_wheel.json
      - config/actuator/joint/agilex_tracer_right_wheel.json
      - include/robots/rover/differential_drive_kinematics.hpp
      - examples/actuators/agilex_tracer/agilex-tracer-rover-example.cpp
      - examples/actuators/agilex_tracer/rover-twist-hakoniwa-asset.cpp
      - examples/actuators/agilex_tracer/send_rover_twist.py
    notes:
      - MuJoCo-only actuator smoke was verified.
      - Hakoniwa asset registration, Endpoint config, hako-cmd start flow, and geometry_msgs/Twist PDU wiring were verified as a first prototype.
      - The rover asset is not yet generic; geometry and limits still need to move from example constants to config before promotion to a reusable component pattern.

artifacts:
  - name: Tracer upstream description
    kind: source
    producer: external-upstream
    consumer:
      - hakoniwa-mbody-registry
    path: agilexrobotics/tracer_ros/tracer_description
  - name: Tracer canonical MJCF
    kind: mjcf
    producer: hakoniwa-mbody-registry
    consumer:
      - hakoniwa-mujoco-robots

missing_pieces:
  - Decide whether the generated AgileX Tracer artifacts should be committed as registry outputs or treated as validation-only artifacts.
  - Observe the Tracer minimal world in the MuJoCo viewer and confirm that the headless positive-displacement result is visually acceptable.
  - Tune primitive wheel/caster collision dimensions and robot initial height so contact behavior, visual scale, and chassis stance are all acceptable.
  - Generalize the downstream rover Hakoniwa asset so geometry, limits, asset names, and command channels are config-driven rather than Tracer example constants.
  - Add a controlled shutdown story for demos where hako-cmd stop is unavailable or unsuitable.

demo:
  objective: >
    Prove the Tracer source can be converted reproducibly into a valid MuJoCo body artifact before adding Hakoniwa runtime control.
  steps:
    - order: 1
      id: prepare_mbody_environment
      component: hakoniwa-mbody-registry
      action: Create a repository-local virtual environment and install conversion dependencies.
      command: python3 -m venv .venv && .venv/bin/python -m pip install --upgrade pip && .venv/bin/python -m pip install -r requirements.txt
    - order: 2
      id: define_tracer_source
      component: hakoniwa-mbody-registry
      action: Use sources/agilex_tracer.yaml with agilexrobotics/tracer_ros pinned to 151b53c548fe2f5d6dd67a9c1478ea340ad43f21 and entry_urdf tracer_description/urdf/tracer_v1.xacro.
    - order: 3
      id: fetch_tracer_source
      component: hakoniwa-mbody-registry
      action: Fetch tracer_description/ into the explicit generated directory so the adapter can run before forge.
      command: .venv/bin/python tools/fetch.py sources/agilex_tracer.yaml --output-dir bodies/agilex_tracer/generated
    - order: 4
      id: adapt_tracer_source
      component: hakoniwa-mbody-registry
      action: Run tools/adapt_agilex_tracer_source.py against the fetched generated directory so xacro2urdf.py sees supported local or relative paths and MuJoCo does not receive Gazebo-only plugin filename attributes.
      command: .venv/bin/python tools/adapt_agilex_tracer_source.py bodies/agilex_tracer/generated
    - order: 5
      id: forge_tracer
      component: hakoniwa-mbody-registry
      action: Run the standard forge pipeline into an explicit generated directory. If bodies/agilex_tracer/config/actuators.yaml, collision_primitives.yaml, contact_excludes.yaml, and mujoco_world.yaml are present, forge emits actuated, collision-overlaid, contact-excluded, and minimal-world MJCF files.
      command: PATH=$PWD/.venv/bin:$PATH HAKO_SKIP_FETCH=1 ./tools/forge.sh sources/agilex_tracer.yaml bodies/agilex_tracer/generated
    - order: 6
      id: inspect_generated_mjcf
      component: hakoniwa-mbody-registry
      action: Verify the generated canonical MJCF and minimal-world MJCF load and preserve credible base, wheel, joint, mesh, actuator, and inertial structure.
    - order: 7
      id: run_mujoco_only_actuator_smoke
      component: hakoniwa-mujoco-robots
      action: Build agilex-tracer-rover-example and run its non-viewer smoke check against tracer_v1.minimal_world.xml.
      command: cmake --build src/cmake-build --target agilex-tracer-rover-example && ./src/cmake-build/examples/actuators/agilex_tracer/agilex-tracer-rover-example --check
    - order: 8
      id: observe_contact_in_viewer
      component: hakoniwa-mujoco-robots
      action: Run agilex-tracer-rover-example with viewer enabled and observe wheel/contact behavior before adding Hakoniwa PDU integration.
      notes:
        - Check not only forward motion but also whether primitive collision geoms look oversized relative to visual meshes and whether the chassis visibly tilts.
    - order: 9
      id: run_twist_pdu_runtime_smoke
      component: hakoniwa-mujoco-robots
      action: Start the rover Twist plant asset, start the Python Twist sender, then issue hako-cmd start after both assets have registered.
      command: ./src/cmake-build/examples/actuators/agilex_tracer/rover-twist-hakoniwa-asset
      notes:
        - The asset opens a MuJoCo viewer by default. Use --no-viewer for headless checks.
    - order: 10
      id: run_twist_sender
      component: hakoniwa-mujoco-robots
      action: In a second terminal, register the Python sender and wait for start.
      command: python3 examples/actuators/agilex_tracer/send_rover_twist.py --linear-x 0.2 --duration-sec 3
    - order: 11
      id: start_hakoniwa_simulation
      component: hakoniwa-core-pro
      action: In a third terminal, start the already-registered Hakoniwa assets.
      command: /usr/local/hakoniwa/bin/hako-cmd start
  observability:
    success_signals:
      - forge.sh completes successfully.
      - A normalized Tracer URDF and canonical MJCF are generated.
      - Actuator-injected, collision-overlaid, contact-excluded, and minimal-world MJCF files are generated from config inputs.
      - The canonical MJCF loads without MuJoCo compiler errors.
      - The minimal-world MJCF loads with two wheel velocity actuators, primitive wheel/caster contacts, contact excludes, and a named base freejoint.
      - agilex-tracer-rover-example --check exits with check ok and positive forward displacement.
      - Viewer inspection confirms primitive collision size, robot stance, and tilt are acceptable for a demo.
      - rover-twist-hakoniwa-asset reaches WAIT START after conductor startup, asset registration, and Endpoint setup.
      - send_rover_twist.py reaches WAIT START after sender asset registration.
      - hako-cmd start creates PDU data and the asset log shows Twist command reception plus positive base x displacement.
      - DAE meshes are converted to OBJ before MuJoCo compilation.
    failure_signals:
      - Unsupported ROS-style path expressions remain.
      - Required includes or mesh assets are missing.
      - Generated wheel or body transforms are structurally incorrect.
      - MuJoCo-only smoke produces non-finite base pose or cannot bind wheel actuators.
      - Primitive collision geoms produce acceptable headless motion but are visibly oversized or distort the robot stance in the viewer.
      - Runtime smoke is started before asset registration completes.
      - hako-cmd start is issued before the plant asset and sender are both waiting for start.
      - Shared-memory access is unavailable to the runtime processes.
    fixtures:
      - No environment fixture is required for conversion-only validation.
    automation:
      - Use forge.sh instead of reconstructing the pipeline as ad-hoc one-off commands.
  verification_checks:
    lifecycle:
      - The forge process exits successfully.
    behavior:
      - Canonical MJCF opens in MuJoCo.
      - Expected Tracer base and wheel joints exist.
      - Minimal-world MJCF exposes base_freejoint, left_motor, and right_motor.
      - MuJoCo-only actuator smoke completes before Hakoniwa PDU integration is attempted and rejects non-finite or non-forward motion.
      - Hakoniwa Twist PDU smoke starts only after asset registration and confirms RoverTwistAsset/cmd_vel command reception.
    logs:
      - Forge output contains Forge complete.

expected_result: >
  A reproducible Tracer conversion path exists in which external source adaptation is
  explicit, forge.sh produces normalized URDF, OBJ-rewritten URDF, canonical MJCF,
  actuator-injected MJCF, collision-overlaid MJCF, contact-excluded MJCF,
  minimal-world MJCF, and GLB artifacts. The generated MuJoCo world loads, the
  MuJoCo-only actuator smoke check passes with positive forward displacement, and
  the first Hakoniwa geometry_msgs/Twist runtime smoke demonstrates Python PDU
  command input moving the rover.

