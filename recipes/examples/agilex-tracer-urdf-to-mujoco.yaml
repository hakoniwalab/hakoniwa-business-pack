id: agilex-tracer-urdf-to-mujoco
title: AgileX Tracer URDF to MuJoCo with MBody Registry
recipe_version: 0.1

goal:
  user_request: AgileX Tracer の公開 URDF/Xacro を箱庭の MBody Registry に取り込み、MuJoCo で利用できるロボット身体モデルへ変換したい。
  description: >
    Treat the AgileX Tracer description as an external source artifact, adapt
    ROS/package assumptions when necessary, forge normalized URDF and MuJoCo
    artifacts with hakoniwa-mbody-registry, and hand the resulting MJCF to a
    downstream Hakoniwa MuJoCo runtime.

feasibility:
  status: feasible
  confidence: high
  rationale:
    - hakoniwa-mbody-registry documents a ROS-free forge path from xacro or URDF to plain URDF and canonical MJCF.
    - forge.sh orchestrates fetch, normalization, MJCF conversion, optional actuator generation, GLB generation, optional PDU generation, and optional minimal-world composition.
    - Tracer-specific source closure and conversion were locally validated with a pinned AgileX tracer_ros revision.
    - Tracer-specific actuator mapping and minimal-world composition were locally validated as tool-chain inputs layered on the generated MJCF.
    - A first downstream Hakoniwa PDU runtime smoke was locally validated with geometry_msgs/Twist command input after the MuJoCo-only sample passed.

validation:
  status: partially_verified
  verified_at: 2026-07-22
  summary: >
    The generic MBody forge path, Tracer-specific source adaptation,
    DAE-to-OBJ preprocessing, actuator injection, primitive collision overlay,
    contact excludes, and minimal-world composition were locally validated.
    AgileX tracer_ros master at
    151b53c548fe2f5d6dd67a9c1478ea340ad43f21 was fetched, adapted for
    ROS-free xacro processing, forged into URDF, MJCF, GLB, actuated MJCF, and
    a MuJoCo minimal world. The generated canonical and minimal-world MJCF files
    loaded successfully in MuJoCo, a MuJoCo-only C++ actuator smoke check
    completed, and a first Hakoniwa geometry_msgs/Twist PDU runtime smoke
    advanced the Tracer base through the rover asset prototype.
  steps:
    - id: mbody_forge_pipeline
      status: verified
      evidence:
        - repository: hakoniwalab/hakoniwa-mbody-registry
          path: tools/forge.sh
          revision: main
      notes:
        - forge.sh is the authoritative conversion orchestrator.
    - id: ros_free_source_guard
      status: verified
      evidence:
        - repository: hakoniwalab/hakoniwa-mbody-registry
          path: tools/xacro2urdf.py
          revision: main
      notes:
        - Unsupported ROS-style $(find ...) expressions must be adapted before conversion.
    - id: tracer_conversion
      status: verified
      evidence:
        - repository: agilexrobotics/tracer_ros
          path: tracer_description/urdf/tracer_v1.xacro
          revision: 151b53c548fe2f5d6dd67a9c1478ea340ad43f21
        - repository: hakoniwalab/hakoniwa-mbody-registry
          path: sources/agilex_tracer.yaml
          revision: local-validation-2026-07-22
        - repository: hakoniwalab/hakoniwa-mbody-registry
          path: tools/adapt_agilex_tracer_source.py
          revision: local-validation-2026-07-22
        - repository: hakoniwalab/hakoniwa-mbody-registry
          path: bodies/agilex_tracer/generated/tracer_v1.xml
          revision: local-validation-2026-07-22
      notes:
        - Entry file is tracer_description/urdf/tracer_v1.xacro.
        - Fetch closure is tracer_description/ from agilexrobotics/tracer_ros.
        - Adapter removes ROS-style xacro include paths, removes the Gazebo include from the MuJoCo conversion path, and rewrites package mesh URIs to relative paths.
        - forge.sh converted 4 DAE mesh files to OBJ, rewrote 18 URDF mesh references, generated tracer_v1.xml and GLB artifacts, and printed Forge complete.
    - id: tracer_mujoco_load
      status: verified
      evidence:
        - repository: hakoniwalab/hakoniwa-mbody-registry
          path: bodies/agilex_tracer/generated/tracer_v1.xml
          revision: local-validation-2026-07-22
      notes:
        - mujoco.MjModel.from_xml_path loaded tracer_v1.xml successfully.
        - Loaded model summary was nbody=13, njnt=10, ngeom=18, nmesh=4, nu=0.
        - Expected wheel/castor joints are present in the canonical MJCF.
    - id: tracer_actuator_world_composition
      status: verified
      evidence:
        - repository: hakoniwalab/hakoniwa-mbody-registry
          path: bodies/agilex_tracer/config/actuators.yaml
          revision: local-validation-2026-07-22
        - repository: hakoniwalab/hakoniwa-mbody-registry
          path: bodies/agilex_tracer/config/mujoco_world.yaml
          revision: local-validation-2026-07-22
        - repository: hakoniwalab/hakoniwa-mbody-registry
          path: bodies/agilex_tracer/generated/tracer_v1.actuated.xml
          revision: local-validation-2026-07-22
        - repository: hakoniwalab/hakoniwa-mbody-registry
          path: bodies/agilex_tracer/generated/tracer_v1.minimal_world.xml
          revision: local-validation-2026-07-22
      notes:
        - forge.sh applied 2 velocity actuators from actuators.yaml to left_wheel and right_wheel.
        - As-is mesh contact produced internal base/caster contacts and poor wheel-driven translation, so collision_primitives.yaml and contact_excludes.yaml were added as tool-chain inputs.
        - Viewer inspection later showed that the initial 0.082m drive-wheel collision cylinders were visibly larger than the visual wheel mesh radius of about 0.0605m. The drive wheel collision radius was then tuned to 0.0605m and robot initial z to 0.1425. Treat these primitives as tuning inputs that still require visual scale, stance, and tilt validation.
        - mjcf_compose_world.py composed a ground plane, camera, light, named base_freejoint, copied actuators, and copied contact excludes into tracer_v1.minimal_world.xml.
        - MuJoCo loaded tracer_v1.minimal_world.xml with nbody=13, njnt=11, ngeom=25, nu=2, nexclude=10.
        - Recognized actuators were left_motor and right_motor.
    - id: tracer_mujoco_only_actuator_smoke
      status: verified
      evidence:
        - repository: hakoniwalab/hakoniwa-mujoco-robots
          path: examples/actuators/agilex_tracer/agilex-tracer-rover-example.cpp
          revision: local-validation-2026-07-22
        - repository: hakoniwalab/hakoniwa-mujoco-robots
          path: config/actuator/joint/agilex_tracer_left_wheel.json
          revision: local-validation-2026-07-22
        - repository: hakoniwalab/hakoniwa-mujoco-robots
          path: config/actuator/joint/agilex_tracer_right_wheel.json
          revision: local-validation-2026-07-22
      notes:
        - CMake target agilex-tracer-rover-example built successfully.
        - Non-viewer --check loaded the minimal world, bound both JointActuatorImpl configs, applied Twist-like linear.x/angular.z wheel targets, advanced simulation for 1 second, and exited with check ok.
        - The smoke check verifies finite actuator/world execution and positive forward displacement for a positive linear.x command.
        - Headless smoke result after visual-scale primitive collision/contact tuning was base=(0.055, 0.000, 0.142), wheel_target=(-2.439, 2.439), wheel_qvel=(-1.525, 1.531).
    - id: tracer_twist_pdu_runtime_smoke
      status: verified
      evidence:
        - repository: hakoniwalab/hakoniwa-mujoco-robots
          path: include/robots/rover/differential_drive_kinematics.hpp
          revision: local-validation-2026-07-22
        - repository: hakoniwalab/hakoniwa-mujoco-robots
          path: examples/actuators/agilex_tracer/rover-twist-hakoniwa-asset.cpp
          revision: local-validation-2026-07-22
        - repository: hakoniwalab/hakoniwa-mujoco-robots
          path: examples/actuators/agilex_tracer/send_rover_twist.py
          revision: local-validation-2026-07-22
        - repository: hakoniwalab/hakoniwa-mujoco-robots
          path: config/rover-twist-pdudef-compact.json
          revision: local-validation-2026-07-22
        - repository: hakoniwalab/hakoniwa-mujoco-robots
          path: config/endpoint/rover_twist_endpoint.json
          revision: local-validation-2026-07-22
      notes:
        - rover-twist-hakoniwa-asset starts the conductor, registers RoverTwistAsset, opens the rover_twist_endpoint, and waits for hako-cmd start.
        - The asset opens a MuJoCo viewer by default so the Hakoniwa PDU-driven rover motion is visible; --no-viewer keeps the previous headless mode for restricted environments.
        - Both the MuJoCo-only sample and Hakoniwa asset use include/robots/rover/differential_drive_kinematics.hpp for the Twist-like linear.x/angular.z to left/right wheel velocity conversion.
        - send_rover_twist.py registers RoverTwistSender and writes geometry_msgs/Twist to RoverTwistAsset/cmd_vel after start.
        - The verified runtime order was start the asset program, start the Python sender, then run /usr/local/hakoniwa/bin/hako-cmd start.
        - The asset log after visual-scale collision tuning showed cmd=(0.200, 0.000), wheel=(-2.439, 2.439), and base x progressing from 0.000m to 0.300m.
        - Shared-memory runtime commands had to run outside the Codex sandbox in the local validation environment.

constraints:
  - no-ros-runtime
  - single-pc
  - source-adaptation-may-be-required
  - dae-mesh-preconversion-required
  - conversion-and-runtime-are-separate-stages
  - prefer-tool-chain-inputs-over-hand-maintained-mjcf-forks

target_environment:
  required_for: executable-demo
  status: partially_known
  os: macOS | Linux
  architecture: arm64 | x86_64
  execution_mode: native
  runtimes:
    - name: Python
      required: true
      version: "3"
      path: unknown
    - name: MuJoCo
      required: true
      version: unknown
      path: unknown
  hakoniwa:
    install_prefix: /usr/local/hakoniwa
    components_built:
      - hakoniwa-mbody-registry
      - hakoniwa-mujoco-robots
  notes:
    - Use a repository-local Python virtual environment for the MBody toolchain.

execution_environment:
  required_for: executable-demo
  status: partially_known
  gui:
    required: true
    status: unknown
  shared_memory:
    required: true
    access: required-for-hakoniwa-runtime
  python:
    environment: venv
    hakopy_available: not-required-for-conversion
  hakoniwa:
    install_prefix: /usr/local/hakoniwa
    hako_cmd_access: unknown
  notes:
    - MBody conversion itself does not require Hakoniwa shared memory or hako-cmd.
    - Hakoniwa PDU runtime validation requires shared memory access and /usr/local/hakoniwa/bin/hako-cmd start after assets are registered.

components:
  - id: hakoniwa-mbody-registry
    roles:
      - registry
      - asset_generator
      - data_model
    purpose: Convert the externally supplied Tracer description into normalized robot-body artifacts.
  - id: hakoniwa-mujoco-robots
    roles:
      - physics_runtime
    purpose: Consume the generated Tracer MJCF in the downstream simulation stage.

connections:
  - from: hakoniwa-mbody-registry
    to: hakoniwa-mujoco-robots
    interface: generated-artifact
    data:
      - canonical Tracer MJCF
      - optional actuated Tracer MJCF
      - optional minimal MuJoCo world
    contract:
      status: partially_verified
      requires:
        - Successful Tracer forge output.
        - Runtime-specific actuator and control configuration when motion is required.
        - A downstream runner configuration that references the generated artifacts.
      validation_notes:
        - Generated tracer_v1.xml loaded successfully in MuJoCo.
        - Successful forge and model loading do not by themselves verify runtime control or Hakoniwa PDU wiring.
    notes: Runtime wiring belongs to the downstream MuJoCo integration layer.

data_flow:
  summary: >
    External Tracer source files are fetched and adapted outside the component graph,
    then passed into hakoniwa-mbody-registry. The generated MJCF is subsequently
    consumed by hakoniwa-mujoco-robots.
  steps:
    - from: external-tracer-source
      to: hakoniwa-mbody-registry-fetch
      data:
        - xacro or URDF
        - included description files
        - mesh assets
      description: Sparse-fetch tracer_description/ from the pinned AgileX tracer_ros revision.
    - from: hakoniwa-mbody-registry-fetch
      to: source-adapter
      data:
        - fetched source tree
      description: Resolve ROS/package assumptions and make the source usable in the fetched local tree.
    - from: source-adapter
      to: hakoniwa-mbody-registry
      data:
        - adapted entry URDF or Xacro
      description: Feed the adapted source into the standard forge pipeline with DAE-to-OBJ preprocessing enabled.
    - from: hakoniwa-mbody-registry
      to: hakoniwa-mujoco-robots
      data:
        - generated MJCF
        - generated actuated MJCF
        - generated minimal-world MJCF
      description: Hand generated artifacts to the runtime without hand-maintaining a fork of the generated MJCF.
    - from: hakoniwa-mbody-registry
      to: hakoniwa-mujoco-robots-mujoco-only-sample
      data:
        - tracer_v1.minimal_world.xml
        - left and right wheel actuator JSON bindings
      description: Validate MuJoCo-only actuator binding and finite simulation before Hakoniwa PDU integration.
    - from: python-rover-twist-sender
      to: hakoniwa-mujoco-robots-rover-asset
      data:
        - geometry_msgs/Twist
      description: >
        After the plant asset and sender have registered and hako-cmd start is
        issued, send AI-friendly linear.x/angular.z command input to the rover
        asset through RoverTwistAsset/cmd_vel.

time_model:
  mode: unknown
  components:
    - hakoniwa-mujoco-robots
  notes:
    - No simulation time model is required for source adaptation or MBody conversion.
    - The runtime time model is validated in the downstream composition.

