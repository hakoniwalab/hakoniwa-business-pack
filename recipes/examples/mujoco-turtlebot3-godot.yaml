id: mujoco-turtlebot3-godot
title: MuJoCo TurtleBot3 with Godot Visualization
recipe_version: 0.1

goal:
  user_request: ROSを使わず、MuJoCoでTurtleBot3を動かして、Godotで3D表示したい
  description: >
    Simulate TurtleBot3 with MuJoCo and visualize its robot state in Godot using
    existing Hakoniwa PDU, endpoint, and robot sync artifacts without requiring a
    ROS runtime.

feasibility:
  status: feasible
  confidence: medium
  rationale:
    - hakoniwa-mbody-registry contains TurtleBot3 Burger and Waffle registry sources that generate URDF, MJCF, minimal MuJoCo world, GLB, GLB parts, and PDU definitions.
    - hakoniwa-mbody-registry also contains a legacy TurtleBot3 Godot reference scene and robot_sync.profile.json that can guide the visualization leg.
    - hakoniwa-mujoco-robots contains TurtleBot3 MuJoCo simulator targets for the standard TB3 model, MBody Burger, and MBody Waffle, with route-demo control that does not require a joystick.
    - hakoniwa-godot already contains examples/mujoco config using robot_sync.profile.json and endpoint_shm_poll_with_pdu.json.
    - The MuJoCo-side and Godot-side TB3 pdutypes define the same robot-state PDU names and types needed for sync.
    - Composition confidence is medium because the MBody-to-MuJoCo runtime path is partially verified for Burger and Waffle, while the Godot visualization leg is still not end-to-end verified.

validation:
  status: partially_verified
  summary: >
    The TurtleBot3 Burger and Waffle MBody forge paths and MuJoCo runtime demos
    were tested on macOS arm64. Godot visualization is still not verified
    end-to-end, so this recipe remains partially verified.
  steps:
    - id: mbody_burger_forge
      status: verified
      evidence:
        - repository: hakoniwalab/hakoniwa-mbody-registry
          path: bodies/turtlebot3_burger/generated
          revision: local-validation-2026-07-19
      notes:
        - forge.sh generated TurtleBot3 Burger URDF, MJCF, actuated MJCF, minimal MuJoCo world, GLB, GLB parts, and PDU definitions.
    - id: mbody_waffle_forge
      status: verified
      evidence:
        - repository: hakoniwalab/hakoniwa-mbody-registry
          path: bodies/turtlebot3_waffle/generated
          revision: local-validation-2026-07-19
      notes:
        - forge.sh generated TurtleBot3 Waffle URDF, MJCF, actuated MJCF, minimal MuJoCo world, GLB, GLB parts, and PDU definitions.
        - Waffle physics MJCF generation uses visual discard for MuJoCo compatibility, while GLB generation keeps the visual path.
    - id: mujoco_burger_runtime_route_demo
      status: verified
      evidence:
        - repository: hakoniwalab/hakoniwa-mujoco-robots
          path: src/main_for_sample/tb3
          revision: local-validation-2026-07-19
        - repository: hakoniwalab/hakoniwa-mujoco-robots
          path: python/tb3_route_demo.py
          revision: local-validation-2026-07-19
      notes:
        - tb3_sim_burger loaded the MBody Burger asset manifest and moved through joystick-free route-demo PDU commands.
    - id: mujoco_waffle_runtime_route_demo
      status: verified
      evidence:
        - repository: hakoniwalab/hakoniwa-mujoco-robots
          path: src/main_for_sample/tb3
          revision: local-validation-2026-07-19
        - repository: hakoniwalab/hakoniwa-mujoco-robots
          path: python/tb3_route_demo.py
          revision: local-validation-2026-07-19
      notes:
        - tb3_sim_waffle loaded the MBody Waffle asset manifest and moved through joystick-free route-demo PDU commands.
    - id: joystick_free_motion
      status: verified
      evidence:
        - repository: hakoniwalab/hakoniwa-mujoco-robots
          path: python/tb3_route_demo.py
          revision: local-validation-2026-07-19
      notes:
        - tb3_route_demo.py provides direct programmatic motion commands and removes the joystick requirement for the minimal demo.
    - id: godot_visualization
      status: not_tested
      evidence: []
      notes:
        - Godot was intentionally out of scope for the first validation pass.

constraints:
  - no-ros-runtime
  - single-pc
  - shared-memory-pdu
  - visualization-polling

target_environment:
  required_for: executable-demo
  status: required
  os: unknown
  os_version: unknown
  architecture: unknown
  execution_mode: native
  runtimes:
    - name: Godot
      required: true
      version: unknown
      path: unknown
    - name: MuJoCo
      required: true
      version: unknown
      path: unknown
    - name: Python
      required: true
      version: unknown
      path: unknown
  hakoniwa:
    install_prefix: /usr/local/hakoniwa
    components_built:
      - hakoniwa-core-pro
      - hakoniwa-pdu-endpoint
      - hakoniwa-mujoco-robots
      - hakoniwa-godot
  notes:
    - This recipe is structurally feasible, but executable runbook commands require target machine details.
    - Ask for OS, architecture, Godot binary path, MuJoCo installation, and build/install state before claiming runtime verification.

execution_environment:
  required_for: executable-demo
  status: partially_recorded
  os: macOS
  os_version: unknown
  architecture: arm64
  execution_mode: native
  gui:
    required: true
    status: available
  shared_memory:
    required: true
    access: requires-unsandboxed-command
  devices:
    - name: joystick
      required: false
      available: unknown
  python:
    environment: venv
    hakopy_available: true
  hakoniwa:
    install_prefix: /usr/local/hakoniwa
    hako_cmd_access: requires-unsandboxed-command
  notes:
    - hako-cmd and Hakoniwa shared memory require an execution environment where the Hakoniwa master is visible.
    - tb3_route_demo.py provides a joystick-free command source for reproducible minimal demos.

components:
  - id: hakoniwa-mbody-registry
    roles:
      - asset_generator
      - visualization_asset_source
    purpose: Generate and provide TurtleBot3 MJCF, GLB parts, Godot scene, endpoint config, PDU definition, and robot sync profile.

  - id: hakoniwa-mujoco-robots
    roles:
      - physics_runtime
      - simulation_core
    purpose: Run the TurtleBot3 MuJoCo physics simulation and publish robot state PDUs.

  - id: hakoniwa-pdu-endpoint
    roles:
      - communication_infrastructure
      - integration_boundary
    purpose: Provide SHM poll endpoint configuration and PDU send/receive semantics between MuJoCo and Godot.

  - id: hakoniwa-pdu-registry
    roles:
      - data_model
      - registry
    purpose: Provide canonical PDU type contracts for geometry_msgs/Twist and sensor_msgs/JointState.

  - id: hakoniwa-godot
    roles:
      - visualizer
      - integration_boundary
    purpose: Consume robot_sync.profile.json and endpoint config to update the TurtleBot3 Godot model from PDU state.

  - id: hakoniwa-core-pro
    roles:
      - simulation_core
      - time_sync
    purpose: Provide Hakoniwa runtime, hako-cmd lifecycle control, shared memory, and simulation time base.

connections:
  - from: hakoniwa-mbody-registry
    to: hakoniwa-mujoco-robots
    interface: generated-artifact
    data:
      - turtlebot3_burger.minimal_world.xml
      - turtlebot3_waffle.minimal_world.xml
      - turtlebot3_burger.actuated.xml
      - turtlebot3_waffle.actuated.xml
      - pdutypes.json
      - pdu_def.json
    contract:
      status: partially_verified
      requires:
        - mujoco-world-composition
        - runtime-specific-actuator-settings
        - asset-manifest-compatible-with-mujoco-robots
      validation_notes:
        - MBody generated Burger and Waffle runtime artifacts including minimal MuJoCo worlds and PDU definitions.
        - MuJoCo Robots loaded Burger and Waffle asset manifests and ran route-demo motion.
        - This connection is not marked fully verified for the Godot recipe until the generated runtime state is consumed by Godot.
    notes: MBody-generated runtime artifacts define the physical model and communication contract consumed by MuJoCo-side demos.

  - from: hakoniwa-mbody-registry
    to: hakoniwa-godot
    interface: generated-artifact
    data:
      - TurtleBot3.generated.tscn
      - robot_sync.profile.json
      - GLB parts
    contract:
      status: partially_verified
      requires:
        - generated-godot-scene
        - robot-sync-profile
        - endpoint-config-compatible-with-runtime
      validation_notes:
        - Burger and Waffle GLB and GLB parts are generated.
        - Godot runtime consumption was not included in the validation pass.
    notes: Godot robot sync consumes the generated scene/profile/config artifacts.

  - from: hakoniwa-mujoco-robots
    to: hakoniwa-pdu-endpoint
    interface: pdu
    data:
      - TB3/base_link_pos
      - TB3/joint_states
    contract:
      status: partially_verified
      requires:
        - hakoniwa-shared-memory-access
        - tb3-pdu-definition
        - hako-cmd-start
      validation_notes:
        - tb3_sim created PDU channels and advanced simulation after hako-cmd start.
        - State publishing was not consumed by Godot in this validation pass.
    notes: tb3_sim publishes robot pose and joint states through the TB3 endpoint.

  - from: hakoniwa-pdu-endpoint
    to: hakoniwa-godot
    interface: pdu
    data:
      - TB3/base_link_pos
      - TB3/joint_states
    contract:
      status: not_tested
      requires:
        - godot-runtime
        - shm-poll-endpoint-config
        - robot-sync-profile-compatible-with-pdu-names
      validation_notes:
        - The PDU-to-Godot connection remains a planned validation step.
    notes: Godot examples/mujoco uses SHM poll endpoint config and robot_sync.profile.json to receive and apply robot state.

  - from: hakoniwa-core-pro
    to: hakoniwa-mujoco-robots
    interface: command
    data:
      - hako-cmd start
    contract:
      status: verified
      requires:
        - hakoniwa-runtime-installed
        - unsandboxed-shared-memory-access
      validation_notes:
        - hako-cmd start succeeded outside the managed sandbox and created PDU shared memory.
        - The same command failed inside the sandbox because the Hakoniwa master was not visible.
    notes: The MuJoCo TurtleBot3 quick start uses hako-cmd to start the simulation.

data_flow:
  summary: >
    TurtleBot3 state is produced by the MuJoCo simulator as Hakoniwa PDU data.
    Godot receives base pose and joint states through an SHM poll endpoint and
    applies them to the generated TurtleBot3 scene nodes.
  steps:
    - from: hakoniwa-mbody-registry
      to: hakoniwa-mujoco-robots
      data:
        - MJCF robot model
        - PDU definition
      description: Robot body and PDU config artifacts establish the MuJoCo runtime inputs.
    - from: hakoniwa-mbody-registry
      to: hakoniwa-godot
      data:
        - Godot scene
        - robot_sync.profile.json
      description: Generated visual assets and profile map PDU names to Godot node paths.
    - from: hakoniwa-mujoco-robots
      to: hakoniwa-godot
      data:
        - base_link_pos
        - joint_states
      description: Runtime state flows as PDU through endpoint SHM poll communication.

time_model:
  mode: visualization-polling
  components:
    - hakoniwa-core-pro
    - hakoniwa-mujoco-robots
    - hakoniwa-godot
  notes:
    - MuJoCo participates in the Hakoniwa runtime and starts via hako-cmd.
    - Godot robot sync uses poll behavior and applies latest state in the Godot loop.
    - Enable HakoniwaSimNode physics time synchronization only if the demo needs Godot physics to advance under Hakoniwa world time.
    - conductor-light is not required for the minimal visualization path, but can be considered if strict multi-asset virtual-time coordination is needed.

artifact_sets:
  physics_artifacts:
    description: Inputs consumed by the MuJoCo physics runtime.
    status: partially_verified
    artifacts:
      - turtlebot3_burger.minimal_world.xml
      - turtlebot3_waffle.minimal_world.xml
      - turtlebot3_burger.actuated.xml
      - turtlebot3_waffle.actuated.xml
      - tb3-mbody-burger-asset.json
      - tb3-mbody-waffle-asset.json
    notes:
      - Burger and Waffle both ran in MuJoCo Robots using MBody-derived asset manifests.
      - Waffle physics MJCF uses visual discard because some URDF visual meshes are not accepted by the MuJoCo compiler.
      - This set verifies the physics/runtime path, not the Godot visualization path.
  visualization_artifacts:
    description: Inputs consumed by Godot or another 3D viewer.
    status: partially_verified
    artifacts:
      - turtlebot3_burger.glb
      - turtlebot3_waffle.glb
      - Burger GLB parts
      - Waffle GLB parts
      - TurtleBot3.generated.tscn
    notes:
      - Burger and Waffle GLB generation is verified.
      - Godot consumption of the generated scene and GLB parts remains not tested in this recipe.
      - Visualization artifacts may preserve meshes that are discarded from the MuJoCo physics MJCF.
  pdu_artifacts:
    description: PDU definitions, endpoint configs, and robot sync profiles.
    status: partially_verified
    artifacts:
      - pdu_def.json
      - pdutypes.json
      - endpoint_shm_poll_with_pdu.json
      - robot_sync.profile.json
      - tb3-pdutypes.json
    notes:
      - MBody PDU generation is verified for Burger and Waffle.
      - MuJoCo route demos use Hakoniwa PDU commands.
      - Godot-side endpoint config and robot sync profile are based on existing reference artifacts and remain not tested against the new Burger/Waffle registry outputs.
  runtime_artifacts:
    description: Commands and runtime targets needed to run the minimal demo.
    status: partially_verified
    artifacts:
      - tb3_sim_burger
      - tb3_sim_waffle
      - tb3_route_demo.py
      - hako-cmd start
    notes:
      - Burger and Waffle route demos are verified without a joystick.
      - Godot launch and sync verification remain future validation steps.

artifacts:
  - name: turtlebot3_burger.minimal_world.xml
    kind: mjcf
    producer: hakoniwa-mbody-registry
    consumer:
      - hakoniwa-mujoco-robots
    path: bodies/turtlebot3_burger/generated/turtlebot3_burger.minimal_world.xml

  - name: turtlebot3_waffle.minimal_world.xml
    kind: mjcf
    producer: hakoniwa-mbody-registry
    consumer:
      - hakoniwa-mujoco-robots
    path: bodies/turtlebot3_waffle/generated/turtlebot3_waffle.minimal_world.xml

  - name: turtlebot3_burger.actuated.xml
    kind: mjcf
    producer: hakoniwa-mbody-registry
    consumer:
      - hakoniwa-mujoco-robots
    path: bodies/turtlebot3_burger/generated/turtlebot3_burger.actuated.xml

  - name: turtlebot3_waffle.actuated.xml
    kind: mjcf
    producer: hakoniwa-mbody-registry
    consumer:
      - hakoniwa-mujoco-robots
    path: bodies/turtlebot3_waffle/generated/turtlebot3_waffle.actuated.xml

  - name: tb3-mbody-burger-asset.json
    kind: source
    producer: hakoniwa-mujoco-robots
    consumer:
      - hakoniwa-mujoco-robots
    path: config/assets/tb3-mbody-burger-asset.json

  - name: tb3-mbody-waffle-asset.json
    kind: source
    producer: hakoniwa-mujoco-robots
    consumer:
      - hakoniwa-mujoco-robots
    path: config/assets/tb3-mbody-waffle-asset.json

  - name: TurtleBot3.generated.tscn
    kind: godot-scene
    producer: hakoniwa-mbody-registry
    consumer:
      - hakoniwa-godot
    path: bodies/turtlebot3/godot_tb3_reference/TurtleBot3.generated.tscn

  - name: turtlebot3_burger.glb
    kind: glb
    producer: hakoniwa-mbody-registry
    consumer:
      - hakoniwa-godot
    path: bodies/turtlebot3_burger/generated/turtlebot3_burger.glb

  - name: turtlebot3_waffle.glb
    kind: glb
    producer: hakoniwa-mbody-registry
    consumer:
      - hakoniwa-godot
    path: bodies/turtlebot3_waffle/generated/turtlebot3_waffle.glb

  - name: Burger GLB parts
    kind: glb
    producer: hakoniwa-mbody-registry
    consumer:
      - hakoniwa-godot
    path: bodies/turtlebot3_burger/generated/parts

  - name: Waffle GLB parts
    kind: glb
    producer: hakoniwa-mbody-registry
    consumer:
      - hakoniwa-godot
    path: bodies/turtlebot3_waffle/generated/parts

  - name: robot_sync.profile.json
    kind: profile
    producer: hakoniwa-mbody-registry
    consumer:
      - hakoniwa-godot
    path: bodies/turtlebot3/generated/godot/robot_sync.profile.json

  - name: endpoint_shm_poll_with_pdu.json
    kind: endpoint-config
    producer: hakoniwa-godot
    consumer:
      - hakoniwa-pdu-endpoint
      - hakoniwa-godot
    path: examples/mujoco/config/endpoint_shm_poll_with_pdu.json

  - name: tb3-pdutypes.json
    kind: pdu-definition
    producer: hakoniwa-mujoco-robots
    consumer:
      - hakoniwa-pdu-endpoint
      - hakoniwa-godot
      - hakoniwa-mujoco-robots
    path: config/tb3-pdutypes.json

missing_pieces:
  - Confirm whether the current Godot examples/mujoco directory is a complete runnable Godot project or a reusable config/assets bundle for another project.
  - Confirm exact Godot run command for the MuJoCo TurtleBot3 sync scene.
  - Confirm whether Burger/Waffle-specific robot_sync.profile.json and endpoint config should be generated or adapted from the existing TurtleBot3 reference artifacts.
  - Validate the demo end-to-end on the target machine after builds are available.

demo:
  objective: Display a MuJoCo-simulated TurtleBot3 moving synchronously in Godot using existing TB3 PDU state.
  steps:
    - order: 1
      component: hakoniwa-mbody-registry
      action: Verify or regenerate TurtleBot3 Burger physics, visualization, and PDU artifacts.
      command: ./tools/forge.sh sources/turtlebot3_burger.yaml turtlebot3_description/urdf/turtlebot3_burger.urdf
      evidence:
        - repository: hakoniwalab/hakoniwa-mbody-registry
          path: bodies/turtlebot3_burger/generated
          revision: local-validation-2026-07-19

    - order: 2
      component: hakoniwa-mbody-registry
      action: Verify or regenerate TurtleBot3 Waffle physics, visualization, and PDU artifacts.
      command: ./tools/forge.sh sources/turtlebot3_waffle.yaml turtlebot3_description/urdf/turtlebot3_waffle.urdf
      evidence:
        - repository: hakoniwalab/hakoniwa-mbody-registry
          path: bodies/turtlebot3_waffle/generated
          revision: local-validation-2026-07-19

    - order: 3
      component: hakoniwa-mujoco-robots
      action: Start the MBody TurtleBot3 Burger or Waffle MuJoCo simulator.
      command: ./src/cmake-build/main_for_sample/tb3/tb3_sim_burger
      evidence:
        - repository: hakoniwalab/hakoniwa-mujoco-robots
          path: src/main_for_sample/tb3
          revision: local-validation-2026-07-19
        - repository: hakoniwalab/hakoniwa-mujoco-robots
          path: config/assets/tb3-mbody-burger-asset.json
          revision: local-validation-2026-07-19

    - order: 4
      component: hakoniwa-godot
      action: Start a Godot project that includes the Hakoniwa addon, generated TurtleBot3 scene, robot_sync.profile.json, and endpoint SHM poll config.
      command: <GODOT_BIN> --path <godot-project-with-examples-mujoco-assets>
      evidence:
        - repository: hakoniwalab/hakoniwa-godot
          path: examples/mujoco
          revision: 8f5d7d1765b319f107420f8ac4f87b24ab26ae76

    - order: 5
      component: hakoniwa-core-pro
      action: Start the Hakoniwa simulation.
      command: hako-cmd start
      evidence:
        - repository: hakoniwalab/hakoniwa-mujoco-robots
          path: README.md
          revision: a38f7b00ce49257f911efcd4745f0184b7d8df38

    - order: 6
      component: hakoniwa-mujoco-robots
      action: Drive the simulator with a joystick-free route demo.
      command: python3.12 python/tb3_route_demo.py --pattern straight
      evidence:
        - repository: hakoniwalab/hakoniwa-mujoco-robots
          path: python/tb3_route_demo.py
          revision: local-validation-2026-07-19

    - order: 7
      component: hakoniwa-godot
      action: Verify that Godot receives TB3/base_link_pos and TB3/joint_states and updates the TurtleBot3 scene.
      command: ""
      evidence:
        - repository: hakoniwalab/hakoniwa-godot
          path: examples/mujoco/config/robot_sync.profile.json
          revision: 8f5d7d1765b319f107420f8ac4f87b24ab26ae76

expected_result: >
  TurtleBot3 simulated in MuJoCo is displayed in Godot, with the generated model
  following TB3/base_link_pos and TB3/joint_states PDU updates.

