artifacts:
  - name: Shadow Hand JointState-compatible PDU
    kind: pdu-definition
    producer: hakoniwa-pdu-registry
    consumer:
      - hakoniwa-mujoco-robots
      - hakoniwa-pdu-endpoint
    path: config/shadow-hand-pdutypes.json
  - name: JointState CDR converter
    kind: generated-code
    producer: hakoniwa-pdu-registry
    consumer:
      - hakoniwa-pdu-endpoint
    path: pdu/types/sensor_msgs/pdu_cpptype_cdr_conv_JointState.hpp
  - name: JointState Foxglove schema
    kind: schema
    producer: hakoniwa-pdu-registry
    consumer:
      - hakoniwa-pdu-foxglove
    path: hakoniwa-pdu-foxglove/work/schemas/ros2_jazzy/sensor_msgs/msg/JointState.msg
  - name: Shadow Hand Foxglove comm config
    kind: config
    producer: hakoniwa-pdu-foxglove
    consumer:
      - hakoniwa-pdu-foxglove
    path: TBD
  - name: Shadow Hand SHM-to-TCP bridge config
    kind: config
    producer: hakoniwa-pdu-foxglove
    consumer:
      - hakoniwa-pdu-bridge-core
    path: hakoniwa-pdu-foxglove/config/shadow_hand_bridge
  - name: Shadow Hand Foxglove smoke launcher
    kind: launch-config
    producer: hakoniwa-pdu-foxglove
    consumer:
      - hakoniwa-core-pro
      - hakoniwa-mujoco-robots
      - hakoniwa-pdu-bridge-core
    path: hakoniwa-pdu-foxglove/launch/shadow-hand-foxglove-smoke.launch.json

missing_pieces:
  - Copy ROS 2 Jazzy native schema files from the registry Docker environment into hakoniwa-pdu-foxglove/work/schemas/ros2_jazzy; work/ is gitignored and should remain temporary.
  - Confirm whether hakoniwa-pdu-foxglove should receive only JointState.msg or a bundled ros2msg schema that includes std_msgs/Header and builtin_interfaces/Time dependency definitions.
  - Connect Foxglove UI to ws://127.0.0.1:8766 and record decoded Raw Messages / Plot evidence.
  - Treat URDF-backed Foxglove 3D visualization as a separate follow-up, using only gitignored work/ artifacts for GPL-derived local URDF inputs and outputs.

demo:
  objective: >
    Prove that Shadow Hand state from Hakoniwa can be converted explicitly to
    schema-aware CDR and observed live in Foxglove Raw Messages and Plot without URDF.
  steps:
    - order: 1
      id: verify_shadow_hand_license
      component: hakoniwa-mujoco-robots
      action: Reuse the base Recipe upstream license and attribution preflight.
      agency: required_permission
      requires_gates:
        - shadow_hand_license_checked
      evidence:
        - repository: google-deepmind/mujoco_menagerie
          path: shadow_hand/LICENSE
          revision: main
    - order: 2
      id: verify_foxglove_access
      component: hakoniwa-pdu-foxglove
      action: Confirm access to the private commercial Foxglove adapter.
      agency: required_permission
      requires_gates:
        - foxglove_component_access
      evidence:
        - repository: hakoniwalab/hakoniwa-business-pack
          path: catalog/components/hakoniwa-pdu-foxglove.yaml
          revision: main
    - order: 3
      id: run_shadow_hand_base
      component: hakoniwa-mujoco-robots
      action: Reuse the verified base plant until JointState-compatible state changes with scripted open-close motion.
      agency: agent_action
      requires_gates:
        - shadow_hand_license_checked
    - order: 4
      id: configure_jointstate_cdr
      component: hakoniwa-pdu-registry
      action: Copy ROS 2 Jazzy native JointState/Header/Time ros2msg schema files into hakoniwa-pdu-foxglove/work and resolve the generated JointState CDR converter.
      agency: agent_action
      requires_gates: []
    - order: 5
      id: run_shadow_hand_shm_to_tcp_bridge
      component: hakoniwa-pdu-bridge-core
      action: Launch ShadowHandAsset first, then bridge native ShadowHandAsset/joint_states from callback SHM to TCP using the foxglove-owned bridge config and Hakoniwa Launcher.
      agency: agent_action
      requires_gates:
        - foxglove_component_access
      evidence:
        - repository: local/hakoniwa-pdu-foxglove
          path: launch/shadow-hand-foxglove-smoke.launch.json
          revision: local-working-tree-2026-07-23
      expected_signal:
        - TCP-to-CDR publisher logs repeated sent JointState CDR and published CDR frame records for ShadowHandAsset/joint_states.
    - order: 6
      id: run_shadow_hand_foxglove_bridge
      component: hakoniwa-pdu-endpoint
      action: Decode ShadowHandAsset/joint_states from native PDU, encode sensor_msgs/JointState CDR, and send through a FoxgloveComm-backed Endpoint.
      agency: agent_action
      requires_gates:
        - foxglove_component_access
    - order: 7
      id: start_foxglove_output
      component: hakoniwa-pdu-foxglove
      action: Start the configured WebSocket output and publish Shadow Hand state CDR.
      agency: agent_action
      requires_gates:
        - foxglove_component_access
    - order: 8
      id: connect_foxglove_ui
      component: hakoniwa-pdu-foxglove
      action: Connect Foxglove App to the printed WebSocket address.
      agency: human_action
      requires_gates:
        - connect_foxglove_app
    - order: 9
      id: verify_raw_and_plot
      component: hakoniwa-pdu-foxglove
      action: Confirm decoded joint names and changing joint-position plots.
      agency: agent_action
      requires_gates:
        - connect_foxglove_app
  observability:
    success_signals:
      - Base Shadow Hand motion is visible and state values change.
      - CDR conversion succeeds without treating native PDU bytes as CDR.
      - Foxglove exposes the configured WebSocket topic.
      - Raw Messages decodes joint names/positions.
      - Selected joint plots change consistently with MuJoCo motion.
    failure_signals:
      - Foxglove component access is unavailable.
      - Schema or generated converter cannot be resolved.
      - Foxglove reports undecodable bytes or schema mismatch.
      - Backend publication works but the UI has not connected; do not claim live UI validation.
      - Plot values remain static while fingers move.
    fixtures:
      - Base Shadow Hand scripted open-close motion.
      - One configured joint-state Foxglove topic.
    automation:
      - Keep input scripted for deterministic visualization checks.
  verification_checks:
    lifecycle:
      - Use Hakoniwa Launcher for the multi-asset demo.
      - Start the conductor-owning Shadow Hand asset first.
      - Start hako-cmd only after all required assets have registered.
      - Base plant is advancing.
      - Foxglove WebSocket server is running.
      - Client connection is confirmed before UI claims.
    behavior:
      - Joint-state topic decodes with expected joint names.
      - At least one finger joint value changes in Foxglove during visible motion.
    logs:
      - Selected PDU type, schema name, encoding, and file.
      - ROS 2 Jazzy native message source used for the schema file.
      - Foxglove topic and WebSocket address.
      - Representative changing joint values.

expected_result: >
  The Shadow Hand plant publishes JointState-compatible state, Registry-generated
  logic converts it to complete CDR, hakoniwa-pdu-foxglove forwards it unchanged
  with explicit schema metadata, and Foxglove displays live decoded values and plots.

