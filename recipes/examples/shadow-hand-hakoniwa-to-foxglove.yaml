id: shadow-hand-hakoniwa-to-foxglove
title: Shadow Hand Hakoniwa Joint State to Foxglove
recipe_version: 0.1

goal:
  user_request: 箱庭で動かしている Shadow Hand の関節状態を Foxglove に連携し、リアルタイムに観測したい。
  description: >
    Extend the Shadow Hand Hakoniwa plant with an output-only Foxglove path.
    Keep the command path unchanged, publish JointState-compatible state, convert
    it explicitly to complete Foxglove-compatible CDR using Registry-generated
    artifacts, then forward it through hakoniwa-pdu-foxglove for Raw Messages and Plot.

feasibility:
  status: partially_feasible
  confidence: high
  rationale:
    - The base Shadow Hand Recipe defines JointState-compatible output as the observation boundary.
    - hakoniwa-pdu-foxglove publishes caller-provided complete CDR over the official Foxglove SDK WebSocket server.
    - The Foxglove adapter supports explicit schema configuration.
    - It intentionally does not convert Hakoniwa native PDU binary to CDR, so conversion must stay explicit.
    - Raw Messages and Plot do not require URDF; Foxglove 3D is outside v0.

validation:
  status: not_tested
  summary: The component contracts are repository-backed, but the composed Shadow Hand -> CDR -> Foxglove path is not yet executed.
  steps:
    - id: inspect_shadow_hand_license
      status: verified
      evidence:
        - repository: google-deepmind/mujoco_menagerie
          path: shadow_hand/LICENSE
          revision: main
      notes:
        - Reuse the base Recipe license gate.
    - id: inspect_foxglove_contract
      status: verified
      evidence:
        - repository: hakoniwalab/hakoniwa-pdu-foxglove
          path: README.md
          revision: main
      notes:
        - send input must be complete Foxglove-compatible CDR.
        - Native Hakoniwa PDU binary must not be passed directly unless it is already valid CDR.
    - id: inspect_foxglove_sample
      status: verified
      evidence:
        - repository: hakoniwalab/hakoniwa-pdu-foxglove
          path: examples/cdr-publisher
          revision: main
      notes:
        - The sample demonstrates the generated-converter plus Endpoint::set_comm publication pattern.
    - id: shadow_hand_jointstate_cdr
      status: not_tested
      notes:
        - Confirm the exact JointState-compatible type, converter, and schema asset.
    - id: shadow_hand_foxglove_live_plot
      status: not_tested
      notes:
        - Verify decoded joint names/positions and changing plots during finger motion.

agency_boundary:
  agent_actions:
    - id: inspect_authorized_sources
      description: Inspect the Shadow Hand license plus authorized Foxglove component source and samples.
      autonomous: true
      preconditions:
        - user_requested_execution
        - foxglove_component_access
    - id: generate_foxglove_configs
      description: Generate JointState CDR/schema mapping and Foxglove communication configuration.
      autonomous: true
      preconditions:
        - user_requested_execution
        - target_environment_confirmed
        - foxglove_component_access
        - shadow_hand_license_checked
  human_decisions:
    - id: choose_visualization_scope
      description: Decide whether Raw Messages and Plot are sufficient or whether a later URDF-backed 3D view is required.
      status: required
      required_before:
        - foxglove_3d_extension
  human_actions:
    - id: connect_foxglove_app
      description: Open Foxglove and connect to the configured local WebSocket server when manual UI connection is required.
      status: required
      confirmation_required: true
      required_before:
        - claim_live_ui_visualization
  required_permissions:
    - id: shadow_hand_license_checked
      description: Confirm upstream Apache-2.0 notice and attribution obligations before redistributing copied model artifacts.
      status: required
      required_before:
        - redistribute_shadow_hand_artifacts
    - id: foxglove_component_access
      description: Confirm access and entitlement to the private commercial hakoniwa-pdu-foxglove component.
      status: required
      required_before:
        - use_hakoniwa_pdu_foxglove

constraints:
  - depends-on-shadow-hand-base-recipe
  - license-check-first
  - commercial-component-access-required
  - output-only-foxglove
  - cdr-conversion-explicit
  - no-native-pdu-as-cdr-assumption
  - single-pc
  - foxglove-3d-urdf-out-of-scope-for-v0

target_environment:
  required_for: executable-demo
  status: partially_known
  os: macOS | Linux
  architecture: arm64 | x86_64
  execution_mode: native
  runtimes:
    - name: MuJoCo
      required: true
      version: unknown
      path: unknown
    - name: Foxglove App
      required: true
      version: unknown
      path: unknown
    - name: C++ toolchain
      required: true
      version: "C++20"
      path: unknown
  hakoniwa:
    install_prefix: /usr/local/hakoniwa
    components_built:
      - hakoniwa-core-pro
      - hakoniwa-mujoco-robots
      - hakoniwa-pdu-endpoint
      - hakoniwa-pdu-registry
      - hakoniwa-pdu-foxglove

execution_environment:
  required_for: executable-demo
  status: partially_known
  gui:
    required: true
    status: unknown
  shared_memory:
    required: true
    access: required-for-shadow-hand-plant
  network:
    required: true
    scope: localhost-websocket
  hakoniwa:
    install_prefix: /usr/local/hakoniwa
    hako_cmd_access: unknown

components:
  - id: hakoniwa-mujoco-robots
    roles:
      - physics_runtime
      - simulation_core
    purpose: Run the Shadow Hand model and produce JointState-compatible state.
  - id: hakoniwa-core-pro
    roles:
      - simulation_core
      - time_sync
    purpose: Coordinate the Shadow Hand plant lifecycle and simulation time.
  - id: hakoniwa-pdu-registry
    roles:
      - registry
      - data_model
      - code_generator
    purpose: Provide the selected state PDU definition, generated CDR converter, and schema asset.
  - id: hakoniwa-pdu-endpoint
    roles:
      - communication_infrastructure
      - integration_boundary
    purpose: Provide the Endpoint/PduComm boundary used by the Foxglove adapter.
  - id: hakoniwa-pdu-foxglove
    roles:
      - visualizer
      - bridge
      - integration_boundary
    purpose: Publish complete CDR payloads through Foxglove WebSocket.

connections:
  - from: hakoniwa-mujoco-robots
    to: hakoniwa-pdu-endpoint
    interface: pdu
    data:
      - JointState-compatible state
    contract:
      status: not_tested
      requires:
        - Base Shadow Hand plant Recipe completed.
        - Stable joint-name ordering.
      validation_notes:
        - State publication remains untested for Shadow Hand.
  - from: hakoniwa-pdu-registry
    to: hakoniwa-pdu-endpoint
    interface: generated-artifact
    data:
      - CDR converter
      - schema file
      - PDU definition
    contract:
      status: not_tested
      requires:
        - Generated converter for the exact selected JointState-compatible type.
        - Complete CDR output including required encapsulation.
      validation_notes:
        - Generic generated-converter usage is documented; JointState-specific composition must be confirmed.
  - from: hakoniwa-pdu-endpoint
    to: hakoniwa-pdu-foxglove
    interface: PduComm adapter / Endpoint::set_comm
    data:
      - PDU key
      - complete CDR payload
    contract:
      status: verified
      requires:
        - Explicit Foxglove communication configuration.
        - Explicit schema name, encoding, and file.
      validation_notes:
        - This is the documented component architecture; Shadow Hand-specific runtime remains untested.

data_flow:
  summary: >
    The Shadow Hand plant publishes JointState-compatible state. Registry-generated
    logic converts that state into complete CDR. Endpoint passes the CDR to
    FoxgloveComm, which forwards the bytes unchanged with explicit schema metadata.
  steps:
    - from: hakoniwa-mujoco-robots
      to: hakoniwa-pdu-endpoint
      data:
        - JointState-compatible state PDU
      description: Publish state from the Shadow Hand plant.
    - from: hakoniwa-pdu-registry
      to: hakoniwa-pdu-endpoint
      data:
        - generated CDR conversion artifacts
        - schema asset
      description: Make conversion and schema resolution explicit rather than implicit in FoxgloveComm.
    - from: hakoniwa-pdu-endpoint
      to: hakoniwa-pdu-foxglove
      data:
        - complete CDR payload
      description: Delegate output publication through FoxgloveComm.
    - from: hakoniwa-pdu-foxglove
      to: external-foxglove-app
      data:
        - schema-aware WebSocket topic
      description: Observe decoded values in Raw Messages and Plot; this external client is not a Catalog component.

time_model:
  mode: shared-simulation-time-with-wall-clock-foxglove-log-time
  components:
    - hakoniwa-core-pro
    - hakoniwa-mujoco-robots
    - hakoniwa-pdu-endpoint
    - hakoniwa-pdu-foxglove
  notes:
    - Shadow Hand simulation follows Hakoniwa simulation time.
    - Current hakoniwa-pdu-foxglove v0.1 records wall-clock log time and does not broadcast simulation time.

artifact_sets:
  physics_artifacts:
    description: Shadow Hand physics artifacts inherited from the base Recipe.
    status: not_tested
    artifacts:
      - shadow_hand/scene_right.xml
      - shadow_hand/right_hand.xml
      - shadow_hand/assets/*
  visualization_artifacts:
    description: Foxglove schema/topic configuration and client selections.
    status: not_tested
    artifacts:
      - Foxglove communication config
      - JointState schema file
      - Raw Messages topic
      - Plot selections
  pdu_artifacts:
    description: Shadow Hand state definition and CDR conversion artifacts.
    status: not_tested
    artifacts:
      - JointState-compatible PDU definition
      - generated CDR converter
      - schema asset
      - Endpoint configuration
  runtime_artifacts:
    description: Foxglove output adapter and WebSocket server configuration.
    status: partially_verified
    artifacts:
      - hakoniwa-pdu-foxglove
      - Foxglove WebSocket config

artifacts:
  - name: Shadow Hand JointState-compatible PDU
    kind: pdu-definition
    producer: hakoniwa-pdu-registry
    consumer:
      - hakoniwa-mujoco-robots
      - hakoniwa-pdu-endpoint
    path: TBD
  - name: JointState CDR converter
    kind: generated-code
    producer: hakoniwa-pdu-registry
    consumer:
      - hakoniwa-pdu-endpoint
    path: TBD
  - name: JointState Foxglove schema
    kind: schema
    producer: hakoniwa-pdu-registry
    consumer:
      - hakoniwa-pdu-foxglove
    path: TBD
  - name: Shadow Hand Foxglove comm config
    kind: config
    producer: hakoniwa-pdu-foxglove
    consumer:
      - hakoniwa-pdu-foxglove
    path: TBD

missing_pieces:
  - Complete and verify the base Shadow Hand Hakoniwa joint command/state Recipe first.
  - Confirm the exact JointState-compatible PDU type and stable joint-name order.
  - Confirm generated CDR conversion support and schema path for that exact type.
  - Add Shadow Hand-specific Foxglove communication configuration and topic name.
  - Decide where the typed/native PDU to CDR codec runs without violating FoxgloveComm's contract.
  - Execute live WebSocket validation and record decoded joint values.
  - Treat URDF-backed Foxglove 3D visualization as a separate follow-up.

demo:
  objective: >
    Prove that Shadow Hand state from Hakoniwa can be converted explicitly to
    schema-aware CDR and observed live in Foxglove Raw Messages and Plot without URDF.
  steps:
    - order: 1
      id: verify_shadow_hand_license
      component: hakoniwa-mujoco-robots
      action: Reuse the base Recipe upstream license and attribution preflight.
      agency: required_permission
      requires_gates:
        - shadow_hand_license_checked
      evidence:
        - repository: google-deepmind/mujoco_menagerie
          path: shadow_hand/LICENSE
          revision: main
    - order: 2
      id: verify_foxglove_access
      component: hakoniwa-pdu-foxglove
      action: Confirm access to the private commercial Foxglove adapter.
      agency: required_permission
      requires_gates:
        - foxglove_component_access
      evidence:
        - repository: hakoniwalab/hakoniwa-business-pack
          path: catalog/components/hakoniwa-pdu-foxglove.yaml
          revision: main
    - order: 3
      id: run_shadow_hand_base
      component: hakoniwa-mujoco-robots
      action: Run the base plant until JointState-compatible state changes with scripted open-close motion.
      agency: agent_action
      requires_gates:
        - shadow_hand_license_checked
    - order: 4
      id: configure_jointstate_cdr
      component: hakoniwa-pdu-registry
      action: Resolve the exact schema and generated CDR converter.
      agency: agent_action
      requires_gates: []
    - order: 5
      id: start_foxglove_output
      component: hakoniwa-pdu-foxglove
      action: Start the configured WebSocket output and publish Shadow Hand state CDR.
      agency: agent_action
      requires_gates:
        - foxglove_component_access
    - order: 6
      id: connect_foxglove_ui
      component: hakoniwa-pdu-foxglove
      action: Connect Foxglove App to the printed WebSocket address.
      agency: human_action
      requires_gates:
        - connect_foxglove_app
    - order: 7
      id: verify_raw_and_plot
      component: hakoniwa-pdu-foxglove
      action: Confirm decoded joint names and changing joint-position plots.
      agency: agent_action
      requires_gates:
        - connect_foxglove_app
  observability:
    success_signals:
      - Base Shadow Hand motion is visible and state values change.
      - CDR conversion succeeds without treating native PDU bytes as CDR.
      - Foxglove exposes the configured WebSocket topic.
      - Raw Messages decodes joint names/positions.
      - Selected joint plots change consistently with MuJoCo motion.
    failure_signals:
      - Foxglove component access is unavailable.
      - Schema or generated converter cannot be resolved.
      - Foxglove reports undecodable bytes or schema mismatch.
      - Backend publication works but the UI has not connected; do not claim live UI validation.
      - Plot values remain static while fingers move.
    fixtures:
      - Base Shadow Hand scripted open-close motion.
      - One configured joint-state Foxglove topic.
    automation:
      - Keep input scripted for deterministic visualization checks.
  verification_checks:
    lifecycle:
      - Base plant is advancing.
      - Foxglove WebSocket server is running.
      - Client connection is confirmed before UI claims.
    behavior:
      - Joint-state topic decodes with expected joint names.
      - At least one finger joint value changes in Foxglove during visible motion.
    logs:
      - Selected PDU type, schema name, encoding, and file.
      - Foxglove topic and WebSocket address.
      - Representative changing joint values.

expected_result: >
  The Shadow Hand plant publishes JointState-compatible state, Registry-generated
  logic converts it to complete CDR, hakoniwa-pdu-foxglove forwards it unchanged
  with explicit schema metadata, and Foxglove displays live decoded values and plots.

