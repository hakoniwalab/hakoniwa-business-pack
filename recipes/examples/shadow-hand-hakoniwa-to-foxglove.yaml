id: shadow-hand-hakoniwa-to-foxglove
title: Shadow Hand Hakoniwa JointState to Foxglove 3D
recipe_version: 0.3

goal:
  user_request: 箱庭で動かしている Shadow Hand の関節状態を、Mac 上の Foxglove でリアルタイムに観測・3D 可視化したい。
  description: >
    Run the MuJoCo Menagerie Shadow Hand as a Hakoniwa asset, publish
    sensor_msgs/JointState-compatible state, bridge native Hakoniwa PDU bytes
    from callback SHM to TCP, convert them explicitly to complete CDR, and
    publish them through hakoniwa-pdu-foxglove. For Foxglove 3D, use the
    upstream Shadow Robot xacro/URDF as the visualization model while MuJoCo
    remains the authoritative physics model.

feasibility:
  status: feasible
  confidence: high
  rationale:
    - The Shadow Hand Hakoniwa plant and JointState observation path are verified.
    - The callback-SHM to TCP path is verified with hakoniwa-pdu-bridge-core.
    - Native sensor_msgs/JointState PDU decode and registry-generated CDR encode are verified.
    - cdr_stdin_publisher provides a generic process boundary for complete CDR frames before FoxgloveComm.
    - Foxglove Raw Messages decoded /hakoniwa/ShadowHandAsset/joint_states successfully.
    - Foxglove 3D was manually verified on macOS arm64 using the upstream Shadow Robot E3M5 xacro/DAE visualization model.
    - Foxglove URDF Joint states mode drives the model directly from JointState; no /tf publisher is required.
    - ROS 2 message definitions are reused for the JointState schema, but a ROS 2 runtime is not required for this verified path.
    - hakoniwa-pdu-foxglove is now public OSS under the MIT license, so no commercial component access gate is required.
    - The full Shadow Hand end-to-end workflow is currently verified only on macOS arm64.

validation:
  status: verified
  summary: >
    End-to-end Shadow Hand visualization was verified on 2026-07-23 on macOS
    arm64. MuJoCo Menagerie remained the physics source of truth. Hakoniwa
    published 24 named hand joints as sensor_msgs/JointState-compatible state.
    hakoniwa-pdu-bridge-core moved the native PDU from callback SHM to TCP; a
    Python converter decoded the native PDU and generated complete CDR; and
    cdr_stdin_publisher forwarded that CDR through FoxgloveComm to a local
    Foxglove WebSocket server. Foxglove decoded the JointState topic and the 3D
    panel animated a prepared Shadow Robot URDF from the same JointState values.
  steps:
    - id: shadow_hand_base_plant
      status: verified
      evidence:
        - repository: hakoniwalab/hakoniwa-business-pack
          path: recipes/examples/shadow-hand-menagerie-mjcf-to-hakoniwa.yaml
          revision: main
      notes:
        - The base recipe records bounded Shadow Hand actuation and JointState-compatible state readback.
    - id: shadow_hand_shm_to_tcp_bridge
      status: verified
      evidence:
        - repository: hakoniwalab/hakoniwa-pdu-foxglove
          path: config/shadow_hand_bridge/README.md
          revision: c45ba4e76788258907777e82649edaecc7fe7bc8
        - repository: hakoniwalab/hakoniwa-pdu-foxglove
          path: launch/shadow-hand-foxglove-smoke.launch.json
          revision: c45ba4e76788258907777e82649edaecc7fe7bc8
      notes:
        - ShadowHandAsset owns the conductor and starts first.
        - bridge-core participates in the Hakoniwa callback/SHM lifecycle and forwards native PDU bytes over TCP.
        - The process split is an implementation choice used to avoid spending more time on single-process threading complexity; it is not a fundamental limitation.
    - id: shadow_hand_native_pdu_to_cdr
      status: verified
      evidence:
        - repository: hakoniwalab/hakoniwa-pdu-foxglove
          path: examples/shadow-hand-jointstate-to-foxglove/shadow_hand_jointstate_to_foxglove.py
          revision: c45ba4e76788258907777e82649edaecc7fe7bc8
        - repository: hakoniwalab/hakoniwa-pdu-foxglove
          path: examples/cdr-stdin-publisher/README.md
          revision: c45ba4e76788258907777e82649edaecc7fe7bc8
      notes:
        - The Python converter owns the type-specific native-PDU-to-JointState-to-CDR conversion.
        - cdr_stdin_publisher owns the generic complete-CDR-to-Foxglove transport boundary.
        - The default stdin framing is little-endian u32 payload length followed by the complete CDR payload.
    - id: shadow_hand_jointstate_schema_stage
      status: verified
      evidence:
        - repository: hakoniwalab/hakoniwa-pdu-foxglove
          path: README.md
          revision: c45ba4e76788258907777e82649edaecc7fe7bc8
      notes:
        - The JointState ros2msg bundle is prepared using the ROS 2 Jazzy Docker environment provided by hakoniwa-pdu-registry.
        - The resulting sensor_msgs/msg/JointState.bundle.msg is copied into work/schemas/ros2_jazzy/sensor_msgs/msg/JointState.bundle.msg.
        - work/ is a local staging area and the schema copy is intentionally not committed to hakoniwa-pdu-foxglove.
    - id: shadow_hand_foxglove_websocket
      status: verified
      evidence:
        - repository: hakoniwalab/hakoniwa-pdu-foxglove
          path: config/shadow_hand/comm_foxglove_jointstate.json
          revision: c45ba4e76788258907777e82649edaecc7fe7bc8
      notes:
        - WebSocket address is ws://127.0.0.1:8766.
        - Topic is /hakoniwa/ShadowHandAsset/joint_states.
        - Schema is sensor_msgs/msg/JointState with ros2msg encoding and a bundled schema file staged under work/schemas/ros2_jazzy.
    - id: shadow_hand_foxglove_raw_messages
      status: verified
      evidence:
        - source: user-observed-foxglove-ui
          date: "2026-07-23"
      notes:
        - Foxglove Raw Messages decoded the JointState header, 24 joint names, and state arrays.
    - id: shadow_hand_ros_free_xacro_expansion
      status: verified
      evidence:
        - repository: hakoniwalab/hakoniwa-mbody-registry
          path: docs/xacro-package-mapping.md
          revision: bf6434d147676778f0542dd60f820484c2841ef8
        - repository: shadow-robot/sr_common
          path: sr_description/robots/sr_hand.urdf.xacro
          revision: noetic-devel
      notes:
        - xacro2urdf.py resolves ROS-style $(find sr_description) through explicit --package sr_description=PATH without requiring ROS.
        - Generated package:// mesh URIs are intentionally left unchanged by xacro expansion.
    - id: shadow_hand_foxglove_urdf_prepare
      status: verified
      evidence:
        - repository: hakoniwalab/hakoniwa-pdu-foxglove
          path: README.md
          revision: c45ba4e76788258907777e82649edaecc7fe7bc8
      notes:
        - tools/prepare_urdf.py rewrites package://sr_description/... to viewer-friendly relative paths.
        - The verified visualization root correction is rh_world_joint rpy = -1.5707963267948966 0 -1.5707963267948966.
    - id: shadow_hand_foxglove_3d
      status: verified
      evidence:
        - source: user-observed-foxglove-3d
          date: "2026-07-23"
        - repository: hakoniwalab/hakoniwa-pdu-foxglove
          path: README.md
          revision: c45ba4e76788258907777e82649edaecc7fe7bc8
      notes:
        - Foxglove 3D URDF layer was set to Joint states control mode.
        - Ignore COLLADA <up_axis> must be enabled for the Shadow Robot DAE meshes.
        - The prepared URDF moved consistently with the MuJoCo simulation through JointState.position[].
        - No /tf publisher is required for this path.

agency_boundary:
  agent_actions:
    - id: prepare_shadow_robot_visualization
      description: Clone the upstream Shadow Robot source, expand xacro with explicit package mapping, stage meshes, and prepare viewer-relative URDF paths.
      autonomous: true
      preconditions:
        - user_requested_execution
    - id: generate_foxglove_runtime_config
      description: Configure the SHM-to-TCP bridge, native JointState-to-CDR converter, cdr_stdin_publisher, and Foxglove endpoint.
      autonomous: true
      preconditions:
        - user_requested_execution
    - id: prepare_jointstate_schema
      description: Use the hakoniwa-pdu-registry ROS 2 Jazzy Docker environment to prepare the JointState ros2msg bundle and stage it under hakoniwa-pdu-foxglove/work/schemas/ros2_jazzy.
      autonomous: true
      preconditions:
        - user_requested_execution
  human_actions:
    - id: connect_foxglove_app
      description: Connect Foxglove App to the local WebSocket server and configure the 3D URDF layer.
      status: required
      confirmation_required: true
  required_permissions:
    - id: upstream_license_review
      description: Preserve applicable MuJoCo Menagerie and Shadow Robot upstream notices when redistributing source-derived artifacts.
      status: required

constraints:
  - depends-on-shadow-hand-base-recipe
  - license-check-first
  - output-only-foxglove
  - native-pdu-to-cdr-conversion-explicit
  - no-native-pdu-as-cdr-assumption
  - launch-conductor-owning-shadow-hand-asset-first
  - current-validated-shm-to-tcp-process-boundary-uses-bridge-core
  - bridge-core-is-implementation-choice-not-fundamental-requirement
  - foxglove-3d-uses-upstream-shadow-robot-urdf-as-visualization-model
  - mujoco-menagerie-remains-physics-source-of-truth
  - foxglove-urdf-assets-served-over-local-http-with-cors
  - jointstate-schema-staged-from-pdu-registry-jazzy-docker
  - ignore-collada-up-axis-required-for-shadow-robot-dae
  - no-tf-required-for-urdf-jointstate-control
  - verified-single-pc-macos-arm64

target_environment:
  required_for: executable-demo
  status: verified
  os: macOS
  architecture: arm64
  execution_mode: native
  runtimes:
    - name: MuJoCo
      required: true
      version: installed-local
    - name: Python
      required: true
      version: "3.12"
    - name: Foxglove App
      required: true
      version: current-user-installation
    - name: C++ toolchain
      required: true
      version: "C++20"
    - name: ROS 2 runtime
      required: false
      version: not-required
      notes: sensor_msgs/JointState schema/type conventions are reused without running ROS 2; the schema bundle is prepared separately using the hakoniwa-pdu-registry Jazzy Docker environment.
  hakoniwa:
    install_prefix: /usr/local/hakoniwa
    components_built:
      - hakoniwa-core-pro
      - hakoniwa-mujoco-robots
      - hakoniwa-pdu-endpoint
      - hakoniwa-pdu-registry
      - hakoniwa-pdu-bridge-core
      - hakoniwa-pdu-foxglove
      - hakoniwa-mbody-registry

execution_environment:
  required_for: executable-demo
  status: verified
  gui:
    required: true
    status: verified
  shared_memory:
    required: true
    access: required-for-shadow-hand-plant-and-bridge
  network:
    required: true
    scope:
      - localhost-tcp
      - localhost-websocket
      - localhost-http
  filesystem:
    work_area: hakoniwa-pdu-foxglove/work
    notes:
      - Upstream Shadow Robot source and generated visualization artifacts are kept as local work inputs/outputs.
      - The JointState ros2msg bundle is copied from the hakoniwa-pdu-registry ROS 2 Jazzy Docker preparation flow into work/schemas/ros2_jazzy/sensor_msgs/msg/JointState.bundle.msg.
      - work/ remains local and is intentionally excluded from the public repository and Docker build context.

components:
  - id: hakoniwa-mujoco-robots
    roles:
      - physics_runtime
      - simulation_core
    purpose: Run the MuJoCo Menagerie Shadow Hand and publish command/state PDUs.
  - id: hakoniwa-core-pro
    roles:
      - simulation_core
      - time_sync
    purpose: Coordinate Hakoniwa lifecycle and simulation time.
  - id: hakoniwa-pdu-endpoint
    roles:
      - communication_infrastructure
      - integration_boundary
    purpose: Provide callback SHM, TCP, and FoxgloveComm-backed Endpoint boundaries.
  - id: hakoniwa-pdu-registry
    roles:
      - registry
      - data_model
      - code_generator
    purpose: Provide native JointState PDU conversion, complete CDR conversion artifacts, and the reproducible ROS 2 Jazzy Docker environment used to prepare Foxglove ros2msg schema bundles.
  - id: hakoniwa-pdu-bridge-core
    roles:
      - bridge
      - communication_infrastructure
    purpose: Isolate the verified Hakoniwa callback/SHM runtime from the downstream TCP-to-CDR/Foxglove process.
  - id: hakoniwa-pdu-foxglove
    roles:
      - visualizer
      - bridge
      - integration_boundary
    purpose: Publish complete CDR through Foxglove WebSocket and host the Shadow Hand integration helpers/configuration as a public MIT-licensed OSS component.
  - id: hakoniwa-mbody-registry
    roles:
      - asset_generator
      - visualization_asset_source
    purpose: Expand the upstream ROS-origin Shadow Robot xacro without requiring a ROS installation.

connections:
  - from: hakoniwa-mujoco-robots
    to: hakoniwa-pdu-bridge-core
    interface: callback SHM PDU
    data:
      - ShadowHandAsset/joint_states native PDU
    contract:
      status: verified
      requires:
        - ShadowHandAsset registers first and owns the conductor.
        - ShadowHandBridge registers as a Hakoniwa callback asset.
      validation_notes:
        - The bridge forwards native Hakoniwa PDU bytes; the TCP payload is not CDR.
  - from: hakoniwa-pdu-registry
    to: hakoniwa-pdu-endpoint
    interface: generated converter artifacts
    data:
      - native JointState decode
      - complete JointState CDR encode
    contract:
      status: verified
      requires:
        - sensor_msgs/JointState generated Python conversion artifacts.
      validation_notes:
        - Type-specific conversion is performed before FoxgloveComm.
  - from: hakoniwa-pdu-registry
    to: hakoniwa-pdu-foxglove
    interface: ROS 2 Jazzy schema preparation / local staging
    data:
      - sensor_msgs/msg/JointState.bundle.msg
    contract:
      status: verified
      requires:
        - Use the registry Docker environment for the ROS 2 Jazzy schema preparation boundary.
        - Copy the resulting bundle into work/schemas/ros2_jazzy/sensor_msgs/msg/JointState.bundle.msg.
      validation_notes:
        - The staged schema is a local work artifact and is not committed to hakoniwa-pdu-foxglove.
  - from: hakoniwa-pdu-endpoint
    to: hakoniwa-pdu-foxglove
    interface: Endpoint::set_comm / FoxgloveComm
    data:
      - complete CDR payload
    contract:
      status: verified
      requires:
        - Explicit Foxglove endpoint and schema configuration.
        - Complete CDR including encapsulation.
      validation_notes:
        - cdr_stdin_publisher is the generic process boundary used by the verified Shadow Hand path.
  - from: hakoniwa-mbody-registry
    to: hakoniwa-pdu-foxglove
    interface: visualization asset preparation
    data:
      - plain Shadow Robot URDF
    contract:
      status: verified
      requires:
        - Explicit --package mapping for sr_description during xacro expansion.
        - Viewer-side package URI rewrite and root orientation adjustment.
      validation_notes:
        - Foxglove loads the prepared URDF over local HTTP; FoxgloveComm itself does not consume the URDF.

data_flow:
  summary: >
    Physics/state, schema preparation, and visualization assets follow explicit
    paths. MuJoCo is the physics source of truth and Hakoniwa publishes
    JointState-compatible state. Native PDU bytes are bridged to TCP, decoded to
    a typed JointState, encoded to complete CDR, and published through
    FoxgloveComm. The JointState ros2msg bundle is prepared separately using the
    hakoniwa-pdu-registry ROS 2 Jazzy Docker environment and staged under the
    Foxglove work directory. Separately, the upstream Shadow Robot xacro is
    expanded without ROS and prepared as a Foxglove visualization URDF.
    Foxglove joins the paths by decoding the CDR with the staged schema and
    applying the live JointState values to matching URDF joint names.
  state_path:
    - Shadow Hand MuJoCo plant
    - Hakoniwa sensor_msgs/JointState native PDU
    - callback SHM endpoint
    - hakoniwa-pdu-bridge-core
    - TCP native PDU
    - pdu_to_py_JointState
    - py_to_cdr_JointState
    - cdr_stdin_publisher
    - FoxgloveComm
    - Foxglove WebSocket
    - /hakoniwa/ShadowHandAsset/joint_states
  schema_path:
    - hakoniwa-pdu-registry ROS 2 Jazzy Docker environment
    - sensor_msgs/msg/JointState ros2msg schema preparation
    - copy to hakoniwa-pdu-foxglove/work/schemas/ros2_jazzy/sensor_msgs/msg/JointState.bundle.msg
    - Foxglove RawChannel schema configuration
  visualization_path:
    - shadow-robot/sr_common sr_hand.urdf.xacro
    - hakoniwa-mbody-registry xacro2urdf.py with --package sr_description=PATH
    - plain URDF with package:// mesh references
    - hakoniwa-pdu-foxglove tools/prepare_urdf.py
    - viewer-relative URDF and copied DAE meshes
    - local CORS HTTP server
    - Foxglove 3D URDF layer in Joint states mode

time_model:
  mode: hakoniwa-simulation-time-with-wall-clock-foxglove-log-time
  components:
    - hakoniwa-core-pro
    - hakoniwa-mujoco-robots
    - hakoniwa-pdu-endpoint
    - hakoniwa-pdu-foxglove
  notes:
    - Shadow Hand dynamics advance on Hakoniwa simulation time.
    - hakoniwa-pdu-foxglove v0.1 currently records Foxglove log time from wall clock.
    - Foxglove simulation-time broadcasting is a future capability and is not required for the verified visualization.

artifact_sets:
  physics_artifacts:
    description: MuJoCo Menagerie Shadow Hand physics model and Hakoniwa runtime configuration.
    status: verified
    artifacts:
      - shadow_hand/scene_right.xml
      - shadow_hand/right_hand.xml
      - Shadow Hand Hakoniwa actuator/state configuration
  pdu_artifacts:
    description: JointState native PDU, CDR conversion artifacts, and locally staged ros2msg schema.
    status: verified
    artifacts:
      - sensor_msgs/JointState native PDU converter
      - sensor_msgs/JointState CDR converter
      - work/schemas/ros2_jazzy/sensor_msgs/msg/JointState.bundle.msg
  runtime_artifacts:
    description: Verified SHM-to-TCP-to-CDR-to-Foxglove runtime chain.
    status: verified
    artifacts:
      - hakoniwa-pdu-foxglove/config/shadow_hand_bridge
      - hakoniwa-pdu-foxglove/config/shadow_hand/endpoint_foxglove_jointstate.json
      - hakoniwa-pdu-foxglove/examples/shadow-hand-jointstate-to-foxglove
      - hakoniwa-pdu-foxglove/examples/cdr-stdin-publisher
      - hakoniwa-pdu-foxglove/launch/shadow-hand-foxglove-smoke.launch.json
  visualization_artifacts:
    description: Local Shadow Robot source plus generated Foxglove-ready URDF/mesh artifacts.
    status: verified
    artifacts:
      - work/shadow_hand_source_urdf/sr_common/sr_description/robots/sr_hand.urdf.xacro
      - work/urdf/shadow_hand/shadow_hand_right.urdf
      - work/urdf/shadow_hand/sr_description/meshes
      - hakoniwa-pdu-foxglove/launch/shadow-hand-foxglove-browser.launch.json

artifacts:
  - name: Shadow Hand JointState PDU
    kind: pdu-definition
    producer: hakoniwa-mujoco-robots
    consumer:
      - hakoniwa-pdu-bridge-core
      - hakoniwa-pdu-registry
    path: ShadowHandAsset/joint_states
  - name: JointState Foxglove schema bundle
    kind: generated-local-artifact
    producer: hakoniwa-pdu-registry
    consumer:
      - hakoniwa-pdu-foxglove
    path: hakoniwa-pdu-foxglove/work/schemas/ros2_jazzy/sensor_msgs/msg/JointState.bundle.msg
  - name: Shadow Hand SHM-to-TCP bridge config
    kind: config
    producer: hakoniwa-pdu-foxglove
    consumer:
      - hakoniwa-pdu-bridge-core
    path: hakoniwa-pdu-foxglove/config/shadow_hand_bridge
  - name: Shadow Hand Foxglove endpoint config
    kind: config
    producer: hakoniwa-pdu-foxglove
    consumer:
      - hakoniwa-pdu-endpoint
      - hakoniwa-pdu-foxglove
    path: hakoniwa-pdu-foxglove/config/shadow_hand/endpoint_foxglove_jointstate.json
  - name: Generic stdin CDR publisher
    kind: executable
    producer: hakoniwa-pdu-foxglove
    consumer:
      - hakoniwa-pdu-foxglove
    path: hakoniwa-pdu-foxglove/examples/cdr-stdin-publisher
  - name: Shadow Robot visualization xacro
    kind: upstream-source
    producer: shadow-robot/sr_common
    consumer:
      - hakoniwa-mbody-registry
    path: sr_description/robots/sr_hand.urdf.xacro
  - name: Foxglove-ready Shadow Hand URDF
    kind: generated-local-artifact
    producer: hakoniwa-pdu-foxglove
    consumer:
      - Foxglove App
    path: hakoniwa-pdu-foxglove/work/urdf/shadow_hand/shadow_hand_right.urdf

missing_pieces:
  - Optional future simplification: replace the current bridge-core/TCP process boundary with a direct multi-threaded SHM-to-CDR-to-Foxglove process if the additional runtime complexity is justified.
  - Optional future capability: publish Hakoniwa simulation time through Foxglove Time support instead of wall-clock log timestamps.
  - Generalize the verified JointState/URDF pattern to additional robots and message types.
  - Validate the complete Shadow Hand recipe on Linux in addition to the current macOS arm64 validation.

demo:
  objective: >
    Show the same simulated Shadow Hand motion in MuJoCo and Foxglove 3D on a
    Mac, using Hakoniwa JointState as the live contract and without requiring a
    ROS 2 runtime.
  steps:
    - order: 1
      id: prepare_jointstate_schema
      component: hakoniwa-pdu-registry
      action: Prepare the sensor_msgs/msg/JointState ros2msg bundle in the registry ROS 2 Jazzy Docker environment and copy it to hakoniwa-pdu-foxglove/work/schemas/ros2_jazzy/sensor_msgs/msg/JointState.bundle.msg.
      agency: agent_action
    - order: 2
      id: run_shadow_hand_base
      component: hakoniwa-mujoco-robots
      action: Start the verified Shadow Hand plant and bounded finger-motion sender.
      agency: agent_action
    - order: 3
      id: start_shm_to_tcp_bridge
      component: hakoniwa-pdu-bridge-core
      action: Bridge ShadowHandAsset/joint_states from callback SHM to TCP using config/shadow_hand_bridge.
      agency: agent_action
    - order: 4
      id: convert_native_jointstate_to_cdr
      component: hakoniwa-pdu-registry
      action: Decode the native JointState PDU and encode complete JointState CDR in the Python converter.
      agency: agent_action
    - order: 5
      id: publish_cdr_to_foxglove
      component: hakoniwa-pdu-foxglove
      action: Write length-prefixed CDR to cdr_stdin_publisher and publish it through FoxgloveComm at ws://127.0.0.1:8766.
      agency: agent_action
    - order: 6
      id: fetch_shadow_robot_visualization
      component: hakoniwa-mbody-registry
      action: Clone shadow-robot/sr_common noetic-devel under work/shadow_hand_source_urdf.
      agency: agent_action
    - order: 7
      id: expand_shadow_robot_xacro
      component: hakoniwa-mbody-registry
      action: Expand sr_hand.urdf.xacro with explicit --package sr_description=PATH and E3M5/right/all/pst arguments.
      agency: agent_action
    - order: 8
      id: prepare_foxglove_urdf
      component: hakoniwa-pdu-foxglove
      action: Rewrite package://sr_description mesh URIs and set rh_world_joint root rpy to -1.5707963267948966 0 -1.5707963267948966.
      agency: agent_action
    - order: 9
      id: serve_urdf
      component: hakoniwa-pdu-foxglove
      action: Serve work/urdf/shadow_hand with CORS on http://127.0.0.1:8767.
      agency: agent_action
    - order: 10
      id: configure_foxglove_3d
      component: hakoniwa-pdu-foxglove
      action: Connect Foxglove, load shadow_hand_right.urdf, select Joint states mode and /hakoniwa/ShadowHandAsset/joint_states, and enable Ignore COLLADA <up_axis>.
      agency: human_action
  observability:
    success_signals:
      - Shadow Hand moves in MuJoCo.
      - Bridge and converter logs show repeated JointState CDR publication.
      - Foxglove Raw Messages decodes 24 joint names and state arrays.
      - Foxglove 3D hand geometry is connected correctly after enabling Ignore COLLADA <up_axis>.
      - Finger motion in Foxglove follows the MuJoCo simulation.
      - No /tf topic is required for the URDF Joint states control path.
    failure_signals:
      - JointState.bundle.msg is missing from work/schemas/ros2_jazzy/sensor_msgs/msg.
      - Native Hakoniwa PDU bytes are sent directly as if they were CDR.
      - Foxglove cannot resolve the bundled JointState schema.
      - DAE mesh segments appear disconnected because Ignore COLLADA <up_axis> is disabled.
      - Whole-hand orientation differs because rh_world_joint preparation is missing.
      - URDF loads but does not move because Joint states mode/topic is not configured.

expected_result: >
  On macOS arm64, the MuJoCo Menagerie Shadow Hand runs as a Hakoniwa asset and
  publishes sensor_msgs/JointState-compatible state. The verified bridge and
  conversion path publishes complete CDR through a local Foxglove WebSocket
  server. Foxglove decodes the JointState topic with the locally staged ros2msg
  schema and animates the upstream Shadow Robot URDF in 3D from the same joint
  positions, without running ROS 2 and without requiring /tf.

