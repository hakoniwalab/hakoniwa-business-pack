id: shadow-hand-hakoniwa-to-foxglove
title: Shadow Hand Hakoniwa Joint State to Foxglove
recipe_version: 0.1

goal:
  user_request: 箱庭で動かしている Shadow Hand の関節状態を Foxglove に連携し、リアルタイムに観測したい。
  description: >
    Extend the Shadow Hand Hakoniwa plant with an output-only Foxglove path.
    Keep the command path unchanged, publish JointState-compatible state, convert
    it explicitly to complete Foxglove-compatible CDR using Registry-generated
    artifacts, then forward it through hakoniwa-pdu-foxglove for Raw Messages,
    Plot, and URDF-backed 3D visualization.

feasibility:
  status: partially_feasible
  confidence: high
  rationale:
    - The base Shadow Hand Recipe now verifies JointState-compatible output as the observation boundary.
    - hakoniwa-pdu-registry contains generated C++/Python/JavaScript CDR converters for sensor_msgs/JointState.
    - hakoniwa-pdu-foxglove publishes caller-provided complete CDR over the official Foxglove SDK WebSocket server.
    - The Foxglove adapter supports explicit schema configuration.
    - It intentionally does not convert Hakoniwa native PDU binary to CDR, so conversion must stay explicit.
    - hakoniwa-pdu-bridge-core can bridge the native ShadowHandAsset/joint_states PDU from callback SHM to TCP when it is launched as a Hakoniwa asset after the Shadow Hand conductor-owning asset.
    - The Foxglove schema file should come from ROS 2 Jazzy native message definitions when using ros2msg; fetch or copy sensor_msgs/msg/JointState.msg and its dependencies from the Docker-based registry generation environment if they are not already vendored locally.
    - Do not assume registry native JSON schema is accepted by hakoniwa-pdu-foxglove v0.1.
    - Raw Messages and Plot do not require URDF; Foxglove 3D additionally needs a URDF whose joint names match the JointState observation contract.
    - For browser-based Foxglove, locally generated URDF and OBJ artifacts should be served from hakoniwa-pdu-foxglove/work with CORS enabled.
    - If an original Shadow Hand URDF/xacro is used for Foxglove 3D, keep it and all derived visualization artifacts under hakoniwa-pdu-foxglove/work because GPL-derived sources must not be committed to this repository.
    - MJCF-to-URDF reverse generation is available only as an experimental license-clean fallback; visual fidelity was not sufficient for the final Foxglove 3D path.

validation:
  status: partially_verified
  summary: >
    The component contracts are repository-backed, the base Shadow Hand
    JointState path is verified, registry-generated sensor_msgs/JointState CDR
    converters are present, and the native JointState SHM-to-TCP bridge path has
    been smoke-tested through hakoniwa-pdu-bridge-core launched as a Hakoniwa
    asset. The TCP native PDU receive -> typed decode -> complete CDR encode ->
    FoxgloveComm send path has also been smoke-tested. Manual Foxglove UI
    connection decoded Raw Messages for /hakoniwa/ShadowHandAsset/joint_states.
    Experimental MJCF-derived local URDF and mesh bundles were generated and
    served over HTTP with CORS, but Foxglove 3D rendering showed visual frame
    mismatches. The recommended 3D path is now a gitignored work/ local URDF
    artifact when the operator has an acceptable local source.
  steps:
    - id: inspect_shadow_hand_license
      status: verified
      evidence:
        - repository: google-deepmind/mujoco_menagerie
          path: shadow_hand/LICENSE
          revision: main
      notes:
        - Reuse the base Recipe license gate.
    - id: inspect_foxglove_contract
      status: verified
      evidence:
        - repository: hakoniwalab/hakoniwa-pdu-foxglove
          path: README.md
          revision: main
      notes:
        - send input must be complete Foxglove-compatible CDR.
        - Native Hakoniwa PDU binary must not be passed directly unless it is already valid CDR.
    - id: inspect_foxglove_sample
      status: verified
      evidence:
        - repository: hakoniwalab/hakoniwa-pdu-foxglove
          path: examples/cdr-publisher
          revision: main
      notes:
        - The sample demonstrates the generated-converter plus Endpoint::set_comm publication pattern.
    - id: shadow_hand_jointstate_cdr
      status: verified
      evidence:
        - repository: local/hakoniwa-pdu-registry
          path: pdu/types/sensor_msgs/pdu_cpptype_cdr_conv_JointState.hpp
          revision: local-working-tree-2026-07-23
        - repository: local/hakoniwa-pdu-registry
          path: pdu/python/sensor_msgs/pdu_cdr_conv_JointState.py
          revision: local-working-tree-2026-07-23
        - repository: local/hakoniwa-pdu-registry
          path: pdu/javascript/sensor_msgs/pdu_cdr_conv_JointState.js
          revision: local-working-tree-2026-07-23
      notes:
        - The selected state type is sensor_msgs/JointState.
        - C++/Python/JavaScript CDR converter artifacts exist locally.
        - The bridge must produce complete CDR bytes, including CDR encapsulation.
        - The Foxglove schema should use ros2msg with the ROS 2 Jazzy native sensor_msgs/msg/JointState.msg file unless a deliberate ros2idl/omgidl alternative is chosen.
        - The ROS 2 Jazzy native schema artifacts should be fetched from toppersjp/hakoniwa-pdu-registry-dev:v1.0.0 into hakoniwa-pdu-foxglove/work.
        - Keep copied schema files as local temporary work artifacts; do not commit them.
        - JointState depends on std_msgs/Header, which depends on builtin_interfaces/Time; preserve these dependencies for Foxglove schema validation.
    - id: shadow_hand_native_to_cdr_bridge
      status: verified
      evidence:
        - repository: local/hakoniwa-pdu-foxglove
          path: examples/shadow-hand-jointstate-to-foxglove/shadow_hand_jointstate_to_foxglove.py
          revision: local-working-tree-2026-07-23
        - repository: local/hakoniwa-pdu-foxglove
          path: examples/cdr-stdin-publisher/main.cpp
          revision: local-working-tree-2026-07-23
        - repository: local/hakoniwa-pdu-foxglove
          path: launch/shadow-hand-foxglove-smoke.launch.json
          revision: local-working-tree-2026-07-23
      notes:
        - The Python bridge receives native ShadowHandAsset/joint_states from the TCP endpoint, decodes it with the generated JointState native PDU converter, encodes it with the generated JointState CDR converter, and writes length-prefixed CDR frames to cdr_stdin_publisher.
        - Smoke evidence included `sent JointState CDR samples=160 joints=24 bytes=908 ...` and `published CDR frame samples=160 bytes=908`.
        - Foxglove WebSocket server started at ws://127.0.0.1:8766 for topic /hakoniwa/ShadowHandAsset/joint_states.
        - "`WARNING: No subscribers found ...` is expected when the Foxglove UI is not connected; it does not invalidate CDR publication."
        - This smoke did not use Launcher `after_start`; the non-registering Foxglove TCP-to-CDR publisher was started before `hako-cmd start` so its TCP server endpoint was ready for the bridge asset.
        - In Launcher versions that support `activation_timing`, non-registering helper processes can be moved to `after_start` when they do not need to accept connections before a registering bridge asset starts.
    - id: shadow_hand_shm_to_tcp_bridge
      status: verified
      evidence:
        - repository: local/hakoniwa-pdu-foxglove
          path: config/shadow_hand_bridge
          revision: local-working-tree-2026-07-23
        - repository: local/hakoniwa-pdu-foxglove
          path: launch/shadow-hand-foxglove-smoke.launch.json
          revision: local-working-tree-2026-07-23
        - repository: local/hakoniwa-pdu-bridge-core
          path: src/web_bridge_daemon.cpp
          revision: local-working-tree-2026-07-23
      notes:
        - The bridge must be launched with the Hakoniwa asset lifecycle because callback SHM requires asset registration.
        - In this demo, ShadowHandAsset must start first because it owns the conductor.
        - Launch order is ShadowHandAsset, downstream TCP-to-CDR Foxglove publisher, ShadowHandBridge, then command sender.
        - The verified TCP payload remains native Hakoniwa PDU binary; it is not CDR.
        - Earlier smoke evidence was repeated TCP reader `recv bytes=4096` output for ShadowHandAsset/joint_states while the hand sender changed joint values.
        - Current smoke evidence reached the downstream CDR publisher instead of the debug TCP reader.
        - If a downstream process does not register as a Hakoniwa asset, recipe authors should decide whether it belongs before or after `hako-cmd start`; this case kept it before start as a TCP server dependency.
    - id: shadow_hand_foxglove_live_plot
      status: verified
      evidence:
        - source: user-observed-foxglove-web-ui
          date: "2026-07-23"
      notes:
        - User confirmed the Foxglove topic was visible.
        - User screenshot showed Raw Messages decoding sensor_msgs/msg/JointState with header, 24 joint names, position, velocity, and effort arrays.
        - Plot remains a UI-level follow-up, but decoded value visibility is verified.
    - id: shadow_hand_foxglove_mjcf_urdf_generation
      status: verified
      evidence:
        - repository: local/hakoniwa-pdu-foxglove
          path: tools/mjcf_shadow_hand_to_urdf.py
          revision: local-working-tree-2026-07-23
        - repository: local/hakoniwa-pdu-foxglove
          path: work/urdf/shadow_hand/shadow_hand_right.urdf
          revision: gitignored-local-work-artifact-2026-07-23
        - repository: local/hakoniwa-pdu-foxglove
          path: tools/serve_static_cors.py
          revision: local-working-tree-2026-07-23
      notes:
        - Menagerie right_hand.xml was converted into a visualization URDF with 26 links, 24 revolute joints, and 24 mesh visuals as an experimental fallback.
        - A baked static URDF was also generated from MuJoCo world-space visual geoms for frame debugging.
        - The generated URDF kept the observed joint names used by ShadowHandAsset/joint_states.
        - Generated OBJ files were placed under hakoniwa-pdu-foxglove/work/urdf/shadow_hand/assets as gitignored temporary artifacts.
        - "HTTP checks for generated URDF and OBJ files returned 200 OK with Access-Control-Allow-Origin: *."
        - User-visible Foxglove 3D rendering still showed part orientation/frame mismatch; this fallback is not accepted as the final visualization route.
        - The URDF is only a Foxglove visualization artifact; MuJoCo remains the physics and tendon-coupling source of truth.
    - id: shadow_hand_foxglove_local_source_urdf_policy
      status: verified
      evidence:
        - repository: local/hakoniwa-pdu-foxglove
          path: tools/prepare_shadow_hand_original_urdf.py
          revision: local-working-tree-2026-07-23
        - repository: local/hakoniwa-pdu-foxglove
          path: work/urdf/shadow_hand/shadow_hand_original.urdf
          revision: gitignored-local-work-artifact-2026-07-23
      notes:
        - Original Shadow Hand URDF/xacro inputs may be used as local operator-provided visualization inputs only.
        - Store such inputs under hakoniwa-pdu-foxglove/work/shadow_hand_source_urdf and keep work/ gitignored.
        - Store generated Foxglove-ready URDF and mesh outputs under hakoniwa-pdu-foxglove/work/urdf/shadow_hand and do not commit them.
        - Public recipes and README may document the work/ layout and commands, but must not vendor GPL-derived URDF/xacro/mesh files or their derived generated artifacts.
        - tools/prepare_shadow_hand_original_urdf.py prepares shadow_hand_original.urdf from the local sr_description/mujoco_models/urdfs/shadowhand_motor.urdf source and rewrites mesh URLs for the local CORS HTTP server.
        - The prepared URDF retained all 24 JointState joint names and rewrote 28 mesh references to existing local STL files under sr_description/mujoco_models/meshes/arm_and_hand_meshes/visual.
    - id: shadow_hand_foxglove_3d_panel
      status: not_tested
      notes:
        - The work-only original-URDF artifacts are mechanically prepared and ready for manual Foxglove 3D review.
        - Start launch/shadow-hand-foxglove-browser.launch.json, connect Foxglove to ws://127.0.0.1:8766, add a URDF custom layer from http://127.0.0.1:8767/shadow_hand_original.urdf, and bind it to /hakoniwa/ShadowHandAsset/joint_states.
        - Do not claim final Foxglove 3D success from the MJCF-derived fallback until the visible hand geometry and joint animation are reviewed.

agency_boundary:
  agent_actions:
    - id: inspect_authorized_sources
      description: Inspect the Shadow Hand license plus authorized Foxglove component source and samples.
      autonomous: true
      preconditions:
        - user_requested_execution
        - foxglove_component_access
    - id: generate_foxglove_configs
      description: Generate JointState CDR/schema mapping, bridge boundary, and Foxglove communication configuration.
      autonomous: true
      preconditions:
        - user_requested_execution
        - target_environment_confirmed
        - foxglove_component_access
        - shadow_hand_license_checked
  human_decisions:
    - id: choose_visualization_scope
      description: Decide whether Raw Messages and Plot are sufficient or whether a local work/-only URDF-backed 3D view is required.
      status: required
      required_before:
        - foxglove_3d_extension
  human_actions:
    - id: connect_foxglove_app
      description: Open Foxglove and connect to the configured local WebSocket server when manual UI connection is required.
      status: required
      confirmation_required: true
      required_before:
        - claim_live_ui_visualization
  required_permissions:
    - id: shadow_hand_license_checked
      description: Confirm upstream Apache-2.0 notice and attribution obligations before redistributing copied model artifacts.
      status: required
      required_before:
        - redistribute_shadow_hand_artifacts
    - id: foxglove_component_access
      description: Confirm access and entitlement to the private commercial hakoniwa-pdu-foxglove component.
      status: required
      required_before:
        - use_hakoniwa_pdu_foxglove

constraints:
  - depends-on-shadow-hand-base-recipe
  - license-check-first
  - commercial-component-access-required
  - output-only-foxglove
  - cdr-conversion-explicit
  - no-native-pdu-as-cdr-assumption
  - launch-conductor-owning-asset-first
  - use-hakoniwa-launcher-for-multi-asset-demo
  - single-pc
  - foxglove-3d-uses-urdf-from-gitignored-work-artifacts
  - browser-urdf-assets-require-local-http-cors

