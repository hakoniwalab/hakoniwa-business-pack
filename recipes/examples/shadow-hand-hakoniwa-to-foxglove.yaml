      required: true
      version: unknown
      path: unknown
    - name: ROS 2 native message definitions
      required: true
      version: Jazzy
      path: hakoniwa-pdu-foxglove/work/schemas/ros2_jazzy or Docker-based hakoniwa-pdu-registry generation environment
    - name: Foxglove App
      required: true
      version: unknown
      path: unknown
    - name: C++ toolchain
      required: true
      version: "C++20"
      path: unknown
  hakoniwa:
    install_prefix: /usr/local/hakoniwa
    components_built:
      - hakoniwa-core-pro
      - hakoniwa-mujoco-robots
      - hakoniwa-pdu-endpoint
      - hakoniwa-pdu-registry
      - hakoniwa-pdu-foxglove

execution_environment:
  required_for: executable-demo
  status: partially_known
  gui:
    required: true
    status: unknown
  shared_memory:
    required: true
    access: required-for-shadow-hand-plant
  network:
    required: true
    scope: localhost-websocket
  hakoniwa:
    install_prefix: /usr/local/hakoniwa
    hako_cmd_access: unknown

components:
  - id: hakoniwa-mujoco-robots
    roles:
      - physics_runtime
      - simulation_core
    purpose: Run the Shadow Hand model and produce JointState-compatible state.
  - id: hakoniwa-core-pro
    roles:
      - simulation_core
      - time_sync
    purpose: Coordinate the Shadow Hand plant lifecycle and simulation time.
  - id: hakoniwa-pdu-registry
    roles:
      - registry
      - data_model
      - code_generator
    purpose: Provide the selected state PDU definition, generated CDR converter, and schema asset.
  - id: hakoniwa-pdu-endpoint
    roles:
      - communication_infrastructure
      - integration_boundary
    purpose: Provide the Endpoint/PduComm boundary used by the Foxglove adapter.
  - id: hakoniwa-pdu-bridge-core
    roles:
      - bridge
      - communication_infrastructure
    purpose: Bridge native Hakoniwa PDU bytes from callback SHM to TCP as a Hakoniwa asset.
  - id: hakoniwa-pdu-foxglove
    roles:
      - visualizer
      - bridge
      - integration_boundary
    purpose: Publish complete CDR payloads through Foxglove WebSocket.

connections:
  - from: hakoniwa-mujoco-robots
    to: hakoniwa-pdu-endpoint
    interface: pdu
    data:
      - JointState-compatible state
    contract:
      status: not_tested
      requires:
        - Base Shadow Hand plant Recipe completed.
        - Stable joint-name ordering.
      validation_notes:
        - State publication remains untested for Shadow Hand.
  - from: hakoniwa-pdu-registry
    to: hakoniwa-pdu-endpoint
    interface: generated-artifact
    data:
      - CDR converter
      - schema file
      - PDU definition
    contract:
      status: not_tested
      requires:
        - Generated converter for the exact selected JointState-compatible type.
        - ROS 2 Jazzy native sensor_msgs/msg/JointState.msg when schema.encoding is ros2msg.
        - ROS 2 Jazzy native std_msgs/msg/Header.msg and builtin_interfaces/msg/Time.msg dependencies.
        - Complete CDR output including required encapsulation.
      validation_notes:
        - sensor_msgs/JointState CDR converters exist locally; Jazzy native .msg files are now fixed as recipe artifacts, but the final Foxglove dependency-bundling format remains open.
  - from: hakoniwa-pdu-endpoint
    to: hakoniwa-pdu-foxglove
    interface: PduComm adapter / Endpoint::set_comm
    data:
      - PDU key
      - complete CDR payload
    contract:
      status: verified
      requires:
        - A bridge/application codec layer must decode ShadowHandAsset/joint_states from Hakoniwa native PDU.
        - The bridge must convert the typed HakoCpp_JointState or Python JointState object to CDR with a registry-generated converter.
        - The bridge must send the resulting CDR bytes to a FoxgloveComm-backed Endpoint.
        - Explicit Foxglove communication configuration.
        - Explicit schema name, encoding, and file.
      validation_notes:
        - This is the documented component architecture; Shadow Hand-specific runtime remains untested.
        - The explicit bridge/application codec layer is required because FoxgloveComm does not consume Hakoniwa native PDU bytes.

data_flow:
  summary: >
    The Shadow Hand plant publishes native Hakoniwa sensor_msgs/JointState PDU.
    A bridge/application layer decodes that native PDU into the generated typed
    representation, uses registry-generated CDR conversion to create complete
    Foxglove-compatible CDR, then passes those CDR bytes to a FoxgloveComm-backed
    Endpoint. FoxgloveComm forwards the bytes unchanged with explicit schema metadata.
  steps:
    - from: hakoniwa-mujoco-robots
      to: hakoniwa-pdu-endpoint
      data:
        - JointState-compatible state PDU
      description: Publish state from the Shadow Hand plant.
    - from: hakoniwa-pdu-registry
      to: hakoniwa-pdu-endpoint
      data:
        - generated CDR conversion artifacts
        - schema asset
      description: Make conversion and ROS 2 Jazzy native schema resolution explicit rather than implicit in FoxgloveComm.
    - from: hakoniwa-pdu-endpoint
      to: hakoniwa-pdu-foxglove
      data:
        - complete CDR payload
      description: A bridge/application layer sends complete CDR payloads through an Endpoint with FoxgloveComm injected by Endpoint::set_comm().
    - from: hakoniwa-pdu-foxglove
      to: external-foxglove-app
      data:
        - schema-aware WebSocket topic
      description: Observe decoded values in Raw Messages and Plot; this external client is not a Catalog component.

time_model:
  mode: shared-simulation-time-with-wall-clock-foxglove-log-time
  components:
    - hakoniwa-core-pro
    - hakoniwa-mujoco-robots
    - hakoniwa-pdu-endpoint
    - hakoniwa-pdu-foxglove
  notes:
    - Shadow Hand simulation follows Hakoniwa simulation time.
    - Current hakoniwa-pdu-foxglove v0.1 records wall-clock log time and does not broadcast simulation time.

