      - pdu/types/sensor_msgs/pdu_cpptype_cdr_conv_JointState.hpp in hakoniwa-pdu-registry
      - pdu/python/sensor_msgs/pdu_cdr_conv_JointState.py in hakoniwa-pdu-registry
      - pdu/javascript/sensor_msgs/pdu_cdr_conv_JointState.js in hakoniwa-pdu-registry
