  - component_id: hakoniwa-core-pro
    catalog_path: ../catalog/components/hakoniwa-core-pro.yaml
  - component_id: hakoniwa-pdu-registry
    catalog_path: ../catalog/components/hakoniwa-pdu-registry.yaml
  - component_id: hakoniwa-pdu-endpoint
    catalog_path: ../catalog/components/hakoniwa-pdu-endpoint.yaml
  - component_id: hakoniwa-pdu-python
    catalog_path: ../catalog/components/hakoniwa-pdu-python.yaml

