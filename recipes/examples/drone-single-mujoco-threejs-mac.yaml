      - drone_api/external_rpc apps or custom single-drone flight script
    notes:
      - Existing scripts can generate a one-drone launch config, but the default Mac binary path may need environment overrides.
      - Local validation required absolute HAKO_THREEJS_VIEWER_PATH.

artifacts:
  - name: mac-drone-service-binary
    kind: command
    producer: hakoniwa-drone-core
    consumer:
      - hakoniwa-drone-core
    path: lib/mac-main_hako_drone_service
  - name: mac-visual-state-publisher-binary
    kind: command
    producer: hakoniwa-drone-core
    consumer:
      - hakoniwa-drone-core
    path: lib/mac-drone_visual_state_publisher
  - name: mujoco-dylib
    kind: command
    producer: hakoniwa-drone-core
    consumer:
      - hakoniwa-drone-core
    path: vendor/mujoco/lib/libmujoco.3.9.0.dylib
  - name: fleets-viewer-url
    kind: command
    producer: hakoniwa-threejs-drone
    consumer:
      - hakoniwa-threejs-drone
    path: http://127.0.0.1:8000/index.html?viewerConfigPath=/config/viewer-config-fleets.json&wsUri=ws://127.0.0.1:8765&wireVersion=v2

missing_pieces:
  - Record browser-side evidence that Three.js Connect succeeds and rendered drone pose updates are visible.
  - Decide whether to keep using run_single_mission.bash or create a smaller named one-drone demo script for this Recipe.
  - Decide whether MuJoCo native viewer should also be enabled, or whether Three.js is the only intended visual output.

demo:
  objective: >
    Show one Hakoniwa Drone taking off, moving through a short scripted path,
    and landing while its pose updates in the Three.js browser viewer.
  steps:
    - order: 1
      component: hakoniwa-core-pro
      action: Run the Business Pack common preflight.
      command: bash tools/doctor-mac.bash
      evidence:
        - repository: hakoniwalab/hakoniwa-business-pack
          path: tools/doctor-mac.bash
          revision: local-validation-2026-07-20
    - order: 2
      component: hakoniwa-drone-core
      action: Download Mac prebuilt Hakoniwa Drone binaries.
      command: bash tools/fetch_libs.sh
      evidence:
        - repository: toppers/hakoniwa-drone-core
          path: tools/fetch_libs.sh
          revision: local-research-2026-07-20
    - order: 3
      component: hakoniwa-drone-core
      action: Install MuJoCo for macOS under vendor/mujoco.
      command: bash tools/install-mujoco-mac.bash .
      evidence:
        - repository: toppers/hakoniwa-drone-core
          path: tools/install-mujoco-mac.bash
          revision: local-research-2026-07-20
    - order: 4
      component: hakoniwa-drone-core
      action: Patch Mac binary rpath so the drone service can load MuJoCo.
      command: bash tools/link-mujoco-mac.bash ./lib --lib-dir ./vendor/mujoco/lib
      evidence:
        - repository: toppers/hakoniwa-drone-core
          path: tools/link-mujoco-mac.bash
          revision: local-research-2026-07-20
    - order: 5
      component: hakoniwa-pdu-python
      action: Confirm Python 3.12 can import required Hakoniwa modules.
      command: python3.12 -c "import hakopy; import hakoniwa_pdu"
      evidence:
        - repository: hakoniwalab/hakoniwa-business-pack
          path: docs/hakoniwa-runtime-primer.md
          revision: local-research-2026-07-20
    - order: 6
      component: hakoniwa-drone-core
      action: Launch one-drone runtime, visual-state publisher, WebBridge, and Three.js webserver with Mac binary path overrides.
      command: >
        PYTHON_BIN=python3.12 HAKO_DRONE_SERVICE_BIN=./lib/mac-main_hako_drone_service
        HAKO_VISUAL_STATE_PUBLISHER_BIN=./lib/mac-drone_visual_state_publisher
        HAKO_THREEJS_VIEWER_PATH=/absolute/path/to/hakoniwa-threejs-drone
        bash tools/launch-fleets-scale-perf.bash 1 "" 1
      evidence:
        - repository: toppers/hakoniwa-drone-core
          path: tools/launch-fleets-scale-perf.bash
          revision: local-research-2026-07-20
    - order: 7
      component: hakoniwa-threejs-drone
      action: Open the fleets viewer and ask the user to press Connect.
      command: >
        open 'http://127.0.0.1:8000/index.html?viewerConfigPath=/config/viewer-config-fleets.json&wsUri=ws://127.0.0.1:8765&wireVersion=v2'
      evidence:
        - repository: hakoniwalab/hakoniwa-threejs-drone
          path: README.md
          revision: local-research-2026-07-20
    - order: 8
      component: hakoniwa-pdu-python
      action: Run a Python external_rpc command sequence for one drone.
      command: >
        PATH=/path/to/python3.12/bin:$PATH bash drone_api/external_rpc/apps/run_single_mission.bash
        --drone Drone-1 --alt 1.0 --x 1.5 --y 0.5 --z 1.0 --yaw 30
        --speed 1.0 --timeout-sec 20 --land
      evidence:
        - repository: toppers/hakoniwa-drone-core
          path: docs/fleets/external-rpc-tutorial.md
          revision: local-research-2026-07-20
  observability:
    success_signals:
      - The Three.js viewer connects to ws://127.0.0.1:8765.
      - One drone appears in the browser.
      - The drone takes off, moves, and lands.
      - Python logs show successful set_ready, takeoff, goto, get_state, and land responses.
      - Drone service or publisher logs show simulation steps and visual-state publication.
    failure_signals:
      - mac-main_hako_drone_service fails to load libmujoco.
      - Python 3.12 cannot import hakopy or hakoniwa_pdu.
      - WebBridge starts but the browser has no DroneVisualStateArray channels.
      - The drone appears but pose does not change after Python commands.
      - Port 8000 or 8765 is already in use.
    fixtures:
      - One generated fleet drone with a matching service config and PDU definition.
      - Browser with WebGL support.
      - WebSocket bridge configured for fleets visual state.
    automation:
      - Use a scripted Python external_rpc controller instead of manual keyboard or joystick input.
      - Prefer hakoniwa-pdu hako_launcher for multi-process lifecycle once the final launch config is confirmed.
      - On macOS, open the Three.js viewer URL automatically after the HTTP server starts, then prompt the user to press Connect.
  verification_checks:
    lifecycle:
      - hako_launcher starts drone-service before hako-cmd start.
      - visual-state-publisher and WebBridge start before or with simulation lifecycle.
      - hako-cmd start succeeds.
      - Long-running processes are stopped by launcher cleanup or explicit hako-cmd stop.
    behavior:
      - Drone position z increases after takeoff.
      - Drone position x or y changes after goto.
      - Drone altitude returns near ground after land.
      - Three.js pose updates track the same movement.
    logs:
      - Python external_rpc prints ok responses for set_ready, takeoff, goto, and land.
      - WebBridge logs show ws=ws://127.0.0.1:8765 or equivalent startup.
      - Browser console reports fleets visual-state channels.

expected_result: >
  On macOS arm64, one Hakoniwa Drone is controlled by a Python 3.12 script and
  is visible in the Three.js browser viewer as it takes off, moves through a
  short path, and lands.

