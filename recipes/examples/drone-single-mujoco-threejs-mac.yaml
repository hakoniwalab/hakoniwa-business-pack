id: drone-single-mujoco-threejs-mac
title: Single Hakoniwa Drone MuJoCo Three.js Demo on macOS
recipe_version: 0.1

goal:
  user_request: Macで箱庭ドローンを1台飛ばし、Python APIで動かしてThree.jsで可視化したい
  description: >
    Run one Hakoniwa Drone instance on macOS arm64, control it from a Python
    3.12 external_rpc script, publish visual state from the simulator into
    Hakoniwa PDU shared memory, bridge that state to WebSocket, and observe the
    drone in the Three.js browser viewer.

feasibility:
  status: feasible
  confidence: medium
  rationale:
    - hakoniwa-drone-core provides macOS prebuilt binaries, MuJoCo drone service, DroneVisualStatePublisher, and Python external_rpc APIs.
    - hakoniwa-threejs-drone documents a fleets viewer mode that consumes DroneVisualStateArray through WebSocket.
    - hakoniwa-pdu-bridge-core provides the WebSocket bridge configuration used by the Three.js fleets viewer.
    - The Mac binary acquisition and MuJoCo dylib link steps are documented, but this exact Recipe has not yet been executed end-to-end.

validation:
  status: partially_verified
  summary: >
    The Mac one-drone runtime was launched locally on 2026-07-20 with
    hakoniwa-drone-core release binaries under ./lib, MuJoCo 3.9.0 linked into
    those binaries, Python 3.12 external_rpc control, DroneVisualStatePublisher,
    WebBridge, and the Three.js HTTP server. Python control and visual-state
    publication were verified from logs. Browser-side Connect and rendered pose
    updates still require manual observation.
  steps:
    - id: mac_binary_setup
      status: verified
      evidence:
        - repository: toppers/hakoniwa-drone-core
          path: tools/fetch_libs.sh
          revision: local-research-2026-07-20
        - repository: toppers/hakoniwa-drone-core
          path: README.md
          revision: local-research-2026-07-20
      notes:
        - tools/fetch_libs.sh downloads the OS release archive and installs binaries into ./lib.
        - Older Mac articles and docs may show manual mac.zip extraction into ./mac.
        - Local validation found executable ./lib/mac-main_hako_drone_service and ./lib/mac-drone_visual_state_publisher.
    - id: mujoco_link_setup
      status: verified
      evidence:
        - repository: toppers/hakoniwa-drone-core
          path: tools/install-mujoco-mac.bash
          revision: local-research-2026-07-20
        - repository: toppers/hakoniwa-drone-core
          path: tools/link-mujoco-mac.bash
          revision: local-research-2026-07-20
      notes:
        - MuJoCo is installed under vendor/mujoco.
        - Release binaries must be patched with an rpath to vendor/mujoco/lib.
        - Local validation ran tools/install-mujoco-mac.bash and tools/link-mujoco-mac.bash against ./lib.
    - id: python_external_rpc_control
      status: verified
      evidence:
        - repository: toppers/hakoniwa-drone-core
          path: drone_api/external_rpc/README.md
          revision: local-research-2026-07-20
        - repository: toppers/hakoniwa-drone-core
          path: docs/fleets/external-rpc-tutorial.md
          revision: local-research-2026-07-20
      notes:
        - The documented command sequence is SetReady, TakeOff, GetState, GoTo, Land.
        - Local validation ran run_single_mission.bash against Drone-1 and received ok=True for takeoff, goto, and land.
    - id: visual_state_and_http_path
      status: verified
      evidence:
        - repository: hakoniwalab/hakoniwa-threejs-drone
          path: README.md
          revision: local-research-2026-07-20
        - repository: hakoniwalab/hakoniwa-pdu-bridge-core
          path: config/web_bridge_fleets/bridge/bridge.json
          revision: local-research-2026-07-20
      notes:
        - The viewer expects a WebSocket stream and fleets viewer configuration.
        - The visual path requires DroneVisualStatePublisher; WebBridge alone does not create visual state.
        - Local validation confirmed VisualStatePublisher publishes DroneVisualStateArray and HTTP server returns 200 for /index.html.
    - id: browser_render_observation
      status: not_tested
      evidence:
        - repository: hakoniwalab/hakoniwa-threejs-drone
          path: README.md
          revision: local-research-2026-07-20
      notes:
        - Browser-side Connect and visible rendered motion were not yet recorded as evidence.
        - On macOS, opening the viewer URL automatically is useful, but the user may still need to press the browser Connect button.

constraints:
  - macos-first
  - single-pc
  - native
  - python-api-control
  - threejs-visualization
  - shared-memory-pdu
  - no-px4
  - no-unity

target_environment:
  required_for: executable-demo
  status: specified
  os: macOS
  os_version: unknown
  architecture: arm64
  execution_mode: native
  runtimes:
    - name: MuJoCo
      required: true
      version: "3.9.0"
      path: vendor/mujoco
    - name: Python
      required: true
      version: "3.12"
      path: unknown
    - name: Browser
      required: true
      version: unknown
      path: unknown
  hakoniwa:
    install_prefix: /usr/local/hakoniwa
    components_built:
      - hakoniwa-core-pro
      - hakoniwa-pdu-bridge-core
      - hakoniwa-drone-core
  notes:
    - This Recipe intentionally targets macOS first. Linux/Docker generalization should be a later Recipe variant.
    - Python 3.12 must be the environment that can import both hakopy and hakoniwa_pdu.

execution_environment:
  required_for: executable-demo
  status: specified
  os: macOS
  os_version: unknown
  architecture: arm64
  execution_mode: native
  gui:
    required: true
    status: unknown
  shared_memory:
    required: true
    access: requires-unsandboxed-command
  devices:
    - name: joystick
      required: false
      available: not_required
  python:
    environment: venv
    hakopy_available: unknown
  hakoniwa:
    install_prefix: /usr/local/hakoniwa
    hako_cmd_access: requires-unsandboxed-command
  notes:
    - Required preflight includes python3.12 import checks for hakopy and hakoniwa_pdu.
    - Ports 8000 and 8765 must be available for the browser viewer and WebSocket bridge.
    - Use an absolute HAKO_THREEJS_VIEWER_PATH. A relative value can be resolved relative to the launch file and point at the wrong directory.
    - For Mac demos, it is acceptable to open the browser automatically and then ask the user to press Connect in the viewer UI.

components:
  - id: hakoniwa-drone-core
    roles:
      - physics_runtime
      - simulation_core
    purpose: Run the MuJoCo drone service, publish drone state, provide DroneVisualStatePublisher, and expose Python external_rpc control APIs.
  - id: hakoniwa-core-pro
    roles:
      - simulation_core
      - time_sync
    purpose: Provide Hakoniwa shared-memory runtime, PDU space, hako-cmd lifecycle, and simulation time.
  - id: hakoniwa-pdu-python
    roles:
      - language_binding
      - control_plane
    purpose: Provide the Python 3.12 launcher/runtime package and PDU/RPC Python bindings used by external_rpc clients.
  - id: hakoniwa-pdu-registry
    roles:
      - data_model
      - registry
    purpose: Provide PDU type contracts for drone service RPC, drone state, and visual-state packets.
  - id: hakoniwa-pdu-bridge-core
    roles:
      - bridge
      - communication_infrastructure
    purpose: Bridge DroneVisualStateArray from shared memory to WebSocket for browser consumption.
  - id: hakoniwa-threejs-drone
    roles:
      - visualizer
    purpose: Render the drone in a browser using the fleets viewer configuration and WebSocket PDU stream.

connections:
  - from: hakoniwa-core-pro
    to: hakoniwa-drone-core
    interface: pdu
    data:
      - shared-memory-pdu-space
      - simulation-time
      - hako-cmd lifecycle
    contract:
      status: verified
      requires:
        - hakoniwa-core-pro-installed-under-usr-local-hakoniwa
        - one-conductor-for-the-demo
        - shared-memory-access
      validation_notes:
        - Local validation showed drone-service-1 registered DroneService entries and reached WAIT RUNNING after hako-cmd start.
    notes: The drone service owns the simulated drone runtime and participates in Hakoniwa lifecycle.
  - from: hakoniwa-pdu-python
    to: hakoniwa-drone-core
    interface: api
    data:
      - DroneSetReady
      - DroneTakeOff
      - DroneGetState
      - DroneGoTo
      - DroneLand
    contract:
      status: verified
      requires:
        - python3.12
        - hakopy importable in the same Python environment
        - hakoniwa_pdu importable in the same Python environment
        - generated service config matching the active fleet config
      validation_notes:
        - Local validation ran run_single_mission.bash with pyenv Python 3.12 and received successful takeoff, goto, and land responses.
    notes: Python control is external to the simulator asset and joins through Hakoniwa SHM/RPC.
  - from: hakoniwa-drone-core
    to: hakoniwa-pdu-bridge-core
    interface: pdu
    data:
      - DroneVisualStateArray
    contract:
      status: verified
      requires:
        - DroneVisualStatePublisher running
        - web_bridge_fleets configuration
        - matching DroneVisualStateArray PDU definition
      validation_notes:
        - Local validation showed DroneVisualStatePublisher collecting Drone-1 pose and publishing DroneVisualStateArray chunks.
    notes: DroneVisualStatePublisher is the adapter between drone simulation state and browser-oriented visual state.
  - from: hakoniwa-pdu-bridge-core
    to: hakoniwa-threejs-drone
    interface: pdu
    data:
      - WebSocket DroneVisualStateArray stream
    contract:
      status: partially_verified
      requires:
        - WebSocket endpoint on ws://127.0.0.1:8765
        - viewer-config-fleets.json
        - wireVersion=v2
      validation_notes:
        - Local validation confirmed WebBridge startup and HTTP 200 from the Three.js webserver.
        - Browser Connect and rendered pose updates remain to be manually verified.
    notes: The browser viewer is an external observer; it does not run physics or own Hakoniwa simulation time.

data_flow:
  summary: >
    The drone service simulates one drone and exposes control services through
    Hakoniwa PDU/RPC. A Python external_rpc script sends flight commands. The
    visual-state publisher converts the drone state into DroneVisualStateArray.
    The WebBridge transfers that PDU from shared memory to WebSocket, and the
    Three.js viewer renders the result in the browser.
  steps:
    - from: Python external_rpc client
      to: hakoniwa-drone-core
      data:
        - set_ready
        - takeoff
        - goto
        - land
      description: Python 3.12 commands the single drone through the Hakoniwa RPC service definitions.
    - from: hakoniwa-drone-core
      to: DroneVisualStatePublisher
      data:
        - drone state PDU
      description: Runtime drone state is read and converted into the viewer-facing visual-state packet.
    - from: DroneVisualStatePublisher
      to: hakoniwa-pdu-bridge-core
      data:
        - DroneVisualStateArray
      description: Visual state is published into shared memory for the bridge.
    - from: hakoniwa-pdu-bridge-core
      to: hakoniwa-threejs-drone
      data:
        - DroneVisualStateArray over WebSocket
      description: Browser receives the compact visual-state stream over ws://127.0.0.1:8765.

time_model:
  mode: shared-simulation-time
  components:
    - hakoniwa-core-pro
    - hakoniwa-drone-core
    - hakoniwa-pdu-bridge-core
  notes:
    - Process startup and simulation start are separate.
    - Long-running Hakoniwa assets should be launcher-managed where possible.
    - The browser viewer and Python external client are external participants; they observe or command through PDU/RPC but do not own simulation time.

