    notes:
      - tools/fetch_libs.sh installs release binaries into ./lib.
      - tools/link-mujoco-mac.bash must target the directory where the binaries were installed.
  visualization_artifacts:
    description: Visual-state publisher, WebBridge fleets configuration, and Three.js viewer config.
    status: partially_verified
    artifacts:
      - lib/mac-drone_visual_state_publisher
      - config/assets/visual_state_publisher/visual_state_publisher.runtime.json
      - web_bridge_fleets configuration
      - config/viewer-config-fleets.json
    notes:
      - DroneVisualStatePublisher is required; WebBridge alone is insufficient.
      - Local logs confirmed visual-state publication. Browser rendering remains manual observation evidence.
