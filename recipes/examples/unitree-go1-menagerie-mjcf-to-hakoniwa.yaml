id: unitree-go1-menagerie-mjcf-to-hakoniwa
title: Unitree Go1 Menagerie MJCF to Hakoniwa MuJoCo Recipe
recipe_version: 0.1

goal:
  user_request: MuJoCo Menagerie の Unitree Go1 四足歩行ロボット MJCF サンプルを起点に、箱庭 MuJoCo runtime へ接続するレシピを作りたい。
  description: >
    Use the curated Unitree Go1 MJCF model from MuJoCo Menagerie directly
    instead of starting from URDF conversion. Treat the first executable scope
    as a Step 1 joint I/O smoke sample: load the Go1 scene, map the 12 position
    actuators, apply home and small bounded joint-position targets, and observe
    joint/trunk state. Full walking control is a later external-controller
    integration step, not part of this recipe's first implementation target.

feasibility:
  status: partially_feasible
  confidence: medium
  rationale:
    - MuJoCo Menagerie provides a curated Unitree Go1 MJCF model and a scene.xml that includes the model with a plane and light.
    - The Go1 MJCF already defines 12 position actuators and a home keyframe, so Step 1 can use joint-position targets rather than gait generation.
    - hakoniwa-mujoco-robots already accepts MuJoCo model XML inputs and contains actuator examples and staged MuJoCo-only validation patterns.
    - Hakoniwa runtime integration is credible through existing Core/PDU/Endpoint/Python patterns, but a Go1-specific plant asset, PDU schema, and actuator adapter still need implementation.
    - Walking control is intentionally deferred because actuator availability does not imply a stable gait controller.

validation:
  status: not_tested
  summary: >
    This recipe has been authored from catalog evidence and upstream source
    inspection only. The Unitree Go1 source files were inspected and show an
    MJCF scene, 12 position actuators, and a home keyframe, but no local MuJoCo
    load, Hakoniwa build, PDU wiring, joint smoke sample, or walking controller
    runtime has been executed for this recipe yet.
  steps:
    - id: inspect_menagerie_go1_scene
      status: verified
      evidence:
        - repository: google-deepmind/mujoco_menagerie
          path: unitree_go1/scene.xml
          revision: main
      notes:
        - scene.xml includes go1.xml and supplies a ground plane, light, and basic visual settings.
    - id: inspect_menagerie_go1_actuators
      status: verified
      evidence:
        - repository: google-deepmind/mujoco_menagerie
          path: unitree_go1/go1.xml
          revision: main
      notes:
        - go1.xml defines 12 position actuators for hip, thigh, and calf joints and a home keyframe with matching qpos and ctrl values.
    - id: mujoco_only_load
      status: not_tested
      evidence:
        - repository: google-deepmind/mujoco_menagerie
          path: unitree_go1/scene.xml
          revision: main
      notes:
        - Load scene.xml with MuJoCo and verify finite model initialization before adding Hakoniwa runtime wiring.
    - id: go1_joint_io_smoke_sample
      status: not_tested
      evidence:
        - repository: hakoniwalab/hakoniwa-mujoco-robots
          path: examples/actuators
          revision: main
      notes:
        - Implement a Step 1 sample that maps the 12 Go1 position actuators by name, applies home ctrl values, and runs a small bounded joint perturbation.
        - This verifies external-control readiness but does not claim walking.
    - id: hakoniwa_pdu_joint_runtime
      status: not_tested
      evidence:
        - repository: hakoniwalab/hakoniwa-mujoco-robots
          path: config
          revision: main
      notes:
        - Requires a Go1-specific plant asset, joint command/state PDU contracts, endpoint config, and Python command sender.
    - id: walking_controller_integration
      status: skipped
      evidence:
        - repository: external
          path: ROS walking controller or gait-controller source
          revision: TBD
      notes:
        - Walking should be added only after Step 1 joint I/O is verified and an external controller contract is selected.

agency_boundary:
  agent_actions:
    - id: inspect_public_sources
      description: Inspect public MuJoCo Menagerie and Hakoniwa catalog/source files.
      autonomous: true
      preconditions:
        - user_requested_execution
    - id: generate_simulation_configs
      description: Generate simulation-only model, PDU, Endpoint, and launcher configuration files.
      autonomous: true
      preconditions:
        - user_requested_execution
        - target_environment_confirmed
    - id: run_step1_joint_smoke
      description: Run MuJoCo-only and Hakoniwa simulation-only joint I/O checks after the user requests local execution.
      autonomous: true
      preconditions:
        - user_requested_execution
        - target_environment_confirmed
        - required_external_sources_available
  human_decisions:
    - id: approve_step1_scope
      description: Decide whether the Step 1 joint I/O sample is sufficient for the first business-pack validation.
      status: required
      required_before:
        - customer_acceptance
    - id: choose_external_controller
      description: Decide whether to connect CHAMP, Unitree SDK/ROS examples, another gait controller, or a custom controller after Step 1.
      status: required
      required_before:
        - walking_demo_claim
  human_actions:
    - id: real_robot_execution
      description: Physically connect or command a real Unitree robot only if the recipe is later extended beyond simulation.
      status: not_required
      confirmation_required: true
      required_before:
        - hardware_execution
  required_permissions:
    - id: menagerie_license_compliance
      description: Confirm that any redistributed Unitree Go1 model artifacts retain required BSD-3-Clause notices from MuJoCo Menagerie / Unitree Robotics.
      status: required
      required_before:
        - redistribute_model_artifacts
  notes:
    - The recipe may claim joint I/O readiness only after the Go1 joint smoke sample is verified.
    - The recipe must not claim walking behavior until a gait controller and behavior checks are verified.
    - The recipe must not cross from simulation to a real Unitree robot without explicit human approval.

constraints:
  - no-urdf-conversion
  - mjcf-source-artifact
  - single-pc
  - simulation-first
  - step1-joint-io-only
  - walking-controller-out-of-scope-in-v0
  - external-model-license-notice-required
  - gui-useful-for-first-validation

target_environment:
  required_for: executable-demo
  status: partially_known
  os: macOS | Linux
  os_version: unknown
  architecture: arm64 | x86_64
  execution_mode: native
  runtimes:
    - name: MuJoCo
      required: true
      version: unknown
      path: unknown
    - name: Python
      required: true
      version: "3"
      path: unknown
    - name: C++ toolchain
      required: true
      version: unknown
      path: unknown
  hakoniwa:
    install_prefix: /usr/local/hakoniwa
    components_built:
      - hakoniwa-core-pro
      - hakoniwa-mujoco-robots
      - hakoniwa-pdu-endpoint
  notes:
    - Use the Business Pack common preflight before Hakoniwa runtime execution.
    - MuJoCo-only model loading can be checked before Hakoniwa shared-memory runtime is available.

execution_environment:
  required_for: executable-demo
  status: partially_known
  os: macOS | Linux
  os_version: unknown
  architecture: arm64 | x86_64
  execution_mode: native
  gui:
    required: true
    status: unknown
  shared_memory:
    required: true
    access: required-for-hakoniwa-runtime
  devices:
    - name: Unitree Go1 hardware
      required: false
      available: not_required
  python:
    environment: venv
    hakopy_available: required-for-hakoniwa-runtime
  hakoniwa:
    install_prefix: /usr/local/hakoniwa
    hako_cmd_access: unknown
  notes:
    - First validation should separate MuJoCo-only model behavior from Hakoniwa PDU runtime behavior.
    - A GUI viewer is useful for stance, contact, and actuator-direction inspection.

implementation_plan:
  phase_order:
    - id: step1_joint_io
      title: Go1 joint I/O smoke sample
      target_repository: hakoniwalab/hakoniwa-mujoco-robots
      scope:
        - Load Menagerie Unitree Go1 scene.xml.
        - Bind 12 position actuators by stable names.
        - Apply the Menagerie home ctrl values.
        - Apply one small bounded perturbation to selected leg joints.
        - Publish or log joint position, joint velocity, and trunk pose.
      explicit_non_goals:
        - No autonomous walking claim.
        - No ROS walking controller yet.
        - No real Unitree hardware.
    - id: step2_pdu_asset
      title: Hakoniwa PDU joint command/state asset
      target_repository: hakoniwalab/hakoniwa-mujoco-robots
      scope:
        - Add command/state PDU contract for 12 joint targets and observed state.
        - Add Python sender for home pose and small perturbation command.
        - Start plant asset first, then hako-cmd start for synchronized stepping.
    - id: step3_external_controller
      title: ROS or external walking controller connection
      target_repository: later
      scope:
        - Select CHAMP, Unitree SDK/ROS, or another controller only after Step 1 and Step 2 are verified.
        - Map controller output to the 12-joint command contract or define an adapter from cmd_vel to joint targets.
        - Add behavior checks before claiming walking.

components:
  - id: hakoniwa-mujoco-robots
    roles:
      - physics_runtime
      - simulation_core
    purpose: Consume the external Unitree Go1 MJCF scene, run MuJoCo, expose joint command/state behavior, and later host the Hakoniwa plant asset.
  - id: hakoniwa-core-pro
    roles:
      - simulation_core
      - time_sync
      - control_plane
    purpose: Provide asset lifecycle, hako-cmd control, shared simulation time, and shared-memory runtime base for the Hakoniwa stage.
  - id: hakoniwa-pdu-registry
    roles:
      - registry
      - data_model
      - code_generator
    purpose: Provide or generate joint command/state PDU definitions for the quadruped control boundary.
  - id: hakoniwa-pdu-endpoint
    roles:
      - communication_infrastructure
      - integration_boundary
    purpose: Carry joint command and state PDU data between the MuJoCo plant asset and external controller or monitor processes.
  - id: hakoniwa-pdu-python
    roles:
      - language_binding
      - control_plane
    purpose: Provide a Python command sender or scripted posture controller for early joint-position input tests.

connections:
  - from: hakoniwa-mujoco-robots
    to: hakoniwa-core-pro
    interface: api
    data:
      - asset lifecycle
      - simulation time
      - hako-cmd start/stop coordination
    contract:
      status: not_tested
      requires:
        - Go1 plant asset implementation that registers with Hakoniwa core.
        - Confirmed Hakoniwa install and shared-memory access.
      validation_notes:
        - Existing MuJoCo robot samples use Hakoniwa runtime patterns, but no Go1-specific asset has been run yet.
    notes: The Go1 runtime should start as a registered Hakoniwa asset only after the MuJoCo-only model path is checked.
  - from: hakoniwa-pdu-registry
    to: hakoniwa-pdu-endpoint
    interface: pdu
    data:
      - Go1 joint position command PDU
      - Go1 joint state PDU
    contract:
      status: not_tested
      requires:
        - Decide whether to reuse existing joint message types or define a compact Go1-specific fixed-size PDU.
        - Generate matching C++ and Python bindings.
      validation_notes:
        - PDU schema selection is not yet implemented for this recipe.
    notes: The first contract should expose 12 joint targets and observed joint positions/velocities before any walking-specific abstraction.
  - from: hakoniwa-pdu-python
    to: hakoniwa-pdu-endpoint
    interface: pdu
    data:
      - scripted home command
      - small joint-position perturbation command
    contract:
      status: not_tested
      requires:
        - Endpoint config that names the Go1 plant asset and command channel.
        - Python sender that publishes after the asset is registered and before or after hako-cmd start according to runtime needs.
      validation_notes:
        - No Python sender has been written for Go1 yet.
    notes: A scripted sender avoids requiring a gait controller for the first demo.
  - from: hakoniwa-mujoco-robots
    to: hakoniwa-pdu-endpoint
    interface: pdu
    data:
      - joint target input
      - joint state output
      - optional trunk pose output
    contract:
      status: not_tested
      requires:
        - Actuator name mapping for the 12 Menagerie Go1 position actuators.
        - Runtime adapter that maps PDU command values to MuJoCo ctrl slots and publishes observed state.
      validation_notes:
        - Menagerie Go1 actuator names and home ctrl values are visible in go1.xml, but the Hakoniwa mapping has not been executed.
    notes: Keep actuator-slot mapping explicit because Go1 is joint-command based, not Twist-command based like a differential rover.

data_flow:
  summary: >
    The external Menagerie Go1 MJCF is consumed directly by the MuJoCo runtime.
    For Step 1, a local scripted sample writes home or small perturbation values
    into the 12 MuJoCo ctrl slots and observes joint/trunk state. For Step 2,
    a scripted controller publishes 12 joint-position targets through Hakoniwa
    PDU; the Go1 plant asset maps those targets to MuJoCo ctrl slots, advances
    simulation under Hakoniwa time, and publishes joint state and optional trunk
    pose.
  steps:
    - from: external-menagerie-go1-scene
      to: hakoniwa-mujoco-robots
      data:
        - unitree_go1/scene.xml
        - unitree_go1/go1.xml
        - unitree_go1/assets/*
      description: Use Menagerie MJCF and mesh assets as source physics artifacts without URDF conversion.
    - from: local-go1-joint-smoke
      to: hakoniwa-mujoco-robots
      data:
        - 12-element MuJoCo ctrl vector
      description: Step 1 applies home and bounded perturbation values directly to MuJoCo position actuators.
    - from: hakoniwa-pdu-python
      to: hakoniwa-pdu-endpoint
      data:
        - 12-element joint-position command
      description: Step 2 publishes home pose or a small scripted perturbation command to the Go1 plant asset.
    - from: hakoniwa-pdu-endpoint
      to: hakoniwa-mujoco-robots
      data:
        - joint-position command PDU
      description: The plant asset reads command values and writes them into MuJoCo ctrl slots.
    - from: hakoniwa-mujoco-robots
      to: hakoniwa-pdu-endpoint
      data:
        - joint state
        - trunk pose
      description: Publish observable simulation state so the controller or monitor can verify that the model responds.

time_model:
  mode: shared-simulation-time
  components:
    - hakoniwa-core-pro
    - hakoniwa-mujoco-robots
    - hakoniwa-pdu-endpoint
    - hakoniwa-pdu-python
  notes:
    - MuJoCo-only Step 1 load and joint smoke checks can run outside Hakoniwa time.
    - Hakoniwa runtime checks should start assets first, then use hako-cmd start to begin synchronized stepping.
    - A future Conductor Light version can be added if the quadruped plant and external controller need dynamic joining or multi-process coordination.

