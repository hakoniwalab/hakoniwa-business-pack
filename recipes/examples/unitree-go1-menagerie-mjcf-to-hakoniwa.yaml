  - name: Menagerie Unitree Go1 scene
    kind: mjcf
    producer: external-menagerie
    consumer:
      - hakoniwa-mujoco-robots
    path: thirdparty/mujoco_menagerie/unitree_go1/scene.xml
  - name: Menagerie Unitree Go1 model
    kind: mjcf
    producer: external-menagerie
    consumer:
      - hakoniwa-mujoco-robots
    path: thirdparty/mujoco_menagerie/unitree_go1/go1.xml
