missing_pieces:
  - Implement the Step 1 Go1 joint I/O smoke sample in hakoniwa-mujoco-robots.
  - Validate MuJoCo-only loading of unitree_go1/scene.xml in the target environment.
  - Map Menagerie Go1 actuator names to a stable 12-element field order.
  - Apply the home ctrl values and at least one small bounded leg-joint perturbation.
  - Publish or log joint position, joint velocity, and trunk pose for Step 1 observability.
  - Implement or select a Go1 Hakoniwa MuJoCo plant asset for Step 2.
  - Define the 12-joint command/state PDU contract and generated bindings.
  - Validate a scripted PDU home or small perturbation command before attempting walking.
  - Decide whether a ROS walking controller is required for the business demo or whether joint I/O is enough for the first recipe.
  - Confirm BSD-3-Clause notice handling before redistributing Menagerie model artifacts inside a Hakoniwa repository.

demo:
  objective: >
    Prove that a curated Menagerie quadruped MJCF can be used as an MJCF-first
    robot asset source for Hakoniwa planning. The first executable step should
    load the Go1 scene, confirm the 12 position-actuator interface, and move a
    small set of joints through a bounded command. The demo does not claim
    autonomous walking.
  steps:
    - order: 1
      id: run_common_preflight
      component: hakoniwa-core-pro
      action: Check common Hakoniwa runtime assumptions before Hakoniwa execution.
      command: bash tools/doctor.bash
      agency: agent_action
      requires_gates: []
      evidence:
        - repository: hakoniwalab/hakoniwa-business-pack
          path: tools/doctor.bash
          revision: main
    - order: 2
      id: fetch_or_reference_menagerie
      component: hakoniwa-mujoco-robots
      action: Make MuJoCo Menagerie Unitree Go1 scene.xml, go1.xml, assets, and license available to the runtime workspace.
      command: git clone https://github.com/google-deepmind/mujoco_menagerie.git
      agency: agent_action
      requires_gates:
        - menagerie_license_compliance
      evidence:
        - repository: google-deepmind/mujoco_menagerie
          path: README.md
          revision: main
    - order: 3
      id: mujoco_viewer_smoke
      component: hakoniwa-mujoco-robots
      action: Load and visually inspect the Menagerie Go1 scene in MuJoCo.
      command: python -m mujoco.viewer --mjcf mujoco_menagerie/unitree_go1/scene.xml
      agency: agent_action
      requires_gates: []
      evidence:
        - repository: google-deepmind/mujoco_menagerie
          path: README.md
          revision: main
    - order: 4
      id: go1_joint_io_smoke
      component: hakoniwa-mujoco-robots
      action: Apply the home keyframe ctrl values and a small scripted joint perturbation to confirm actuator-slot mapping and observable leg motion.
      agency: agent_action
      requires_gates: []
      evidence:
        - repository: google-deepmind/mujoco_menagerie
          path: unitree_go1/go1.xml
          revision: main
    - order: 5
      id: hakoniwa_joint_pdu_smoke
      component: hakoniwa-pdu-python
      action: Publish scripted Go1 joint targets to the Hakoniwa plant asset and verify joint/trunk state output after hako-cmd start.
      agency: agent_action
      requires_gates: []
      evidence:
        - repository: hakoniwalab/hakoniwa-mujoco-robots
          path: config
          revision: main
    - order: 6
      id: external_walking_controller
      component: hakoniwa-pdu-python
      action: Connect a ROS or external gait controller only after Step 1 and Step 2 are verified.
      agency: human_decision
      requires_gates:
        - choose_external_controller
      evidence:
        - repository: external
          path: TBD
          revision: TBD
  observability:
    success_signals:
      - MuJoCo loads unitree_go1/scene.xml without XML, mesh, or asset errors.
      - Viewer shows Go1 standing on the floor with stable contact at the home pose.
      - Applying home ctrl values keeps the robot in the expected posture for a short finite simulation.
      - Applying a small joint-position perturbation changes the intended leg joints without NaN, explosion, or actuator-name mismatch.
      - Joint position, joint velocity, and trunk pose remain finite during the smoke test.
      - In the Hakoniwa stage, joint command PDU updates are reflected in MuJoCo ctrl values and joint state PDU output changes accordingly.
    failure_signals:
      - Missing assets or relative mesh path errors.
      - Model falls, explodes, or produces NaN before any command input.
      - Actuator count or order does not match the expected 12 command fields.
      - A walking claim is made before an external controller and behavior checks are verified.
      - hako-cmd start occurs before assets are registered or no PDU updates are observed.
    fixtures:
      - Flat ground plane from Menagerie scene.xml.
      - Scripted home pose command and one small bounded joint perturbation.
      - Viewer or state logger to observe trunk pose and joint positions.
    automation:
      - Use a scripted command source instead of a joystick, cmd_vel, or gait controller for v0.
  verification_checks:
    lifecycle:
      - MuJoCo scene load completes.
      - Step 1 smoke sample prints or logs the 12 actuator-name mapping.
      - Hakoniwa plant asset registers and waits for hako-cmd start in Step 2.
      - Python sender starts after endpoint/PDU setup is ready.
    behavior:
      - nu equals the expected Go1 actuator count for the selected MJCF.
      - Joint positions move toward commanded values within bounded ranges.
      - Trunk pose remains finite during the short smoke test.
      - No walking behavior is claimed until a gait controller is connected and verified.
    logs:
      - MuJoCo load summary or model dimensions.
      - Actuator mapping summary with 12 named actuators.
      - Step 1 joint perturbation summary.
      - PDU send/receive logs for command and state channels.

expected_result: >
  A reviewer can see why Unitree Go1 should be treated as an MJCF-first
  quadruped recipe rather than a URDF-conversion task. The first executable
  implementation should be a Step 1 joint I/O smoke sample in
  hakoniwa-mujoco-robots: load the curated Menagerie scene, confirm the 12
  position-actuator interface, apply home and small bounded joint commands, and
  observe finite joint/trunk state. Walking control remains a later external
  controller integration.

