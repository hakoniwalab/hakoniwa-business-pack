    hako_cmd_access: unknown
  notes:
    - First validation should separate MuJoCo-only model behavior from Hakoniwa PDU runtime behavior.
    - A GUI viewer is useful for stance, contact, and actuator-direction inspection.

implementation_plan:
  phase_order:
    - id: step1_joint_io
      title: Go1 joint I/O smoke sample
      target_repository: hakoniwalab/hakoniwa-mujoco-robots
      scope:
        - Load Menagerie Unitree Go1 scene.xml.
        - Bind 12 position actuators by stable names.
        - Apply the Menagerie home ctrl values.
        - Apply one small bounded perturbation to selected leg joints.
        - Publish or log joint position, joint velocity, and trunk pose.
      status: verified
      evidence:
        - repository: local/hakoniwa-mujoco-robots
          path: examples/actuators/unitree_go1/unitree-go1-joint-io-example.cpp
          revision: local-working-tree-2026-07-22
        - repository: local/hakoniwa-mujoco-robots
          path: examples/actuators/unitree_go1/README.md
          revision: local-working-tree-2026-07-22
      explicit_non_goals:
        - No autonomous walking claim.
        - No ROS walking controller yet.
        - No real Unitree hardware.
    - id: step2_pdu_asset
      title: Hakoniwa PDU joint command/state asset
      target_repository: hakoniwalab/hakoniwa-mujoco-robots
      scope:
        - Add command/state PDU contract for 12 joint targets and observed state.
        - Add Python sender for home pose and small perturbation command.
        - Start plant asset first, then hako-cmd start for synchronized stepping.
      status: verified
      evidence:
        - repository: local/hakoniwa-mujoco-robots
          path: examples/actuators/unitree_go1/unitree-go1-joint-hakoniwa-asset.cpp
          revision: local-working-tree-2026-07-22
        - repository: local/hakoniwa-mujoco-robots
          path: examples/actuators/unitree_go1/send_go1_joint_targets.py
          revision: local-working-tree-2026-07-22
    - id: step3_external_controller
      title: ROS or external walking controller connection
      target_repository: later
      scope:
        - Select CHAMP, Unitree SDK/ROS, or another controller only after Step 1 and Step 2 are verified.
        - Map controller output to the 12-joint command contract or define an adapter from cmd_vel to joint targets.
        - Add behavior checks before claiming walking.
      status: future
    - id: step3_open_loop_walk_pattern
      title: Experimental open-loop creep/trot sender
      target_repository: hakoniwalab/hakoniwa-mujoco-robots
      scope:
        - Reuse the verified 12-joint Float64MultiArray command contract.
        - Send a warmup, slow creep or diagonal-leg trot phase pattern, cooldown, and home command sequence from Python.
        - Read JointState feedback and log observed thigh response.
        - Treat this as a scripted stable-motion demo pattern, not a verified walking controller.
      status: verified
      evidence:
        - repository: local/hakoniwa-mujoco-robots
          path: examples/actuators/unitree_go1/walk_go1.py
          revision: local-working-tree-2026-07-22
        - repository: local/hakoniwa-mujoco-robots
          path: examples/actuators/unitree_go1/README.md
          revision: local-working-tree-2026-07-22

components:
  - id: hakoniwa-mujoco-robots
    roles:
      - physics_runtime
      - simulation_core
    purpose: Consume the external Unitree Go1 MJCF scene, run MuJoCo, expose joint command/state behavior, and later host the Hakoniwa plant asset.
  - id: hakoniwa-core-pro
    roles:
      - simulation_core
      - time_sync
      - control_plane
    purpose: Provide asset lifecycle, hako-cmd control, shared simulation time, and shared-memory runtime base for the Hakoniwa stage.
  - id: hakoniwa-pdu-registry
    roles:
      - registry
      - data_model
      - code_generator
    purpose: Provide or generate joint command/state PDU definitions for the quadruped control boundary.
  - id: hakoniwa-pdu-endpoint
    roles:
      - communication_infrastructure
      - integration_boundary
    purpose: Carry joint command and state PDU data between the MuJoCo plant asset and external controller or monitor processes.
  - id: hakoniwa-pdu-python
    roles:
      - language_binding
      - control_plane
    purpose: Provide a Python command sender or scripted posture controller for early joint-position input tests.

connections:
  - from: hakoniwa-mujoco-robots
    to: hakoniwa-core-pro
    interface: api
    data:
      - asset lifecycle
      - simulation time
      - hako-cmd start/stop coordination
    contract:
      status: verified
      requires:
        - Go1 plant asset implementation that registers with Hakoniwa core.
        - Confirmed Hakoniwa install and shared-memory access.
      validation_notes:
        - unitree-go1-joint-hakoniwa-asset registered Go1JointAsset, started the conductor, waited for hako-cmd start, and entered WAIT RUNNING.
        - Sandbox execution could not create Hakoniwa shared memory; running the asset with normal host privileges succeeded.
    notes: The Go1 runtime should start as a registered Hakoniwa asset only after the MuJoCo-only model path is checked.
  - from: hakoniwa-pdu-registry
    to: hakoniwa-pdu-endpoint
    interface: pdu
    data:
      - Go1 joint position command PDU
      - Go1 joint state PDU
    contract:
      status: verified
      requires:
        - Reuse existing std_msgs/Float64MultiArray for 12 joint targets.
        - Reuse existing sensor_msgs/JointState for named joint state readback.
      validation_notes:
        - config/go1-joint-pdutypes.json defines joint_position_targets as std_msgs/Float64MultiArray and joint_states as sensor_msgs/JointState.
        - The command field order is FR_hip, FR_thigh, FR_calf, FL_hip, FL_thigh, FL_calf, RR_hip, RR_thigh, RR_calf, RL_hip, RL_thigh, RL_calf.
    notes: The first contract exposes 12 joint targets and observed joint positions/velocities before any walking-specific abstraction.
  - from: hakoniwa-pdu-python
    to: hakoniwa-pdu-endpoint
    interface: pdu
    data:
      - scripted home command
      - small joint-position perturbation command
    contract:
      status: verified
      requires:
        - Endpoint config that names the Go1 plant asset and command channel.
        - Python sender that publishes after the asset is registered and before hako-cmd start according to runtime needs.
      validation_notes:
        - send_go1_joint_targets.py registered Go1JointSender, sent Float64MultiArray joint targets, and read JointState feedback after hako-cmd start.
    notes: A scripted sender avoids requiring a gait controller for the first demo.
  - from: hakoniwa-mujoco-robots
    to: hakoniwa-pdu-endpoint
    interface: pdu
    data:
      - joint target input
      - joint state output
      - optional trunk pose output
    contract:
      status: verified
      requires:
        - Actuator name mapping for the 12 Menagerie Go1 position actuators.
        - Runtime adapter that maps PDU command values to MuJoCo ctrl slots and publishes observed state.
      validation_notes:
        - unitree-go1-joint-hakoniwa-asset maps the 12 Float64MultiArray values to the MJCF actuator order and clamps them through the actuator ctrlrange.
        - Runtime smoke showed FR_thigh_target/RL_thigh_target changes reflected in observed joint positions.
    notes: Keep actuator-slot mapping explicit because Go1 is joint-command based, not Twist-command based like a differential rover.

data_flow:
  summary: >
    The external Menagerie Go1 MJCF is consumed directly by the MuJoCo runtime.
    For Step 1, a local scripted sample writes home or small perturbation values
    into the 12 MuJoCo ctrl slots and observes joint/trunk state. For Step 2,
    a scripted controller publishes 12 joint-position targets through Hakoniwa
    PDU; the Go1 plant asset maps those targets to MuJoCo ctrl slots, advances
    simulation under Hakoniwa time, and publishes joint state and optional trunk
    pose.
  steps:
    - from: external-menagerie-go1-scene
      to: hakoniwa-mujoco-robots
      data:
        - unitree_go1/scene.xml
        - unitree_go1/go1.xml
        - unitree_go1/assets/*
      description: Use Menagerie MJCF and mesh assets as source physics artifacts without URDF conversion.
    - from: local-go1-joint-smoke
      to: hakoniwa-mujoco-robots
      data:
        - 12-element MuJoCo ctrl vector
      description: Step 1 applies home and bounded perturbation values directly to MuJoCo position actuators.
    - from: hakoniwa-pdu-python
      to: hakoniwa-pdu-endpoint
      data:
        - 12-element joint-position command
      description: Step 2 publishes home pose or a small scripted perturbation command to the Go1 plant asset.
    - from: hakoniwa-pdu-endpoint
      to: hakoniwa-mujoco-robots
      data:
        - joint-position command PDU
      description: The plant asset reads command values and writes them into MuJoCo ctrl slots.
    - from: hakoniwa-mujoco-robots
      to: hakoniwa-pdu-endpoint
      data:
        - joint state
        - trunk pose
      description: Publish observable simulation state so the controller or monitor can verify that the model responds.

time_model:
  mode: shared-simulation-time
  components:
    - hakoniwa-core-pro
    - hakoniwa-mujoco-robots
    - hakoniwa-pdu-endpoint
    - hakoniwa-pdu-python
  notes:
    - MuJoCo-only Step 1 load and joint smoke checks can run outside Hakoniwa time.
    - Hakoniwa runtime checks should start assets first, then use hako-cmd start to begin synchronized stepping.
    - A future Conductor Light version can be added if the quadruped plant and external controller need dynamic joining or multi-process coordination.

artifact_sets:
  physics_artifacts:
    description: External MJCF model, scene, and mesh assets consumed by MuJoCo.
    status: partially_verified
    artifacts:
      - unitree_go1/scene.xml
      - unitree_go1/go1.xml
      - unitree_go1/assets/*
    notes:
      - Upstream files were inspected and include a model scene, position actuators, collision geometry, meshes, and a home keyframe.
      - The selected upstream revision was vendored locally with LICENSE retained.
      - Local MuJoCo loading of the vendored scene.xml succeeded with 12 actuators and one home keyframe.
  visualization_artifacts:
    description: MuJoCo viewer scene and optional future Hakoniwa visualization outputs.
    status: not_tested
    artifacts:
      - MuJoCo viewer for unitree_go1/scene.xml
      - optional trunk pose or joint-state monitor
    notes:
      - First validation should use the MuJoCo viewer to inspect stance, contact, and actuator direction.
  pdu_artifacts:
    description: PDU definitions and endpoint configs for Go1 joint command and state exchange.
    status: verified
    artifacts:
      - Go1 joint command PDU
      - Go1 joint state PDU
      - endpoint config for Go1 plant and controller
    notes:
      - Go1 uses std_msgs/Float64MultiArray for joint_position_targets and sensor_msgs/JointState for joint_states.
      - The endpoint config is config/endpoint/go1_joint_endpoint.json.
  runtime_artifacts:
    description: Go1 plant asset, actuator mapping, scripted command sender, and launch steps.
    status: verified
    artifacts:
      - Go1 actuator mapping
      - Go1 joint I/O smoke sample
      - Go1 Hakoniwa plant asset
      - scripted Python joint command sender
      - scripted Python pose bounce sender
      - scripted Python open-loop walk-pattern sender
      - optional launcher profile
    notes:
      - Step 1 implementation belongs in hakoniwa-mujoco-robots before the walking-controller investigation.
      - Step 1 now exists as examples/actuators/unitree_go1/unitree-go1-joint-io-example.cpp.
      - Step 2 now exists as examples/actuators/unitree_go1/unitree-go1-joint-hakoniwa-asset.cpp and send_go1_joint_targets.py.
      - A jump-like posture demo exists as examples/actuators/unitree_go1/pose_bounce_go1.py, but it must not be described as verified jumping.
      - An experimental open-loop creep/trot demo exists as examples/actuators/unitree_go1/walk_go1.py, but it must not be described as a verified walking controller.

