id: unitree-go1-menagerie-mjcf-to-hakoniwa
title: Unitree Go1 Menagerie MJCF to Hakoniwa MuJoCo Recipe
recipe_version: 0.1

goal:
  user_request: MuJoCo Menagerie の Unitree Go1 四足歩行ロボット MJCF サンプルを起点に、箱庭 MuJoCo runtime へ接続するレシピを作りたい。
  description: >
    Use the curated Unitree Go1 MJCF model from MuJoCo Menagerie directly
    instead of starting from URDF conversion. Treat the first executable scope
    as a Step 1 joint I/O smoke sample: load the Go1 scene, map the 12 position
    actuators, apply home and small bounded joint-position targets, and observe
    joint/trunk state. Full walking control is a later external-controller
    integration step, not part of this recipe's first implementation target.

feasibility:
  status: partially_feasible
  confidence: medium
  rationale:
    - MuJoCo Menagerie provides a curated Unitree Go1 MJCF model and a scene.xml that includes the model with a plane and light.
    - The Go1 MJCF already defines 12 position actuators and a home keyframe, so Step 1 can use joint-position targets rather than gait generation.
    - hakoniwa-mujoco-robots already accepts MuJoCo model XML inputs and contains actuator examples and staged MuJoCo-only validation patterns.
    - Hakoniwa runtime integration is credible through existing Core/PDU/Endpoint/Python patterns, but a Go1-specific plant asset, PDU schema, and actuator adapter still need implementation.
    - Walking control is intentionally deferred because actuator availability does not imply a stable gait controller.

validation:
  status: partially_verified
  summary: >
    The Unitree Go1 Menagerie source was inspected, the BSD-3-Clause license
    notice was confirmed, and the model was vendored into
    hakoniwa-mujoco-robots with its model-local LICENSE retained. Local MuJoCo
    loading of the vendored scene.xml succeeded, exposing 12 position actuators
    and one home keyframe. A 1 second home-pose simulation stayed finite and
    near the initial trunk height. The first C++ Step 1 sample has been added,
    built, and verified as a MuJoCo-only headless smoke with a small bounded
    joint perturbation. Step 2 has also been implemented and smoke-tested as a
    Hakoniwa plant asset plus Python controller using a std_msgs/Float64MultiArray
    12-joint command and sensor_msgs/JointState readback. An experimental
    open-loop Python sender has been added and smoke-tested through the same
    PDU contract; its default creep profile is intended as a slow stable-motion
    demo, not a verified walking controller. Walking-controller runtime remains
    future work.
  steps:
    - id: inspect_menagerie_go1_scene
      status: verified
      evidence:
        - repository: google-deepmind/mujoco_menagerie
          path: unitree_go1/scene.xml
          revision: main
      notes:
        - scene.xml includes go1.xml and supplies a ground plane, light, and basic visual settings.
    - id: inspect_menagerie_go1_actuators
      status: verified
      evidence:
        - repository: google-deepmind/mujoco_menagerie
          path: unitree_go1/go1.xml
          revision: main
      notes:
        - go1.xml defines 12 position actuators for hip, thigh, and calf joints and a home keyframe with matching qpos and ctrl values.
    - id: confirm_menagerie_go1_license
      status: verified
      evidence:
        - repository: google-deepmind/mujoco_menagerie
          path: unitree_go1/LICENSE
          revision: 71f066ad0be9cd271f7ed58c030243ef157af9f4
        - repository: local/hakoniwa-mujoco-robots
          path: thirdparty/mujoco_menagerie/unitree_go1/LICENSE
          revision: local-working-tree-2026-07-22
      notes:
        - Unitree Go1 Menagerie assets are BSD-3-Clause licensed.
        - The model-local LICENSE must remain with redistributed scene.xml, go1.xml, and assets.
    - id: mujoco_only_load
      status: verified
      evidence:
        - repository: local/hakoniwa-mujoco-robots
          path: thirdparty/mujoco_menagerie/unitree_go1/scene.xml
          revision: local-working-tree-2026-07-22
      notes:
        - Vendored scene.xml loaded with MuJoCo Python bindings.
        - Load summary was nq=19, nv=18, nu=12, nbody=14, njnt=13, ngeom=56, nkey=1.
        - Actuator names were FR_hip, FR_thigh, FR_calf, FL_hip, FL_thigh, FL_calf, RR_hip, RR_thigh, RR_calf, RL_hip, RL_thigh, RL_calf.
        - The only keyframe name was home.
    - id: mujoco_home_pose_step
      status: verified
      evidence:
        - repository: local/hakoniwa-mujoco-robots
          path: thirdparty/mujoco_menagerie/unitree_go1/scene.xml
          revision: local-working-tree-2026-07-22
      notes:
        - Resetting to home and applying home ctrl for 1 second at timestep=0.002 completed without NaN or load errors.
        - Base position changed from [0.0, 0.0, 0.27] to approximately [-0.01007, 0.000155, 0.265324].
        - Home ctrl was [0.0, 0.9, -1.8] repeated for FR, FL, RR, and RL.
        - qvel norm after the 1 second smoke was approximately 0.003999.
    - id: go1_joint_io_smoke_sample
      status: verified
      evidence:
        - repository: local/hakoniwa-mujoco-robots
          path: examples/actuators/unitree_go1/unitree-go1-joint-io-example.cpp
          revision: local-working-tree-2026-07-22
        - repository: local/hakoniwa-mujoco-robots
          path: examples/actuators/unitree_go1/README.md
          revision: local-working-tree-2026-07-22
      notes:
        - The sample loads thirdparty/mujoco_menagerie/unitree_go1/scene.xml and binds the 12 position actuators by stable MJCF names.
        - The sample resets to the Menagerie home keyframe and applies home ctrl values.
        - The --check path runs 0.5 seconds at home, then applies a +0.12 rad perturbation to FR_thigh and RL_thigh for 0.5 seconds.
        - Verified output showed time=1.000, base=(0.002, 0.000, 0.265), FR_thigh=1.004, RL_thigh=0.975, and check ok.
        - This verifies Step 1 joint I/O readiness but does not claim walking.
    - id: hakoniwa_pdu_joint_runtime
      status: verified
      evidence:
        - repository: local/hakoniwa-mujoco-robots
          path: examples/actuators/unitree_go1/unitree-go1-joint-hakoniwa-asset.cpp
          revision: local-working-tree-2026-07-22
        - repository: local/hakoniwa-mujoco-robots
          path: examples/actuators/unitree_go1/send_go1_joint_targets.py
          revision: local-working-tree-2026-07-22
        - repository: local/hakoniwa-mujoco-robots
          path: config/go1-joint-pdudef-compact.json
          revision: local-working-tree-2026-07-22
        - repository: local/hakoniwa-mujoco-robots
          path: config/endpoint/go1_joint_endpoint.json
          revision: local-working-tree-2026-07-22
      notes:
        - The plant asset starts the Hakoniwa conductor, registers Go1JointAsset, waits for hako-cmd start, receives joint_position_targets, applies them to MuJoCo ctrl[], and publishes joint_states.
        - The Python sender registers Go1JointSender, sends a 12-element std_msgs/Float64MultiArray command, and reads sensor_msgs/JointState.
        - Verified runtime order was plant asset starts and reaches WAIT START, Python sender registers and reaches WAIT START, then /usr/local/hakoniwa/bin/hako-cmd start creates PDU shared memory and both assets enter WAIT RUNNING.
        - Verified plant output included time=0.502, base=(0.007, -0.000, 0.266), FR_thigh_target=1.014, FR_thigh=0.964, RL_thigh_target=1.014, RL_thigh=0.966.
        - Verified sender output included sent joint_position_targets and joint_states FR_thigh/RL_thigh readback.
        - A transient invalid initial PDU read can appear before the first publisher frame; later command/state logs confirm the smoke.
    - id: go1_pose_bounce_demo
      status: verified
      evidence:
        - repository: local/hakoniwa-mujoco-robots
          path: examples/actuators/unitree_go1/pose_bounce_go1.py
          revision: local-working-tree-2026-07-22
        - repository: local/hakoniwa-mujoco-robots
          path: examples/actuators/unitree_go1/README.md
          revision: local-working-tree-2026-07-22
      notes:
        - pose_bounce_go1.py sends a jump-like home, crouch, extend, recover, settle sequence through the same 12-joint Float64MultiArray command PDU.
        - The demo is explicitly a posture sequence, not verified jumping or locomotion.
        - Runtime smoke with --cycles 1 showed sender phases home, crouch, extend, recover, settle, and done, with thigh/calf JointState readback.
    - id: go1_walk_pattern_demo
      status: verified
      evidence:
        - repository: local/hakoniwa-mujoco-robots
          path: examples/actuators/unitree_go1/walk_go1.py
          revision: local-working-tree-2026-07-22
        - repository: local/hakoniwa-mujoco-robots
          path: examples/actuators/unitree_go1/README.md
          revision: local-working-tree-2026-07-22
      notes:
        - walk_go1.py sends experimental open-loop creep and trot patterns through the same 12-joint Float64MultiArray command PDU.
        - Runtime smoke with the default creep profile and --duration-sec 4 reached warmup, creep, cooldown, and done.
        - The default creep profile moved slowly in the stable backward direction while keeping base z approximately 0.264m to 0.267m during the short smoke.
        - The earlier showier trot smoke with --duration-sec 3, --frequency-hz 0.8, --thigh-amp 0.16, and --calf-lift 0.24 reached warmup, trot, cooldown, and done, but it is easier to tip in the viewer.
        - This validates a scripted motion demo path but still does not prove autonomous walking or a feedback gait controller.
    - id: walking_controller_integration
      status: skipped
      evidence:
        - repository: external
          path: ROS walking controller or gait-controller source
          revision: TBD
      notes:
        - Walking should be added only after Step 1 joint I/O is verified and an external controller contract is selected.

agency_boundary:
  agent_actions:
    - id: inspect_public_sources
      description: Inspect public MuJoCo Menagerie and Hakoniwa catalog/source files.
      autonomous: true
      preconditions:
        - user_requested_execution
    - id: generate_simulation_configs
      description: Generate simulation-only model, PDU, Endpoint, and launcher configuration files.
      autonomous: true
      preconditions:
        - user_requested_execution
        - target_environment_confirmed
    - id: run_step1_joint_smoke
      description: Run MuJoCo-only and Hakoniwa simulation-only joint I/O checks after the user requests local execution.
      autonomous: true
      preconditions:
        - user_requested_execution
        - target_environment_confirmed
        - required_external_sources_available
  human_decisions:
    - id: approve_step1_scope
      description: Decide whether the Step 1 joint I/O sample is sufficient for the first business-pack validation.
      status: required
      required_before:
        - customer_acceptance
    - id: choose_external_controller
      description: Decide whether to connect CHAMP, Unitree SDK/ROS examples, another gait controller, or a custom controller after Step 1.
      status: required
      required_before:
        - walking_demo_claim
  human_actions:
    - id: real_robot_execution
      description: Physically connect or command a real Unitree robot only if the recipe is later extended beyond simulation.
      status: not_required
      confirmation_required: true
      required_before:
        - hardware_execution
  required_permissions:
    - id: menagerie_license_compliance
      description: Confirm that any redistributed Unitree Go1 model artifacts retain required BSD-3-Clause notices from MuJoCo Menagerie / Unitree Robotics.
      status: required
      required_before:
        - redistribute_model_artifacts
  notes:
    - The recipe may claim joint I/O readiness only after the Go1 joint smoke sample is verified.
    - The recipe must not claim walking behavior until a gait controller and behavior checks are verified.
    - The recipe must not cross from simulation to a real Unitree robot without explicit human approval.

constraints:
  - no-urdf-conversion
  - mjcf-source-artifact
  - single-pc
  - simulation-first
  - step1-joint-io-only
  - walking-controller-out-of-scope-in-v0
  - external-model-license-notice-required
  - gui-useful-for-first-validation
  - vendored-thirdparty-assets-keep-license

