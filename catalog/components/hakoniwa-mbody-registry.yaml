id: hakoniwa-mbody-registry
name: Hakoniwa MBody Registry
repository:
  owner: hakoniwalab
  name: hakoniwa-mbody-registry
  path: ../hakoniwa-mbody-registry
  url: https://github.com/hakoniwalab/hakoniwa-mbody-registry
  visibility: public
distribution:
  channel: oss
  notes:
    - Public OSS Hakoniwa component.
verification:
  verified_at: 2026-07-19
  source_revision: c8649cd93e0ae4b365fc284787f8f103c7e9eaf8
  source_ref: main
summary: ROS-independent robot body registry that converts upstream robot descriptions into committed URDF, MJCF, GLB, PDU, and Godot-ready artifacts.
category:
  primary: data-model
  secondary:
    - registry
    - robot-body
    - asset-generation
    - visualization-assets

status:
  maturity: active
  catalog_confidence: high
  notes:
    - Cataloged from README and documented toolchain.
    - This is the physical-body counterpart to hakoniwa-pdu-registry.

capabilities:
  - name: Robot body artifact registry
    description: Stores source snapshots, conversion tools, and committed generated robot body outputs under predictable paths.
    evidence:
      - repository: hakoniwalab/hakoniwa-mbody-registry
        path: README.md
        revision: c8649cd93e0ae4b365fc284787f8f103c7e9eaf8
  - name: ROS-free conversion pipeline
    description: Converts xacro or xacro-enabled URDF into plain URDF, MuJoCo XML, and GLB using bundled Python tools without requiring a full ROS install.
    evidence:
      - repository: hakoniwalab/hakoniwa-mbody-registry
        path: README.md
        revision: c8649cd93e0ae4b365fc284787f8f103c7e9eaf8
  - name: MuJoCo-ready assets
    description: Generates canonical MJCF and actuated MuJoCo XML for downstream robot simulation.
    evidence:
      - repository: hakoniwalab/hakoniwa-mbody-registry
        path: README.md
        revision: c8649cd93e0ae4b365fc284787f8f103c7e9eaf8
  - name: Godot-ready assets and sync configs
    description: Generates Godot scenes, endpoint configs, and robot_sync.profile.json consumed by hakoniwa-godot.
    evidence:
      - repository: hakoniwalab/hakoniwa-mbody-registry
        path: README.md
        revision: c8649cd93e0ae4b365fc284787f8f103c7e9eaf8
  - name: PDU manifest conversion
    description: Converts pdu-manifest.yaml into canonical pdutypes.json and compact pdu_def.json.
    evidence:
      - repository: hakoniwalab/hakoniwa-mbody-registry
        path: README.md
        revision: c8649cd93e0ae4b365fc284787f8f103c7e9eaf8

limitations:
  - Not a runtime simulator.
  - Runtime wiring is owned by downstream projects such as hakoniwa-godot and MuJoCo-side Hakoniwa runners.
  - Sensor runtime config is described as downstream-owned, not generated by the core toolchain here.
  - Fetched upstream source snapshots under bodies/{name}/source are local inputs and are not committed.

interfaces:
  inputs:
    - name: Source fetch definition
      kind: config
      description: sources/*.yaml declares upstream repository, branch, and files to sparse-fetch.
    - name: Xacro or URDF source
      kind: file
      description: Robot source description fetched under bodies/{name}/source.
    - name: Actuator config
      kind: config
      description: bodies/{name}/config/actuator.yml used to add actuators to MJCF.
    - name: PDU manifest
      kind: config
      description: pdu-manifest.yaml used to produce pdutypes.json and pdu_def.json.
    - name: Godot sync config
      kind: config
      description: godot_sync.yaml used to generate endpoint and sync profile artifacts.
  outputs:
    - name: URDF
      kind: file
      description: Plain URDF under bodies/{name}/generated.
    - name: MJCF
      kind: file
      description: Canonical and actuated MuJoCo XML under bodies/{name}/generated.
    - name: GLB
      kind: file
      description: Single or split GLB visual assets.
    - name: PDU configs
      kind: config
      description: pdutypes.json and pdu_def.json for Hakoniwa PDU wiring.
    - name: Godot scene and sync profile
      kind: file
      description: Generated .tscn scenes, endpoint_shm_with_pdu.json, and robot_sync.profile.json.
  protocols: []
  configuration:
    - path: sources/tb3.yaml
      description: TurtleBot3 fetch definition.
    - path: bodies/turtlebot3/config
      description: Robot-specific actuator, PDU, viewer, and Godot sync configs.
    - path: requirements.txt
      description: Python dependencies.

dependencies:
  required:
    - name: Python 3
      type: runtime
      notes: Required for all conversion tools.
    - name: requirements.txt packages
      type: package
      notes: Install with python3 -m pip install -r requirements.txt.
  optional:
    - name: Git
      type: tool
      notes: Required by fetch.py to sparse-fetch upstream robot source files.
    - name: Godot
      type: runtime
      notes: Required only when consuming generated scenes in a Godot project.
    - name: MuJoCo
      type: runtime
      notes: Required only when consuming generated MJCF in MuJoCo runtime.

platforms:
  supported:
    - macOS
    - Linux
  notes:
    - Toolchain is Python-based; exact Windows support is not stated in README.

connects_to:
  - component_id: hakoniwa-pdu-registry
    direction: related
    interface: registry pattern / PDU config outputs
    notes: MBody registry mirrors the registry philosophy and produces PDU config artifacts for body-related sync.
  - component_id: hakoniwa-godot
    direction: used_by
    interface: generated scene / endpoint config / robot_sync.profile.json
    notes: Godot consumes generated scene and sync artifacts at runtime.
  - component_id: hakoniwa-mujoco-robots
    direction: used_by
    interface: generated MJCF / actuated XML / GLB / PDU configs
    notes: MuJoCo-side robot runtimes can consume generated physical model artifacts.
  - component_id: hakoniwa-pdu-endpoint
    direction: related
    interface: generated endpoint_shm_with_pdu.json / pdu_def.json
    notes: Generated endpoint configs are consumed by downstream endpoint-based runtimes.

data_contracts:
  - name: Mold-body pipeline
    description: Robot body source is treated as a mold that can be cast into URDF, MJCF, GLB, PDU config, and Godot profile artifacts.
    source:
      - repository: hakoniwalab/hakoniwa-mbody-registry
        path: README.md
        revision: c8649cd93e0ae4b365fc284787f8f103c7e9eaf8
  - name: Committed generated body artifacts
    description: bodies/{name}/generated outputs are committed so downstream users can consume stable artifacts without running the full conversion pipeline.
    source:
      - repository: hakoniwalab/hakoniwa-mbody-registry
        path: README.md
        revision: c8649cd93e0ae4b365fc284787f8f103c7e9eaf8
  - name: Godot runtime split
    description: MBody registry owns user-facing robot inputs and generated profile/config outputs; hakoniwa-godot owns runtime addon and endpoint integration.
    source:
      - repository: hakoniwalab/hakoniwa-mbody-registry
        path: README.md
        revision: c8649cd93e0ae4b365fc284787f8f103c7e9eaf8

recipe_roles:
  - role: registry
    description: Supplies stable robot body artifacts to simulators and visualizers.
  - role: data_model
    description: Defines the physical body side of a simulation product.
  - role: asset_generator
    description: Converts upstream robot descriptions into runtime-consumable artifacts.
  - role: visualization_asset_source
    description: Provides GLB and Godot scene artifacts for visual runtimes.

typical_usecases:
  - Prepare a TurtleBot3 or other robot body for MuJoCo simulation.
  - Generate GLB assets for visualization without manually rebuilding geometry.
  - Install generated robot scenes and sync profiles into a Godot Hakoniwa project.
  - Keep robot body conversions reproducible and reviewable through committed generated outputs.

anti_usecases:
  - Runtime physics simulation.
  - PDU binary type generation from ROS messages.
  - Environment field modeling such as wind, temperature, or radio conditions.

demo_candidates:
  - name: TurtleBot3 full forge pipeline
    description: Run forge.sh for TurtleBot3 Burger and inspect generated URDF, MJCF, actuated XML, GLB, pdutypes, and pdu_def outputs.
    required_components:
      - hakoniwa-mbody-registry
    source_examples:
      - repository: hakoniwalab/hakoniwa-mbody-registry
        path: sources/tb3.yaml
        revision: c8649cd93e0ae4b365fc284787f8f103c7e9eaf8
  - name: Godot robot sync artifact generation
    description: Generate endpoint_shm_with_pdu.json and robot_sync.profile.json from godot_sync.yaml for use by hakoniwa-godot.
    required_components:
      - hakoniwa-mbody-registry
      - hakoniwa-godot
      - hakoniwa-pdu-endpoint
    source_examples:
      - repository: hakoniwalab/hakoniwa-mbody-registry
        path: tools/godot_sync2endpoint.py
        revision: c8649cd93e0ae4b365fc284787f8f103c7e9eaf8
      - repository: hakoniwalab/hakoniwa-mbody-registry
        path: tools/godot_sync2profile.py
        revision: c8649cd93e0ae4b365fc284787f8f103c7e9eaf8

operations:
  build:
    commands:
      - python3 -m pip install -r requirements.txt
    notes:
      - This repository is primarily a Python toolchain and committed artifact registry.
  test:
    commands: []
    notes: Add exact test commands after cataloging docs and tools.
  run:
    commands:
      - ./tools/forge.sh sources/tb3.yaml turtlebot3_description/urdf/turtlebot3_burger.urdf
    notes:
      - Typical outputs appear under bodies/turtlebot3/generated.

known_gaps:
  - Catalog does not yet enumerate all supported robot bodies under bodies/.
  - Need to catalog exact schemas under schemas/ for tool inputs.
  - Need to verify which generated artifacts are committed for each robot body.
  - Need to connect generated artifacts to concrete MuJoCo and Godot demos.

source_refs:
  - repository: hakoniwalab/hakoniwa-mbody-registry
    path: README.md
    revision: c8649cd93e0ae4b365fc284787f8f103c7e9eaf8
    description: Main overview, registry pattern, ecosystem flow, and toolchain.
  - repository: hakoniwalab/hakoniwa-mbody-registry
    path: tools
    revision: c8649cd93e0ae4b365fc284787f8f103c7e9eaf8
    description: Conversion tools.
  - repository: hakoniwalab/hakoniwa-mbody-registry
    path: schemas
    revision: c8649cd93e0ae4b365fc284787f8f103c7e9eaf8
    description: Tool input schemas.
  - repository: hakoniwalab/hakoniwa-mbody-registry
    path: bodies
    revision: c8649cd93e0ae4b365fc284787f8f103c7e9eaf8
    description: Managed robot body sources, configs, and generated outputs.

tags:
  - hakoniwa
  - mbody
  - robot-body
  - urdf
  - mjcf
  - glb
  - godot
  - mujoco
  - registry
