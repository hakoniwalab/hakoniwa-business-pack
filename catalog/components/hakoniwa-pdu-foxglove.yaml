id: hakoniwa-pdu-foxglove
name: Hakoniwa PDU Foxglove
repository:
  owner: hakoniwalab
  name: hakoniwa-pdu-foxglove
  url: https://github.com/hakoniwalab/hakoniwa-pdu-foxglove
  visibility: public
distribution:
  channel: oss
  notes:
    - Public OSS Hakoniwa component under the MIT license.
verification:
  verified_at: 2026-07-23
  source_revision: c45ba4e76788258907777e82649edaecc7fe7bc8
  source_ref: main
summary: >-
  Output-only Foxglove adapter for hakoniwa-pdu-endpoint that publishes
  caller-provided complete CDR payloads through the official Foxglove SDK
  WebSocket server. The current repository also contains a verified Shadow Hand
  JointState integration path and a generic stdin-to-CDR publication boundary.
category:
  primary: visualization
  secondary:
    - foxglove
    - integration
    - bridge

status:
  maturity: experimental
  catalog_confidence: high
  notes:
    - Core adapter remains version 0.1 and deliberately output-only.
    - Shadow Hand JointState publication and URDF-backed Foxglove 3D visualization were manually validated on macOS arm64 on 2026-07-23.
    - The full Shadow Hand end-to-end workflow is currently verified only on macOS arm64; Ubuntu 24.04 Docker verification covers the core CDR publisher build/test smoke, not the complete Shadow Hand workflow.

capabilities:
  - name: Foxglove live output
    description: Publishes complete CDR payloads to Foxglove through the official C++ SDK WebSocket server.
    evidence:
      - repository: hakoniwalab/hakoniwa-pdu-foxglove
        path: README.md
        revision: c45ba4e76788258907777e82649edaecc7fe7bc8
  - name: Endpoint PduComm adapter
    description: Implements FoxgloveComm as a PduComm adapter usable with Endpoint::set_comm().
    evidence:
      - repository: hakoniwalab/hakoniwa-pdu-foxglove
        path: README.md
        revision: c45ba4e76788258907777e82649edaecc7fe7bc8
  - name: Raw CDR byte preservation
    description: Forwards caller-provided CDR bytes without deserialization, reserialization, or guessing Hakoniwa native PDU representation.
    evidence:
      - repository: hakoniwalab/hakoniwa-pdu-foxglove
        path: README.md
        revision: c45ba4e76788258907777e82649edaecc7fe7bc8
  - name: Explicit schema configuration
    description: Configures topic, schema name, schema encoding, and schema file for each Foxglove channel.
    evidence:
      - repository: hakoniwalab/hakoniwa-pdu-foxglove
        path: config/shadow_hand/comm_foxglove_jointstate.json
        revision: c45ba4e76788258907777e82649edaecc7fe7bc8
  - name: Generic stdin CDR publisher boundary
    description: cdr_stdin_publisher accepts complete length-prefixed CDR frames from a type-specific producer and publishes them through a FoxgloveComm-backed Endpoint.
    evidence:
      - repository: hakoniwalab/hakoniwa-pdu-foxglove
        path: examples/cdr-stdin-publisher/README.md
        revision: c45ba4e76788258907777e82649edaecc7fe7bc8
  - name: Verified Shadow Hand JointState live path
    description: Bridges ShadowHandAsset/joint_states from callback SHM through TCP, converts native JointState PDU to CDR, and publishes it to Foxglove at ws://127.0.0.1:8766.
    evidence:
      - repository: hakoniwalab/hakoniwa-pdu-foxglove
        path: config/shadow_hand_bridge/README.md
        revision: c45ba4e76788258907777e82649edaecc7fe7bc8
      - repository: hakoniwalab/hakoniwa-pdu-foxglove
        path: launch/shadow-hand-foxglove-smoke.launch.json
        revision: c45ba4e76788258907777e82649edaecc7fe7bc8
  - name: Verified URDF plus JointState 3D workflow
    description: Supports a documented Shadow Hand 3D workflow in which Foxglove loads a prepared URDF and animates it directly from Hakoniwa JointState without a /tf publisher.
    evidence:
      - repository: hakoniwalab/hakoniwa-pdu-foxglove
        path: README.md
        revision: c45ba4e76788258907777e82649edaecc7fe7bc8
  - name: ROS 2 schema staging without ROS 2 runtime
    description: Documents a reproducible boundary where ROS 2 Jazzy schema artifacts are prepared using the hakoniwa-pdu-registry Docker environment and copied into the local work/schemas staging area for Foxglove.
    evidence:
      - repository: hakoniwalab/hakoniwa-pdu-foxglove
        path: README.md
        revision: c45ba4e76788258907777e82649edaecc7fe7bc8

limitations:
  - Output-only; recv and recv_next are unsupported.
  - FoxgloveComm does not convert Hakoniwa native PDU binary to CDR automatically.
  - Current version does not provide Foxglove-to-Hakoniwa publishing, services, parameters, MCAP recording, or dynamic channel creation.
  - Current Foxglove log timestamps use wall-clock time; Hakoniwa simulation-time broadcasting is not implemented.
  - The Shadow Hand SHM-to-TCP bridge process is a validated implementation choice, not a fundamental requirement; a future single-process implementation could use separate threads and an internal queue.

interfaces:
  inputs:
    - name: Complete CDR payload
      kind: pdu
      description: Caller-provided Foxglove-compatible CDR bytes passed to FoxgloveComm::send.
    - name: Foxglove comm config
      kind: config
      description: JSON config with server settings, channels, topics, schema names, encodings, and schema file paths.
    - name: PDU definition
      kind: config
      description: Used to resolve robot/PDU names to robot/channel_id keys.
    - name: Length-prefixed CDR stdin frames
      kind: protocol
      description: Optional cdr_stdin_publisher input using <u32 payload_size><CDR payload>; multiplex mode also carries a u16 channel index.
  outputs:
    - name: Foxglove WebSocket stream
      kind: protocol
      description: Schema-aware RawChannel publications served by the Foxglove SDK WebSocket server.
  protocols:
    - name: Foxglove WebSocket
      role: server
      notes: Local WebSocket server consumed by Foxglove App.
    - name: Endpoint PduComm
      role: local
      notes: Adapter boundary used by hakoniwa-pdu-endpoint.
    - name: stdin CDR framing
      role: local
      notes: Generic process boundary used by cdr_stdin_publisher.
  configuration:
    - path: config/sample/endpoint_foxglove.json
      description: Basic CDR publisher sample endpoint config.
    - path: config/sample/comm_foxglove.json
      description: Basic Foxglove comm config.
    - path: config/shadow_hand/endpoint_foxglove_jointstate.json
      description: Verified Shadow Hand JointState Foxglove endpoint config.
    - path: config/shadow_hand_bridge
      description: Verified Shadow Hand callback-SHM to TCP bridge configuration.

dependencies:
  required:
    - name: C++20 compiler
      type: tool
      notes: Required build toolchain.
    - name: CMake 3.20 or later
      type: tool
      notes: Required build system.
    - name: hakoniwa-pdu-endpoint
      type: repository
      notes: Provides Endpoint and PduComm abstraction.
    - name: hakoniwa-pdu-registry
      type: repository
      notes: Provides PDU types and generated native/CDR converters.
    - name: Foxglove C++ SDK
      type: library
      notes: Official SDK pinned by the repository CMake integration.
  optional:
    - name: hakoniwa-pdu-bridge-core
      type: repository
      notes: Used by the verified Shadow Hand recipe to isolate callback SHM from the downstream WebSocket publisher process.
    - name: hakoniwa-mbody-registry
      type: repository
      notes: Used by the verified Shadow Hand 3D recipe to expand ROS-origin xacro without requiring ROS.
    - name: Foxglove App
      type: tool
      notes: Required for manual live visualization.

platforms:
  supported:
    - macOS
    - Linux
  notes:
    - The complete Shadow Hand JointState plus Foxglove 3D workflow is currently verified only on macOS arm64.
    - Ubuntu 24.04 Docker verification covers the core CDR publisher build/test smoke and does not yet establish full Shadow Hand reproducibility on Linux.

connects_to:
  - component_id: hakoniwa-pdu-endpoint
    direction: uses
    interface: PduComm adapter / Endpoint::set_comm
    notes: FoxgloveComm adapts Endpoint send lifecycle to Foxglove publication.
  - component_id: hakoniwa-pdu-registry
    direction: uses
    interface: native PDU converters / CDR converters / schema assets
    notes: Type-specific conversion stays outside FoxgloveComm.
  - component_id: hakoniwa-pdu-bridge-core
    direction: related
    interface: callback SHM to TCP process boundary
    notes: The verified Shadow Hand path uses bridge-core to isolate Hakoniwa callback/SHM execution from the downstream Foxglove WebSocket publisher.
  - component_id: hakoniwa-mbody-registry
    direction: related
    interface: ROS-free xacro expansion for visualization assets
    notes: The verified Shadow Hand 3D path uses xacro2urdf.py with explicit package mappings before viewer-specific URDF preparation.

data_contracts:
  - name: FoxgloveComm send input
    description: send input must be a complete Foxglove-compatible CDR payload; Hakoniwa native PDU bytes are not implicitly converted.
    source:
      - repository: hakoniwalab/hakoniwa-pdu-foxglove
        path: README.md
        revision: c45ba4e76788258907777e82649edaecc7fe7bc8
  - name: cdr_stdin_publisher input
    description: The default stdin frame is a little-endian u32 payload length followed by one complete CDR payload.
    source:
      - repository: hakoniwalab/hakoniwa-pdu-foxglove
        path: examples/cdr-stdin-publisher/README.md
        revision: c45ba4e76788258907777e82649edaecc7fe7bc8
  - name: Shadow Hand Foxglove 3D control
    description: Foxglove URDF Joint states mode can animate the prepared Shadow Robot URDF directly from /hakoniwa/ShadowHandAsset/joint_states; /tf is not required for this path.
    source:
      - repository: hakoniwalab/hakoniwa-pdu-foxglove
        path: README.md
        revision: c45ba4e76788258907777e82649edaecc7fe7bc8
  - name: JointState schema staging
    description: The Shadow Hand example stages sensor_msgs/msg/JointState.bundle.msg under work/schemas/ros2_jazzy after preparing it from the hakoniwa-pdu-registry ROS 2 Jazzy Docker environment; the work directory is local and not committed.
    source:
      - repository: hakoniwalab/hakoniwa-pdu-foxglove
        path: README.md
        revision: c45ba4e76788258907777e82649edaecc7fe7bc8

recipe_roles:
  - role: visualizer
    description: Streams simulation state to Foxglove App for live inspection and 3D visualization.
  - role: bridge
    description: Adapts complete CDR payloads to Foxglove WebSocket publication.
  - role: integration_boundary
    description: Provides the CDR/schema-aware boundary between Hakoniwa state and Foxglove.

typical_usecases:
  - Publish ROS-compatible CDR payloads from Hakoniwa to Foxglove without running ROS 2.
  - Inspect Hakoniwa JointState data in Foxglove Raw Messages and Plot.
  - Animate a Foxglove URDF model directly from Hakoniwa JointState.
  - Keep native-PDU decoding and CDR conversion explicit while reusing a generic Foxglove transport.

anti_usecases:
  - Bidirectional Foxglove control.
  - Automatic Hakoniwa-native-binary to CDR conversion inside FoxgloveComm.
  - General-purpose transport between Hakoniwa assets.
  - Treating the Foxglove visualization URDF as the physics source of truth.

demo_candidates:
  - name: CDR publisher live smoke
    description: Run examples/cdr-publisher and inspect the configured topic from Foxglove App.
    required_components:
      - hakoniwa-pdu-foxglove
      - hakoniwa-pdu-endpoint
      - hakoniwa-pdu-registry
    source_examples:
      - repository: hakoniwalab/hakoniwa-pdu-foxglove
        path: examples/cdr-publisher
        revision: c45ba4e76788258907777e82649edaecc7fe7bc8
  - name: Shadow Hand JointState and 3D visualization
    description: Run the Shadow Hand Hakoniwa asset, bridge JointState to Foxglove, serve the prepared Shadow Robot URDF, and confirm matching motion in MuJoCo and Foxglove 3D.
    required_components:
      - hakoniwa-pdu-foxglove
      - hakoniwa-pdu-endpoint
      - hakoniwa-pdu-registry
      - hakoniwa-pdu-bridge-core
      - hakoniwa-mujoco-robots
      - hakoniwa-mbody-registry
    source_examples:
      - repository: hakoniwalab/hakoniwa-pdu-foxglove
        path: launch/shadow-hand-foxglove-browser.launch.json
        revision: c45ba4e76788258907777e82649edaecc7fe7bc8

operations:
  build:
    commands:
      - git submodule update --init --recursive
      - ./build.bash
    notes:
      - Builds hakoniwa_pdu_foxglove, cdr_publisher_example, cdr_stdin_publisher, and tests when examples/tests are enabled.
  test:
    commands:
      - ./test.bash
    notes:
      - Unit tests do not require Foxglove App.
  run:
    commands:
      - ./build/cdr_publisher_example config/sample/endpoint_foxglove.json
      - PYTHONPATH=../hakoniwa-mujoco-robots/thirdparty/hakoniwa-core-pro/launcher python3.12 -m hako_launch.hako_launcher launch/shadow-hand-foxglove-smoke.launch.json
    notes:
      - Shadow Hand WebSocket defaults to ws://127.0.0.1:8766.

known_gaps:
  - Hakoniwa simulation-time broadcasting to Foxglove is not implemented in version 0.1.
  - A direct single-process SHM-to-Foxglove implementation is not provided; the verified Shadow Hand path intentionally uses bridge-core plus TCP process isolation.
  - Bidirectional Foxglove command publication remains outside the current scope.
  - The complete Shadow Hand end-to-end workflow has not yet been validated on Linux.

