id: hakoniwa-pdu-registry
name: Hakoniwa PDU Registry
repository:
  owner: hakoniwalab
  name: hakoniwa-pdu-registry
  path: ../hakoniwa-pdu-registry
  url: https://github.com/hakoniwalab/hakoniwa-pdu-registry
verification:
  verified_at: 2026-07-19
  source_revision: 7bc8839ba14b5dcba471257d660ea53beee00ce1
  source_ref: main
summary: Authoritative registry and reproducible generator for Hakoniwa PDU binary layouts derived from ROS 2 message and service definitions.
category:
  primary: data-model
  secondary:
    - registry
    - code-generation
    - binary-contract

status:
  maturity: active
  catalog_confidence: high
  notes:
    - Cataloged from README and documented repository layout.
    - Generated artifacts are intentionally committed and treated as part of the binary contract.

capabilities:
  - name: Stable PDU binary contract
    description: Defines canonical, language-agnostic PDU layouts so runtimes, tools, and bridges share the same structure.
    evidence:
      - repository: hakoniwalab/hakoniwa-pdu-registry
        path: README.md
        revision: 7bc8839ba14b5dcba471257d660ea53beee00ce1
  - name: Multi-language generated artifacts
    description: Generates C/C++, Python, JavaScript, C#, Godot GDScript, Godot C++ types, converters, offsets, sizes, and CDR converters.
    evidence:
      - repository: hakoniwalab/hakoniwa-pdu-registry
        path: README.md
        revision: 7bc8839ba14b5dcba471257d660ea53beee00ce1
  - name: Reproducible Docker generation
    description: Provides Docker workflow pinned to ROS 2 Jazzy for deterministic generation and type hash metadata.
    evidence:
      - repository: hakoniwalab/hakoniwa-pdu-registry
        path: README.md
        revision: 7bc8839ba14b5dcba471257d660ea53beee00ce1
  - name: ROS 2 type hash metadata
    description: Generates type hash JSON files with hash algorithm, hash value, dependencies, and source message path.
    evidence:
      - repository: hakoniwalab/hakoniwa-pdu-registry
        path: README.md
        revision: 7bc8839ba14b5dcba471257d660ea53beee00ce1
  - name: CDR compatibility artifacts
    description: Generates C++, Python, and JavaScript CDR payload converters and minimum payload size registries.
    evidence:
      - repository: hakoniwalab/hakoniwa-pdu-registry
        path: README.md
        revision: 7bc8839ba14b5dcba471257d660ea53beee00ce1

limitations:
  - Not a runtime communication component.
  - Local non-Docker generation is documented as reference only and not guaranteed reproducible.
  - ROS 2 type hash generation expects ROS 2 Jazzy and fails on other distros for guarded metadata paths.
  - Generated artifacts can create large diffs, intentionally trading repository size for reproducibility.

interfaces:
  inputs:
    - name: ROS 2 message definitions
      kind: file
      description: .msg files under idl or resolved from configured search paths.
    - name: ROS message list
      kind: config
      description: config/ros_msgs.txt lists messages to convert.
    - name: Search paths
      kind: config
      description: config/search_path.txt points to ROS message definition roots.
    - name: Code generation templates
      kind: file
      description: Templates under template used by Python generators.
  outputs:
    - name: C/C++ PDU types
      kind: file
      description: Headers and converters under pdu/types.
    - name: Python PDU types and converters
      kind: file
      description: Generated Python artifacts under pdu/python.
    - name: JavaScript PDU types and converters
      kind: file
      description: Generated JavaScript artifacts under pdu/javascript.
    - name: C# PDU types
      kind: file
      description: Generated C# artifacts under pdu/csharp.
    - name: Godot PDU artifacts
      kind: file
      description: GDScript, Godot C++ converters, and runtime helpers.
    - name: Offset and size registries
      kind: file
      description: pdu/offset, pdu/offset_text, pdu/pdu_size, and CDR size registry outputs.
    - name: ROS 2 type hash JSON
      kind: file
      description: pdu/type_hash/<pkg>/<Msg>.json metadata.
  protocols: []
  configuration:
    - path: config/ros_msgs.txt
      description: Message list.
    - path: config/search_path.txt
      description: ROS message search paths.
    - path: ROS_VERSION.txt
      description: Expected ROS distro for Docker generation.

dependencies:
  required:
    - name: Python 3
      type: runtime
      notes: Required for generator modules and tools.
    - name: C compiler
      type: tool
      notes: Used to calculate BaseData offsets by compiling generated C.
  optional:
    - name: Docker
      type: runtime
      notes: Recommended reproducible generation environment.
    - name: ROS 2 Jazzy
      type: runtime
      notes: Required inside Docker or local environment for ROS type hash generation.

platforms:
  supported:
    - Linux
    - macOS
  notes:
    - Reproducibility guidance centers on Docker.

connects_to:
  - component_id: hakoniwa-pdu-endpoint
    direction: used_by
    interface: PDU definitions / names / sizes / type meanings
    notes: Endpoint uses PDU definitions to map semantic names to channel IDs and sizes.
  - component_id: hakoniwa-pdu-rpc
    direction: used_by
    interface: generated service request/response packet types
    notes: RPC headers depend on registry-generated service types.
  - component_id: hakoniwa-pdu-python
    direction: used_by
    interface: Python generated types and offset definitions
    notes: Python library consumes registry artifacts for binary conversion.
  - component_id: hakoniwa-pdu-javascript
    direction: used_by
    interface: JavaScript generated types and converters
    notes: Browser/Node.js PDU tooling consumes JS artifacts.
  - component_id: hakoniwa-godot
    direction: used_by
    interface: Godot GDScript and C++ generated PDU artifacts
    notes: Godot integration consumes generated PDU types and converters.
  - component_id: hakoniwa-pdu-foxglove
    direction: used_by
    interface: CDR converters and schema assets
    notes: Foxglove adapter expects caller-provided Foxglove-compatible CDR payloads from registry converters.

data_contracts:
  - name: Hakoniwa PDU binary format
    description: PDU layout consists of MetaData, BaseData, HeapData, and planned ExtMeta.
    source:
      - repository: hakoniwalab/hakoniwa-pdu-registry
        path: docs/specs/pdu-binary-format.md
        revision: 7bc8839ba14b5dcba471257d660ea53beee00ce1
  - name: Committed generated artifact contract
    description: Fully resolved, compiled, offset-calculated outputs are committed as long-lived binary compatibility records.
    source:
      - repository: hakoniwalab/hakoniwa-pdu-registry
        path: README.md
        revision: 7bc8839ba14b5dcba471257d660ea53beee00ce1
  - name: ROS 2 type hash metadata
    description: Type hash files include type name, algorithm, hash string/value, dependency hashes, and source path.
    source:
      - repository: hakoniwalab/hakoniwa-pdu-registry
        path: README.md
        revision: 7bc8839ba14b5dcba471257d660ea53beee00ce1

recipe_roles:
  - role: registry
    description: Supplies stable PDU type contracts to every runtime and integration layer.
  - role: data_model
    description: Defines binary layout and cross-language representation of simulation data.
  - role: code_generator
    description: Produces language-specific types, converters, offsets, sizes, and CDR helpers.

typical_usecases:
  - Add or update a PDU type for multiple Hakoniwa runtimes.
  - Ensure Python, JavaScript, C++, C#, Godot, bridge, and endpoint components share the same binary layout.
  - Generate CDR converters for Foxglove or ROS-compatible payload paths.
  - Audit binary compatibility changes through committed generated diffs.

anti_usecases:
  - Runtime message transport.
  - Robot body geometry conversion.
  - Quick ad hoc schema generation where reproducibility does not matter.

demo_candidates:
  - name: Generate PDU artifacts from ros_msgs.txt
    description: Run the Docker workflow and generator to update pdu/types, pdu/python, pdu/javascript, offsets, sizes, and hashes.
    required_components:
      - hakoniwa-pdu-registry
    source_examples:
      - repository: hakoniwalab/hakoniwa-pdu-registry
        path: README.md
        revision: 7bc8839ba14b5dcba471257d660ea53beee00ce1
  - name: Validate PDU binary layout use in endpoint
    description: Use generated PDU definitions and sizes as endpoint pdu_def inputs in a transport demo.
    required_components:
      - hakoniwa-pdu-registry
      - hakoniwa-pdu-endpoint
    source_examples:
      - repository: hakoniwalab/hakoniwa-pdu-registry
        path: pdu
        revision: 7bc8839ba14b5dcba471257d660ea53beee00ce1

operations:
  build:
    commands:
      - bash docker/pull-image.bash
      - bash docker/create-image.bash
    notes:
      - Docker generation is the recommended reproducible path.
  test:
    commands: []
    notes: Add exact validation commands after cataloging tests and docs/README.md.
  run:
    commands:
      - bash docker/run.bash
      - python3 -m generators.generate_hako_pdu_msgs.main config/ros_msgs.txt
      - python3 tools/generate_ros2_type_hash.py config/ros_msgs.txt
    notes:
      - Run generator commands inside the Docker container for reproducibility.

known_gaps:
  - Catalog does not yet enumerate generator options and validation scripts.
  - Need to map major PDU packages and frequently used message types for recipe search.
  - Need to distinguish generated native PDU binary from CDR payload use cases in downstream recipes.

source_refs:
  - repository: hakoniwalab/hakoniwa-pdu-registry
    path: README.md
    revision: 7bc8839ba14b5dcba471257d660ea53beee00ce1
    description: Main overview, philosophy, artifact list, quick start, and generation workflow.
  - repository: hakoniwalab/hakoniwa-pdu-registry
    path: docs/README.md
    revision: 7bc8839ba14b5dcba471257d660ea53beee00ce1
    description: Documentation index.
  - repository: hakoniwalab/hakoniwa-pdu-registry
    path: docs/specs/pdu-binary-format.md
    revision: 7bc8839ba14b5dcba471257d660ea53beee00ce1
    description: PDU binary format specification.
  - repository: hakoniwalab/hakoniwa-pdu-registry
    path: generators
    revision: 7bc8839ba14b5dcba471257d660ea53beee00ce1
    description: Generator entrypoints.
  - repository: hakoniwalab/hakoniwa-pdu-registry
    path: pdu
    revision: 7bc8839ba14b5dcba471257d660ea53beee00ce1
    description: Generated committed artifacts.

tags:
  - hakoniwa
  - pdu
  - registry
  - binary-contract
  - ros2
  - cdr
  - codegen

