    path: README.md
    revision: e07ce7e09d2abe2b30542be5b1358a914f2cb581
    description: Main overview, scope, quick start, build, and validation guidance.
  - repository: hakoniwalab/hakoniwa-pdu-rpc
    path: examples/README.md
    revision: e07ce7e09d2abe2b30542be5b1358a914f2cb581
