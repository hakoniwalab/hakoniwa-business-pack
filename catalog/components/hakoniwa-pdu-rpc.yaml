    path: docs/tutorials/rpc.md
    revision: e07ce7e09d2abe2b30542be5b1358a914f2cb581
    description: RPC tutorial.
  - repository: hakoniwalab/hakoniwa-pdu-rpc
    path: config/schema/service-schema.json
    revision: e07ce7e09d2abe2b30542be5b1358a914f2cb581
    description: Service schema.

tags:
  - hakoniwa
  - pdu
  - rpc
  - endpoint
  - cplusplus
  - control-plane
