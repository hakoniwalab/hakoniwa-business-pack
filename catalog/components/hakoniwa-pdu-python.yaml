    path: README.md
    revision: 7d4583b59ae36b27c3857e719fc52f486c4c83b2
    description: Main features, installation, quick starts, event handling, project structure, and SHM RPC runtime.
  - repository: hakoniwalab/hakoniwa-pdu-python
    path: docs/rpc/async_shared_runtime.md
    revision: 7d4583b59ae36b27c3857e719fc52f486c4c83b2
    description: Shared SHM RPC runtime.
  - repository: hakoniwalab/hakoniwa-pdu-python
    path: src/hakoniwa_pdu/apps/launcher
    revision: 7d4583b59ae36b27c3857e719fc52f486c4c83b2
    description: Hakoniwa launcher implementation installed by the hakoniwa-pdu Python package.
  - repository: hakoniwalab/hakoniwa-pdu-python
    path: pyproject.toml
    revision: 7d4583b59ae36b27c3857e719fc52f486c4c83b2
    description: Package metadata showing hakoniwa-pdu distribution name and launcher schema package data.

tags:
  - hakoniwa
  - python
  - pdu
  - websocket
  - shm
  - rpc
