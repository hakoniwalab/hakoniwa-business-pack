id: hakoniwa-pdu-python
name: Hakoniwa PDU Python
repository:
  owner: hakoniwalab
  name: hakoniwa-pdu-python
  url: https://github.com/hakoniwalab/hakoniwa-pdu-python
  visibility: public
distribution:
  channel: oss
  notes:
    - Public OSS Hakoniwa component distributed as hakoniwa-pdu on PyPI.
verification:
  verified_at: 2026-07-19
  source_revision: 7d4583b59ae36b27c3857e719fc52f486c4c83b2
  source_ref: main
summary: Python PDU communication library for Hakoniwa, integrating WebSocket topics, WebSocket RPC, SHM backend support, and binary/JSON/Python type conversion.
category:
  primary: language-binding
  secondary:
    - integration
    - rpc
    - browser

status:
  maturity: active
  catalog_confidence: high
  notes:
    - Cataloged from README features, install, quick starts, and project structure.

capabilities:
  - name: Python PDU communication
    description: Provides Python APIs for Hakoniwa PDU topic and RPC communication.
    evidence:
      - repository: hakoniwalab/hakoniwa-pdu-python
        path: README.md
        revision: 7d4583b59ae36b27c3857e719fc52f486c4c83b2
  - name: WebSocket topic and RPC support
    description: Runs Pub/Sub topics and RPC over WebSocket with ready-to-run Twist and AddTwoInts examples.
    evidence:
      - repository: hakoniwalab/hakoniwa-pdu-python
        path: README.md
        revision: 7d4583b59ae36b27c3857e719fc52f486c4c83b2
  - name: Binary/JSON/Python conversion
    description: Converts between binary PDU payloads, JSON, and Python types using offset definitions.
    evidence:
      - repository: hakoniwalab/hakoniwa-pdu-python
        path: README.md
        revision: 7d4583b59ae36b27c3857e719fc52f486c4c83b2
  - name: SHM backend
    description: Supports high-speed shared-memory communication paths and async shared SHM RPC runtime.
    evidence:
      - repository: hakoniwalab/hakoniwa-pdu-python
        path: README.md
        revision: 7d4583b59ae36b27c3857e719fc52f486c4c83b2
  - name: Event-driven and polling APIs
    description: Supports registering PDU handlers or polling internal buffers.
    evidence:
      - repository: hakoniwalab/hakoniwa-pdu-python
        path: README.md
        revision: 7d4583b59ae36b27c3857e719fc52f486c4c83b2
  - name: Hakoniwa launcher application
    description: Provides the installed launcher entrypoint `python -m hakoniwa_pdu.apps.launcher.hako_launcher` for orchestrating multiple Hakoniwa assets from a JSON file.
    evidence:
      - repository: hakoniwalab/hakoniwa-pdu-python
        path: README.md
        revision: 7d4583b59ae36b27c3857e719fc52f486c4c83b2
      - repository: hakoniwalab/hakoniwa-pdu-python
        path: src/hakoniwa_pdu/apps/launcher
        revision: 7d4583b59ae36b27c3857e719fc52f486c4c83b2
  - name: Launcher schema packaging
    description: Includes launcher JSON schemas as package data in the `hakoniwa-pdu` Python package.
    evidence:
      - repository: hakoniwalab/hakoniwa-pdu-python
        path: pyproject.toml
        revision: 7d4583b59ae36b27c3857e719fc52f486c4c83b2

limitations:
  - Requires offset files via HAKO_BINARY_PATH or default install path for binary conversion.
  - WebSocket URI scope must be explicitly configured.
  - This is a Python-facing library, not the C++ endpoint abstraction.
  - The launcher requires `hako-cmd` and any simulator commands it invokes to be available in the runtime environment; `hakoniwa-pdu` alone does not install `hakopy` or the Hakoniwa core runtime.

interfaces:
  inputs:
    - name: PDU config
      kind: config
      description: Compact or legacy PDU config defining robot, PDU name, channel ID, size, and type mapping.
    - name: Service config
      kind: config
      description: RPC service configuration.
    - name: Offset files
      kind: file
      description: .offset files used for binary conversion.
    - name: WebSocket URI
      kind: protocol
      description: ws:// URI used for remote topic or RPC communication.
  outputs:
    - name: Python typed PDU objects
      kind: api
      description: Python objects converted from binary or JSON PDU payloads.
    - name: PDU payloads
      kind: pdu
      description: Binary payloads sent over WebSocket or SHM backends.
  protocols:
    - name: WebSocket
      role: client | server
      notes: Used for remote topics and RPC examples.
    - name: Shared Memory
      role: local
      notes: Used for high-speed local backend and shared RPC runtime.
  configuration:
    - path: examples/pdu_config.json
      description: Example PDU config.
    - path: examples/service.json
      description: Example service config.
    - path: docs/rpc/async_shared_runtime.md
      description: Shared SHM RPC runtime design notes.
    - path: src/hakoniwa_pdu/apps/launcher/schemas/launcher.schema.json
      description: Launcher JSON schema for assets, activation_timing, dependencies, environment operations, logs, and notifications.

dependencies:
  required:
    - name: Python
      type: runtime
      notes: Python 3.12 is the expected runtime unless a recipe explicitly verifies another version.
    - name: hakoniwa-pdu package
      type: package
      notes: Install with pip install hakoniwa-pdu.
    - name: hakoniwa-pdu-registry offsets
      type: repository
      notes: Offset definitions are required for binary conversion.
  optional:
    - name: hakoniwa-core-pro
      type: repository
      notes: Required when Python 3.12 workflows need hakopy, hako-cmd, and the local Hakoniwa SHM runtime.
    - name: WebSocket bridge/server
      type: runtime
      notes: Required for WebSocket examples.
    - name: Hakoniwa SHM runtime
      type: runtime
      notes: Required for SHM backend.

platforms:
  supported:
    - macOS
    - Linux
    - Windows
  notes:
    - Python 3.12 is the expected runtime for Hakoniwa recipes using this package unless another version is explicitly verified.

connects_to:
  - component_id: hakoniwa-pdu-registry
    direction: uses
    interface: offset files / generated Python types
    notes: Registry artifacts enable binary conversion.
  - component_id: hakoniwa-pdu-bridge-core
    direction: related
    interface: WebSocket bridge
    notes: Python clients can communicate through WebSocket bridge paths.
  - component_id: hakoniwa-pdu-endpoint
    direction: related
    interface: PDU semantics / SHM backend
    notes: Separate Python-oriented stack that shares PDU concepts with endpoint.
  - component_id: hakoniwa-core-pro
    direction: related
    interface: hako-cmd / hakopy / SHM runtime
    notes: SHM demos and launcher-managed Hakoniwa assets often require core-pro installation; hakopy must be available in the same Python 3.12 environment as hakoniwa-pdu when both are used.
  - component_id: hakoniwa-mujoco-robots
    direction: used_by
    interface: Python controllers and visualizers
    notes: MuJoCo robot samples use Python controllers and visualizers over Hakoniwa PDU.

data_contracts:
  - name: Compact PDU config
    description: paths plus robots[].pdutypes_id format is the recommended PDU config style.
    source:
      - repository: hakoniwalab/hakoniwa-pdu-python
        path: README.md
        revision: 7d4583b59ae36b27c3857e719fc52f486c4c83b2
  - name: Offset-based binary conversion
    description: HAKO_BINARY_PATH points to offset files used to convert binary PDU payloads.
    source:
      - repository: hakoniwalab/hakoniwa-pdu-python
        path: README.md
        revision: 7d4583b59ae36b27c3857e719fc52f486c4c83b2
  - name: Launcher JSON contract
    description: The launcher uses assets[], activation_timing, depends_on, delays, environment operations, log paths, immediate/serve modes, and abort-on-asset-exit monitoring.
    source:
      - repository: hakoniwalab/hakoniwa-pdu-python
        path: README.md
        revision: 7d4583b59ae36b27c3857e719fc52f486c4c83b2
      - repository: hakoniwalab/hakoniwa-pdu-python
        path: src/hakoniwa_pdu/apps/launcher/model.py
        revision: 7d4583b59ae36b27c3857e719fc52f486c4c83b2

recipe_roles:
  - role: language_binding
    description: Provides Python access to Hakoniwa PDU topics and RPC.
  - role: communication_infrastructure
    description: Supplies WebSocket and SHM communication managers.
  - role: control_plane
    description: Supports Python RPC client/server workflows and launcher-managed demo lifecycle.

typical_usecases:
  - Build Python controllers, visualizers, or tools for Hakoniwa simulations.
  - Run WebSocket topic or RPC demos.
  - Convert PDU binary data into Python types for analysis.
  - Use shared SHM RPC for high fan-out Python clients.
  - Launch multi-process Hakoniwa demos from Python with hako_launcher.

anti_usecases:
  - C++ endpoint integration.
  - Browser or Node.js clients.
  - PDU type generation.
  - Providing `hakopy` or installing the Hakoniwa core runtime by itself.

demo_candidates:
  - name: WebSocket Twist topic
    description: Run remote_publisher and remote_subscriber with examples/pdu_config.json and service.json.
    required_components:
      - hakoniwa-pdu-python
    source_examples:
      - repository: hakoniwalab/hakoniwa-pdu-python
        path: examples/topic/websocket
        revision: 7d4583b59ae36b27c3857e719fc52f486c4c83b2
  - name: WebSocket AddTwoInts RPC
    description: Run remote_rpc_server and remote_rpc_client and verify response 3.
    required_components:
      - hakoniwa-pdu-python
    source_examples:
      - repository: hakoniwalab/hakoniwa-pdu-python
        path: examples/rpc/websocket
        revision: 7d4583b59ae36b27c3857e719fc52f486c4c83b2
  - name: Hakoniwa launcher smoke run
    description: Run `python -m hakoniwa_pdu.apps.launcher.hako_launcher path/to/launch.json` with a known-good Recipe launcher file and verify asset ordering, hako-cmd start, logs, and cleanup.
    required_components:
      - hakoniwa-pdu-python
      - hakoniwa-core-pro
    source_examples:
      - repository: hakoniwalab/hakoniwa-pdu-python
        path: README.md
        revision: 7d4583b59ae36b27c3857e719fc52f486c4c83b2

operations:
  build:
    commands:
      - pip install hakoniwa-pdu
    notes:
      - Set HAKO_BINARY_PATH when using custom offset files.
      - Use the same Python 3.12 interpreter for `hakoniwa-pdu` and any required `hakopy` import checks.
  test:
    commands: []
    notes: GitHub Actions test badge exists; exact local command should be cataloged.
  run:
    commands:
      - python -m hakoniwa_pdu.apps.launcher.hako_launcher path/to/launch.json
      - python3.12 -c "import hakopy; import hakoniwa_pdu"
      - python examples/topic/websocket/remote_publisher.py --uri ws://localhost:8080 --pdu-config examples/pdu_config.json --service-config examples/service.json
      - python examples/topic/websocket/remote_subscriber.py --uri ws://localhost:8080 --pdu-config examples/pdu_config.json --service-config examples/service.json
    notes:
      - Requires a matching WebSocket communication peer.
      - Launcher runs require hako-cmd and the referenced asset commands to be available.

known_gaps:
  - Need to catalog package metadata and exact test command.
  - Need to map app-specific Python modules such as drone subpackages.

source_refs:
