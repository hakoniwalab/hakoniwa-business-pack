id: hakoniwa-drone-core
name: Hakoniwa Drone Core
repository:
  owner: toppers
  name: hakoniwa-drone-core
  url: https://github.com/toppers/hakoniwa-drone-core
  visibility: public
distribution:
  channel: non-commercial
  notes:
    - Public repository distributed under custom non-commercial terms.
    - Commercial use requires a separate Hakoniwa Drone PRO license or agreement.
license:
  model: custom-non-commercial
  spdx_identifier: LicenseRef-hakoniwalab-NC
  public_license_page: https://hakoniwa-lab.net/products/drone-license/
  notes:
    - Public repository visibility does not imply unrestricted OSS or commercial-use rights.
verification:
  verified_at: 2026-07-20
  source_revision: afb9d4f468c4d03188c05a949b73c741534bfd10
  source_ref: main
summary: Public Hakoniwa drone simulation core with drone dynamics, PX4 and ArduPilot integration, Hakoniwa PDU integration, Python control APIs, multi-drone simulation, and extensible environment and sensor models under non-commercial licensing terms.
category:
  primary: physics-environment
  secondary:
    - simulator
    - physics-runtime
    - integration
status:
  maturity: active
  catalog_confidence: high
  notes:
    - Cataloged from the public repository README and license documents.
capabilities:
  - name: Drone dynamics simulation
    description: Simulates drone aircraft, rotor, sensor, battery, and related model behavior.
    evidence:
      - repository: toppers/hakoniwa-drone-core
        path: README.md
        revision: afb9d4f468c4d03188c05a949b73c741534bfd10
  - name: PX4 and ArduPilot integration
    description: Supports PX4 and ArduPilot control paths, including MAVLink-oriented configurations.
    evidence:
      - repository: toppers/hakoniwa-drone-core
        path: README.md
        revision: afb9d4f468c4d03188c05a949b73c741534bfd10
  - name: Hakoniwa and standalone execution
    description: Supports Hakoniwa-integrated PDU execution as well as standalone physics and control-model execution.
    evidence:
      - repository: toppers/hakoniwa-drone-core
        path: README.md
        revision: afb9d4f468c4d03188c05a949b73c741534bfd10
  - name: Python and RPC drone control
    description: Provides Python-oriented APIs for drone control and fleet-oriented RPC control in supported configurations.
    evidence:
      - repository: toppers/hakoniwa-drone-core
        path: README.md
        revision: afb9d4f468c4d03188c05a949b73c741534bfd10
  - name: Multi-drone simulation
    description: Supports multiple drone instances controlled through PX4, ArduPilot, or Hakoniwa-oriented control paths.
    evidence:
      - repository: toppers/hakoniwa-drone-core
        path: README.md
        revision: afb9d4f468c4d03188c05a949b73c741534bfd10
limitations:
  - Commercial use is prohibited under the public non-commercial licensing terms unless a separate commercial license is obtained.
  - Public repository access must not be interpreted as unrestricted OSS licensing or redistribution rights.
  - PRO-only capabilities such as Control Link and Scenario Link must not be assumed to be available under the non-commercial distribution.
  - Multi-drone scale and real-time performance depend on host resources and the selected flight-controller stack.
interfaces:
  inputs:
    - name: Drone and fleet configuration
      kind: config
      description: Aircraft, controller, sensor, service, and fleet configuration.
    - name: Flight control commands
      kind: protocol
      description: Commands from PX4, ArduPilot, Python APIs, or Hakoniwa-integrated control paths.
    - name: Hakoniwa PDU inputs
      kind: pdu
      description: PDU-based control and environment data for Hakoniwa-integrated operation.
  outputs:
    - name: Drone state and sensor data
      kind: pdu
      description: Simulated position, attitude, sensor, and related state data.
    - name: Flight-controller simulation data
      kind: protocol
      description: Data exchanged with supported PX4 or ArduPilot configurations.
  protocols:
    - name: Hakoniwa PDU
      role: pubsub
      notes: Used for control, state, sensor, and integration data.
    - name: MAVLink
      role: unicast
      notes: Used by supported PX4 and ArduPilot integration paths.
  configuration:
    - path: fleet configuration
      description: Defines drone types, controllers, services, and per-instance placement.
dependencies:
  required:
    - name: C/C++ toolchain
      type: tool
      notes: Required for native development builds.
  optional:
    - name: hakoniwa-core-pro
      type: repository
      notes: Used for Hakoniwa runtime integration and synchronized PDU execution.
    - name: hakoniwa-pdu-endpoint
      type: repository
      notes: Used by distributed and external PDU communication paths.
    - name: PX4
      type: runtime
      notes: Optional flight-controller stack.
    - name: ArduPilot
      type: runtime
      notes: Optional flight-controller stack.
platforms:
  supported:
    - Windows
    - macOS
    - Linux
    - WSL2
  notes:
    - Exact setup varies by simulator integration and flight-controller configuration.
connects_to:
  - component_id: hakoniwa-core-pro
    direction: uses
    interface: Hakoniwa runtime / time synchronization / PDU integration
    notes: Used by Hakoniwa-integrated configurations.
  - component_id: hakoniwa-pdu-endpoint
    direction: related
    interface: PDU transport
    notes: Supports distributed and external communication recipes.
  - component_id: hakoniwa-envsim
    direction: related
    interface: environmental conditions
    notes: Environment models can supply wind, temperature, pressure, and related conditions.
  - component_id: hakoniwa-pdu-rpc
    direction: related
    interface: service and RPC control
    notes: Supports service-oriented drone control recipes.
  - component_id: hakoniwa-drone-pro
    direction: related
    interface: commercial license and extended capabilities
    notes: Commercial use and PRO-only capabilities are provided separately.
data_contracts:
  - name: Drone and fleet configuration contract
    description: Configuration defines aircraft models, controllers, services, and multi-drone placement.
    source:
      - repository: toppers/hakoniwa-drone-core
        path: README.md
        revision: afb9d4f468c4d03188c05a949b73c741534bfd10
  - name: Hakoniwa PDU contract
    description: PDU definitions form the integration boundary for drone control, state, sensors, and environment data.
    source:
      - repository: toppers/hakoniwa-drone-core
        path: README.md
        revision: afb9d4f468c4d03188c05a949b73c741534bfd10
recipe_roles:
  - role: physics_runtime
    description: Simulates drone dynamics and related physical behavior.
  - role: simulation_core
    description: Provides the domain-specific simulation runtime for drone recipes.
  - role: integration_boundary
    description: Connects drone simulation to flight controllers, Hakoniwa PDU, and external applications.
typical_usecases:
  - Test drone control logic with PX4 or ArduPilot before real-flight testing.
  - Run single- or multi-drone simulation for research, education, and non-commercial development.
  - Connect drone state and sensor data to Hakoniwa-based visualization or external systems.
anti_usecases:
  - Commercial product development or operation without a separate commercial license.
  - Assuming PRO-only external-control or scenario-injection capabilities are included in the non-commercial distribution.
demo_candidates:
  - name: Single drone with PX4 or ArduPilot
    description: Run one simulated drone with a supported flight-controller stack and observe flight state and sensor data.
    required_components:
      - hakoniwa-drone-core
    source_examples:
      - repository: toppers/hakoniwa-drone-core
        path: README.md
        revision: afb9d4f468c4d03188c05a949b73c741534bfd10
operations:
  build:
    commands: []
    notes: Follow the public repository setup for the selected OS and flight-controller configuration.
  test:
    commands: []
    notes: Validation depends on the selected simulator and controller path.
  run:
    commands: []
    notes: Use repository-provided launch instructions for the chosen configuration.
known_gaps:
  - Exact rights for each source or binary artifact should be checked against the repository license documents and applicable commercial agreement.
  - Detailed Control Link and Scenario Link capabilities belong to Hakoniwa Drone PRO and are cataloged separately.
source_refs:
  - repository: toppers/hakoniwa-drone-core
    path: README.md
    revision: afb9d4f468c4d03188c05a949b73c741534bfd10
    description: Public overview, capabilities, integration paths, and multi-drone behavior.
  - repository: toppers/hakoniwa-drone-core
    path: LICENSE-ja.md
    revision: afb9d4f468c4d03188c05a949b73c741534bfd10
    description: Public non-commercial binary distribution license and commercial-use restriction.
tags:
  - hakoniwa
  - drone
  - px4
  - ardupilot
  - mavlink
  - multi-drone
  - simulator
  - pdu
  - non-commercial
