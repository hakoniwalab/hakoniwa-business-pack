id: hakoniwa-godot
name: Hakoniwa Godot
repository:
  owner: hakoniwalab
  name: hakoniwa-godot
  url: https://github.com/hakoniwalab/hakoniwa-godot
  visibility: public
distribution:
  channel: oss
  notes:
    - Public OSS Hakoniwa component.
verification:
  verified_at: 2026-07-19
  source_revision: 8f5d7d1765b319f107420f8ac4f87b24ab26ae76
  source_ref: main
summary: Godot addon and integration package that makes Godot a Hakoniwa simulation participant for visualization, PDU exchange, control, and optional physics time synchronization.
category:
  primary: visualization
  secondary:
    - integration
    - time-sync
    - visualization-assets

status:
  maturity: active
  catalog_confidence: high
  notes:
    - Cataloged from README architecture, robot sync, and supported platform sections.

capabilities:
  - name: Godot as Hakoniwa node
    description: Lets Godot run as a distributed simulation participant instead of only a passive viewer.
    evidence:
      - repository: hakoniwalab/hakoniwa-godot
        path: README.md
        revision: 8f5d7d1765b319f107420f8ac4f87b24ab26ae76
  - name: PDU endpoint integration
    description: Provides HakoniwaEndpointNode for latest/queue PDU communication through hakoniwa-pdu-endpoint.
    evidence:
      - repository: hakoniwalab/hakoniwa-godot
        path: README.md
        revision: 8f5d7d1765b319f107420f8ac4f87b24ab26ae76
  - name: Physics time synchronization
    description: HakoniwaSimNode can synchronize Godot physics time with Hakoniwa world time.
    evidence:
      - repository: hakoniwalab/hakoniwa-godot
        path: README.md
        revision: 8f5d7d1765b319f107420f8ac4f87b24ab26ae76
  - name: Robot model synchronization
    description: hakoniwa_robot_sync consumes robot_sync.profile.json and endpoint configs to reflect base pose and joint states into Node3D trees.
    evidence:
      - repository: hakoniwalab/hakoniwa-godot
        path: README.md
        revision: 8f5d7d1765b319f107420f8ac4f87b24ab26ae76
  - name: Codec and smoke-test workflow
    description: Provides codec nodes, generated message addon sync, smoke tests, and integration tests.
    evidence:
      - repository: hakoniwalab/hakoniwa-godot
        path: README.md
        revision: 8f5d7d1765b319f107420f8ac4f87b24ab26ae76

limitations:
  - PDU-RPC integration is marked as next work in the README status table.
  - macOS arm64 is the most heavily verified platform; Linux and Windows artifact paths exist but have thinner regression coverage.
  - Robot-specific scene/profile generation is owned by hakoniwa-mbody-registry, not hard-coded in this addon.

interfaces:
  inputs:
    - name: robot_sync.profile.json
      kind: config
      description: Robot sync profile generated by hakoniwa-mbody-registry.
    - name: endpoint_shm_with_pdu.json
      kind: config
      description: Endpoint config used by robot sync and PDU communication.
    - name: Godot scene nodes
      kind: api
      description: Node3D targets updated by HakoniwaRobotSyncController.
    - name: PDU messages
      kind: pdu
      description: base_link_pos, joint_states, and other PDU values consumed by Godot nodes.
  outputs:
    - name: Godot visualization state
      kind: api
      description: Updated Godot node transforms, UI, and scene state.
    - name: Hakoniwa asset progression
      kind: api
      description: Optional physics-time-synchronized asset steps.
  protocols:
    - name: Hakoniwa Endpoint
      role: local
      notes: Used for PDU communication.
    - name: Hakoniwa Core time sync
      role: local
      notes: Used by HakoniwaSimNode for world time synchronization.
  configuration:
    - path: docs/quick_start.md
      description: User quick start.
    - path: docs/robot_sync_design.md
      description: Robot sync design.
    - path: docs/physics_time_sync_strategy.md
      description: Physics time sync strategy.
    - path: examples/mujoco
      description: MuJoCo/Godot sync wrapper example.

dependencies:
  required:
    - name: Godot 4
      type: runtime
      notes: README verified Godot 4.6.1 mono on macOS arm64.
    - name: CMake
      type: tool
      notes: Required for native addon build.
    - name: godot-cpp
      type: repository
      notes: Submodule used for native extension build.
  optional:
    - name: hakoniwa-core-pro
      type: repository
      notes: Used for time synchronization.
    - name: hakoniwa-pdu-endpoint
      type: repository
      notes: Used for latest/queue PDU communication.
    - name: hakoniwa-mbody-registry
      type: repository
      notes: Generates robot scenes, endpoint configs, and robot sync profiles consumed by this addon.

platforms:
  supported:
    - macOS
    - Linux
    - Windows
  notes:
    - macOS arm64 has the strongest verification according to README.

connects_to:
  - component_id: hakoniwa-core-pro
    direction: uses
    interface: time sync
    notes: HakoniwaSimNode uses core-pro to align Godot physics time with Hakoniwa world time.
  - component_id: hakoniwa-pdu-endpoint
    direction: uses
    interface: Endpoint latest/queue PDU communication
    notes: HakoniwaEndpointNode owns communication.
  - component_id: hakoniwa-pdu-registry
    direction: uses
    interface: generated codecs and typed message scripts
    notes: Codec node owns generated message codecs.
  - component_id: hakoniwa-mbody-registry
    direction: uses
    interface: generated robot_sync.profile.json / endpoint config / scene
    notes: Robot sync consumes generated artifacts from mbody registry.
  - component_id: hakoniwa-mujoco-robots
    direction: related
    interface: PDU robot state visualization
    notes: MuJoCo robot state can be visualized in Godot through PDU sync.

data_contracts:
  - name: Robot sync profile
    description: robot_sync.profile.json maps PDU inputs to target Godot Node3D transforms and joints.
    source:
      - repository: hakoniwalab/hakoniwa-godot
        path: docs/robot_sync_design.md
        revision: 8f5d7d1765b319f107420f8ac4f87b24ab26ae76
  - name: Godot loop data handling
    description: latest is recommended for _process visualization/UI, queue for _physics_process state transitions/log/control.
    source:
      - repository: hakoniwalab/hakoniwa-godot
        path: README.md
        revision: 8f5d7d1765b319f107420f8ac4f87b24ab26ae76

recipe_roles:
  - role: visualizer
    description: Provides 3D visualization and UI for robot/drone state.
  - role: simulation_core
    description: Can participate as a synchronized Hakoniwa execution node.
  - role: integration_boundary
    description: Connects game-engine scenes to Hakoniwa PDU and time APIs.

typical_usecases:
  - Visualize robot or drone state in Godot.
  - Synchronize Godot physics with Hakoniwa world time.
  - Consume mbody-generated robot scenes and sync profiles.
  - Build interactive UI, 3D display, or sensor expression around Hakoniwa PDU streams.

anti_usecases:
  - Headless physics simulation where MuJoCo alone is enough.
  - PDU type generation.
  - Browser-based visualization where JavaScript/Three.js is preferred.

demo_candidates:
  - name: Basic subscriber smoke
    description: Build addon packages and run the basic_subscriber headless smoke project.
    required_components:
      - hakoniwa-godot
    source_examples:
      - repository: hakoniwalab/hakoniwa-godot
        path: tests/smoke/basic_subscriber
        revision: 8f5d7d1765b319f107420f8ac4f87b24ab26ae76
  - name: MuJoCo robot sync visualization
    description: Use mbody-generated sync artifacts and examples/mujoco wrapper to visualize robot PDU state.
    required_components:
      - hakoniwa-godot
      - hakoniwa-mbody-registry
      - hakoniwa-mujoco-robots
    source_examples:
      - repository: hakoniwalab/hakoniwa-godot
        path: examples/mujoco
        revision: 8f5d7d1765b319f107420f8ac4f87b24ab26ae76

operations:
  build:
    commands:
      - cmake --preset default
      - cmake --build --preset default
      - bash tools/message_addon_tool.sh sync --packages all
    notes:
      - Build all codecs before multi-codec examples.
  test:
    commands:
      - <GODOT_BIN> --headless --path tests/smoke/basic_subscriber --quit
    notes:
      - Expected smoke marker is HAKONIWA_CODEC_SMOKE_OK.
  run:
    commands:
      - bash tools/build_all_codecs.sh
      - HAKO_ENABLE_PHYSICS_TIME_SYNC=1 HAKO_DEBUG_TIME_SYNC_LOGS=1 <GODOT_BIN> --headless --path tests/integration/core_pro_two_asset
    notes:
      - Replace <GODOT_BIN> with local Godot binary.

known_gaps:
  - Need to catalog docs/current_status.md and installation/developer build details.
  - Need to separate visualization-only recipes from synchronized Godot-node recipes.

source_refs:
  - repository: hakoniwalab/hakoniwa-godot
    path: README.md
    revision: 8f5d7d1765b319f107420f8ac4f87b24ab26ae76
    description: Main overview, architecture, robot sync, time sync, platform support.
  - repository: hakoniwalab/hakoniwa-godot
    path: docs/robot_sync_design.md
    revision: 8f5d7d1765b319f107420f8ac4f87b24ab26ae76
    description: Robot sync design.
  - repository: hakoniwalab/hakoniwa-godot
    path: docs/physics_time_sync_strategy.md
    revision: 8f5d7d1765b319f107420f8ac4f87b24ab26ae76
    description: Physics time synchronization strategy.

tags:
  - hakoniwa
  - godot
  - visualization
  - pdu
  - endpoint
  - robot-sync
  - time-sync

