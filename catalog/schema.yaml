schema_version: 0.2
description: Controlled vocabulary for Hakoniwa component catalog entries.

controlled_fields:
  category.primary:
    description: Main catalog grouping used for first-pass component filtering.
    values:
      - communication
      - data-model
      - physics-environment
      - simulation-core
      - visualization
      - language-binding
      - tool
  category.secondary:
    description: Secondary grouping tags. Extend as needed, but keep values kebab-case.
    values:
      - asset-generation
      - binary-contract
      - browser
      - bridge
      - code-generation
      - commercial
      - conductor
      - control-plane
      - distributed-execution
      - environment-model
      - foxglove
      - infrastructure
      - integration
      - language-binding
      - monitoring
      - physics-runtime
      - rd
      - registry
      - robot-arm
      - robot-body
      - ros2
      - rpc
      - simulator
      - time-sync
      - visualization
      - visualization-assets
  status.maturity:
    description: Practical maturity for recipe selection.
    values:
      - draft
      - experimental
      - active
      - stable
      - deprecated
  status.catalog_confidence:
    description: Confidence in the catalog entry based on available source docs.
    values:
      - low
      - medium
      - high
  repository.visibility:
    description: Repository visibility as known to the catalog author.
    values:
      - public
      - private
      - unknown
  distribution.channel:
    description: Product distribution or licensing model for recipe and business-pack planning. Repository visibility is tracked separately and does not imply license rights.
    values:
      - oss
      - non-commercial
      - commercial
      - dual-license
      - unknown
  interfaces.kind:
    description: Interface artifact types consumed or produced by a component.
    values:
      - api
      - command
      - config
      - file
      - protocol
      - pdu
  interfaces.protocols.role:
    description: Role a component takes for a protocol.
    values:
      - client
      - server
      - pubsub
      - file
      - local
      - unicast
      - broadcast
      - multicast
  dependencies.type:
    description: Dependency classes.
    values:
      - library
      - tool
      - runtime
      - repository
      - package
  connects_to.direction:
    description: Direction of a component graph edge from the current component. This is a planning relationship, not proof that a full recipe connection has been runtime-verified.
    values:
      - uses
      - used_by
      - bidirectional
      - related
    semantics:
      uses: Current component directly depends on or consumes the target component.
      used_by: Target component commonly consumes or builds on the current component.
      bidirectional: Both components call, consume, or coordinate with each other as peers.
      related: The relationship is relevant for recipe planning but is not a direct dependency edge.
  recipe_roles.role:
    description: Role a component can play inside a product recipe.
    values:
      - asset_generator
      - bridge
      - code_generator
      - commercial_pack
      - communication_infrastructure
      - control_plane
      - data_model
      - environment_model
      - integration_boundary
      - language_binding
      - monitor
      - physics_runtime
      - rd_runtime
      - registry
      - simulation_core
      - time_sync
      - visualization_asset_source
      - visualizer
  runtime_checks.kind:
    description: Type of executable guardrail owned by the component repository.
    values:
      - doctor
      - validator
      - smoke-test
      - test
  runtime_checks.platforms:
    description: Platforms on which the declared runtime check is intended to run.
    values:
      - macos
      - linux
      - windows
  runtime_checks.working_directory:
    description: Directory context used when invoking the runtime check.
    values:
      - repository
  runtime_checks.output:
    description: Output contract produced by the component-owned runtime check.
    values:
      - text
      - json

authoring_rules:
  - Add new controlled values to this file before using them in component entries.
  - Prefer `related` only when neither `uses` nor `used_by` is accurate.
  - Keep category values broad; use tags for search-specific vocabulary.
  - Keep recipe roles stable because recipe generation uses them as planning primitives.
  - Treat repository visibility and distribution/license rights as separate facts; a public repository is not automatically OSS.
  - Use `distribution.channel: non-commercial` when a component is only available under non-commercial terms.
  - Use `distribution.channel: commercial` when a component is only available through commercial licensing.
  - Use `distribution.channel: dual-license` when one technical component or codebase is offered under distinct non-commercial/OSS and commercial licensing paths.
  - Do not create separate catalog components solely to represent different licenses for the same codebase; represent those variants in the component's license metadata instead.
  - Mark private Hakoniwa business/product repositories as `distribution.channel: commercial` only when they represent a distinct technical component, not merely a commercial distribution of an existing component.
  - Treat `connects_to` as component-level planning knowledge. Put recipe-specific connection contracts, required adapters, and validation status in recipe `connections[].contract`.
  - Keep `runtime_checks` optional. Absence means runtime readiness is unknown, not that the component failed.
  - Runtime checks must be owned by the component repository; do not duplicate component-specific diagnostic logic in Business Pack.
  - Prefer non-destructive detection and remediation guidance over automatic installation, download, or repair in doctor-style checks.
