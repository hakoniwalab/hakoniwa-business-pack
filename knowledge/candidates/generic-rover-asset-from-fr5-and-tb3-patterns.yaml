id: generic-rover-asset-from-fr5-and-tb3-patterns
title: Generic rover asset pattern should combine FR5 manifest discipline with TB3 mobile-base runtime behavior
status: candidate

knowledge_type:
  - architectural_principle
  - usage_pattern
  - interface_contract
  - validation_rule

summary: >
  AgileX Tracer should not become a one-off dedicated asset if the goal is a
  reusable Hakoniwa mobile-base pattern. A generic rover asset can reuse the
  manifest-driven integration discipline validated by hakoniwa-robot-arm-pack
  and the mobile-base control behavior already present in the TurtleBot3 runtime,
  while using geometry_msgs/Twist as the AI-friendly command PDU.

observation:
  context: >
    Reviewing hakoniwa-robot-arm-pack after validating the AgileX Tracer
    URDF-to-MuJoCo conversion Recipe and discussing the next Tracer runtime Recipe.
  details:
    - hakoniwa-robot-arm-pack keeps robot-specific assets and tuned configuration in a pack while reusing public MBody and MuJoCo runtime components.
    - The FR5 flow uses one asset-manifest.json as the runtime entry point for model, PDU definition, Endpoint configuration, actuator configuration, and state-output configuration.
    - The FR5 forge flow applies robot-specific source adaptation, DAE-to-OBJ conversion, actuator injection, and contact excludes before runtime validation.
    - TurtleBot3 in hakoniwa-mujoco-robots already implements mobile-base command application, wheel velocity actuator control, state publication, sensors, and Hakoniwa lifecycle.
    - The current TurtleBot3 runtime is not fully generic; it still assumes TB3-specific body names, component IDs, PDU names, and runtime configuration fields.
    - A first Tracer rover prototype in hakoniwa-mujoco-robots validated the generic command direction by receiving geometry_msgs/Twist on RoverTwistAsset/cmd_vel and applying it to left/right wheel velocity actuators.
    - The Twist-to-left/right-wheel conversion was factored into a shared stateless helper, include/robots/rover/differential_drive_kinematics.hpp, so Tracer and later rover samples can share the same kinematic conversion while keeping robot-specific wheel radius, separation, signs, and limits in configuration or sample parameters.
    - For AgileX Tracer, geometry_msgs/Twist is preferable to hako_msgs/GameControllerOperation as the first command PDU because it is semantically direct for AI-generated control, ROS-adjacent, and easier to explain in Recipes.
    - Contact should initially be validated as generated rather than over-engineered. Primitive collision or contact excludes should be introduced only after a concrete instability is observed.

