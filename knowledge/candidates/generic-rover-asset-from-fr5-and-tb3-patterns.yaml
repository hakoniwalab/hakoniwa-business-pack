    - description: >
        FR5 reference integration is cataloged as locally verified on
        2026-07-21 for JointTrajectory command acceptance and JointState output.
    - description: >
        AgileX Tracer conversion is locally verified through MuJoCo model loading,
        MuJoCo-only actuator smoke, and a first Hakoniwa Twist PDU runtime smoke.
    - description: >
        The rover-twist-hakoniwa-asset prototype received linear.x=0.200,
        angular.z=0.000 from send_rover_twist.py after hako-cmd start and
        advanced the Tracer base x position from 0.000m to 0.333m in the
        initial validation and 0.300m after collision/height tuning.
  expert_input:
    - source: user
      statement: >
        Prefer geometry_msgs/Twist for command PDU because AI can handle it more
        easily; prefer a generic asset over a dedicated Tracer asset; start with
        generated contacts as-is and address contact issues only if observed.

confidence: medium

contradictions:
  - target: recipes/examples/agilex-tracer-urdf-to-mujoco.yaml
    existing_claim: Downstream runtime wiring is undefined after conversion.
    new_evidence: >
      The likely runtime direction is now a generic rover/mobile-base asset using
      Twist command input, wheel velocity actuators, manifest-driven configuration,
      and as-is contact validation first.

validation:
  status: partially_verified
  required:
    - Generalize the Tracer-specific prototype into a reusable rover/mobile-base asset configuration.
    - Move Tracer wheel geometry, signs, command limits, and channel names from sample constants into a config or manifest before treating the asset as generic.
    - Add a controlled shutdown path that does not require hako-cmd stop in environments where stop is unavailable.
    - Verify state output and optional sensor output after command input is stable.
  notes:
    - The Twist command direction is now validated by a local Tracer prototype.
    - The shared kinematics helper is generic, but the asset is not yet generic because wheel geometry, signs, asset names, and command limits are still hard-coded in the example.
    - The contact policy was empirical: primitive wheel/caster collisions and excludes were added only after as-is mesh contact failed drive validation.

promotion_targets:
