promotion_rationale:
  - The manifest-driven pack pattern belongs in component Catalog and Recipes.
  - The generic rover asset decision belongs in the next AgileX Tracer Recipe.
  - This is not yet a Runtime Primer rule because no new shared runtime invariant has been validated.

