      revision: main
    - repository: ykikuchii/hakoniwa-pdu-foxglove
      path: (branch win-foxglove-sdk-support, commit 3cc7b29)
      revision: win-foxglove-sdk-support
    - repository: foxglove/foxglove-sdk
      path: "releases/download/sdk/v0.25.2 (asset listing via GitHub API)"
      revision: "sdk/v0.25.2"
    - repository: foxglove/ws-protocol
      path: docs/spec.md
      revision: main
  runtime_evidence:
    - description: >-
        Reproduced on an external contributor's Windows 11 x86_64 workspace (native build,
        no WSL/Docker), 2026-07-24: full build log sequence for all 4 code
        gaps (Boost not found -> fastcdr not found -> C2908/C3856 -> ntdll
        unresolved -> clean build of hakoniwa_pdu_foxglove.lib,
        cdr_publisher_example.exe, cdr_stdin_publisher.exe, and
        hakoniwa_pdu_foxglove_tests.exe, the latter passing all 18 tests);
        then the firewall diagnosis (netstat showing no listener despite
        clean server logs, New-NetFirewallRule requiring elevation, TCP
        connectivity succeeding immediately after the rule was added); then
        a live screenshot-confirmed connection from the official Foxglove
        Windows desktop app showing the server name in its tab title and the
        /hakoniwa/FoxgloveDemo/sim_time topic's .time_usec value advancing in
        real time.
  expert_input:
    - description: >-
        An AI coding assistant's (GPT-5.6-class) root-cause analysis of the C2908/C3856
        MSVC template error, run as an independent second opinion: confidence "high" that the root cause is parameter.hpp's
        isArray<T>()/isDict<T>() bodies referencing get<Array>()/get<Dict>()
        before their explicit specializations are defined later in the same
        header, and confidence "medium-high" that this is a genuine SDK
        header-ordering fragility rather than a standard-mandated MSVC
        rejection. Also proposed the /Zc:twoPhase- workaround (confirmed
        working) and a concrete header-patch alternative (not applied, since
        the flag was sufficient).

confidence: high

contradictions:
  - target: "Initial hypothesis: 'HTTP 400 Missing expected sec-websocket-protocol header' meant the Windows Foxglove SDK build had a real WebSocket subprotocol negotiation bug"
    existing_claim: "Multiple independent WebSocket clients (Python websockets library with and without explicit subprotocol headers, a hand-rolled raw-socket HTTP Upgrade request) all failed with the same HTTP 400 body, suggesting a server-side protocol handling defect specific to the Windows build."
    new_evidence: "The official Foxglove desktop app connected successfully on the first attempt once the firewall rule was in place, with the exact same server binary and config, proving the WebSocket/subprotocol implementation itself was correct all along; the HTTP 400 responses were symptoms of the same underlying connectivity instability the firewall rule fixed (exact mechanism not fully isolated, but the causal link to the firewall state is well supported by the before/after evidence)."

validation:
  status: verified
  required:
    - "ARM64 Windows SHA256 in cmake/FoxgloveSdk.cmake is an unverified TODO placeholder (no ARM64 Windows machine available) -- must be filled in and build-tested before claiming ARM64 Windows support."
    - "The /Zc:twoPhase- workaround is a temporary diagnostic per its own code comment; an upstream SDK header fix or an automated FetchContent-time patch (both discussed with Codex) would be the more durable fix if this SDK version's header ships unchanged in future consumers."
  notes:
    - Verified end-to-end via a real screenshot-confirmed connection from the official Foxglove Windows desktop app, not just log inspection or a synthetic client.

