  repositories:
    - repository: hakoniwalab/hakoniwa-pdu-foxglove
      path: cmake/FoxgloveSdk.cmake
      revision: main
    - repository: hakoniwalab/hakoniwa-pdu-foxglove
      path: CMakeLists.txt
      revision: main
    - repository: hakoniwalab/hakoniwa-pdu-foxglove
