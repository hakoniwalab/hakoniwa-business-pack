    - description: >
        Hakoniwa plant/sender smoke sent actuator_position_targets
        Float64MultiArray[20]. Sender JointState readback included
        rh_FFJ2=0.802 and rh_FFJ1=0.922 when FFJ0 target reached 1.750.
  expert_input:
    - source: user
      statement: >
        Shadow Hand の難しさは MuJoCo で動かすことではなく、箱庭の
        外部指令インタフェースとして何を 1 自由度として見せるかを
        正しく決めること。command space と observation space を分けるべき。

confidence: high

contradictions: []

validation:
  status: verified
  required:
    - Reuse this pattern on another tendon-driven or non-joint-transmission model before promoting it as a broad component guide rule.
    - Decide whether future PDU contracts should remain Float64MultiArray plus documented order or move to a named actuator command message.
  notes:
    - Verified for Shadow Hand bounded open-close motion through MuJoCo-only and Hakoniwa PDU smoke.
    - This does not validate natural grasping, contact-rich manipulation, or closed-loop dexterous hand control.

promotion_targets:
