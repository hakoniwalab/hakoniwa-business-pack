id: named-actuator-command-space-for-tendon-coupled-mujoco-models
title: Tendon-coupled MuJoCo models should expose named actuator command space separately from joint observation space
status: candidate

knowledge_type:
  - interface_contract
  - design_intent
  - usage_pattern
  - known_pitfall
  - validation_rule

summary: >
  For MuJoCo models that use actuator transmissions beyond one actuator per
  joint, such as fixed tendons in Shadow Hand, the Hakoniwa command contract
  should be defined from stable actuator names rather than observed joint names.
  JointState remains useful as observation, but command dimension and observation
  dimension are allowed to differ. Hakoniwa should send actuator targets and let
  MuJoCo apply tendon coupling internally.

observation:
  context: >
    Implementing the Shadow Hand Menagerie MJCF Recipe in hakoniwa-mujoco-robots
    after the user highlighted that tendon coupling is the core design risk.
  details:
    - Shadow Hand scene_right.xml loads with nu=20, njnt=25, and ntendon=4.
    - The hand command space has 20 named position actuators.
    - The observed hand joint space has 24 named hand joints; the scene also includes an unnamed freejoint for the free object that should not be part of the hand JointState contract.
    - Four position actuators target fixed tendons: rh_A_FFJ0, rh_A_MFJ0, rh_A_RFJ0, and rh_A_LFJ0.
    - Each fixed tendon couples two distal finger joints with coefficient 1, for example rh_FFJ0 couples rh_FFJ2 and rh_FFJ1.
    - Treating command count as observed joint count would create invalid independent commands for tendon-coupled joints.
    - A stable Hakoniwa contract was defined as std_msgs/Float64MultiArray[20] in explicit actuator-name order.
    - The plant binds each command entry by actuator name through NamedActuatorImpl, then calls SetTarget(); MuJoCo handles whether the actuator targets a joint or a tendon.
    - The state path publishes sensor_msgs/JointState for observed joints, including tendon-coupled distal joints, without exposing them as independent commands.
    - The Hakoniwa no-viewer smoke confirmed that sending FFJ0 tendon targets changed both FFJ2 and FFJ1 observations.

