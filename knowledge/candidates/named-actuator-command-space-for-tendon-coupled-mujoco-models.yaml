promotion_rationale:
  - This is a reusable interface-contract rule for MuJoCo robot assets, especially hand, tendon, cable, or other transmission-driven models.
  - It belongs near component/asset guidance and actuator examples rather than generic runtime lifecycle documentation.

resolution:
  promoted_to: []
  notes:
    - Candidate created after Shadow Hand Menagerie MJCF reached Hakoniwa PDU bounded open-close validation.
