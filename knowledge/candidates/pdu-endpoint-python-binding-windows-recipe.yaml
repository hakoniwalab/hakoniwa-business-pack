      revision: main
    - repository: hakoniwalab/hakoniwa-pdu-endpoint
      path: python/hakoniwa_pdu_endpoint/build_c_endpoint_ffi.py
      revision: main
  runtime_evidence:
    - description: >-
        Reproduced on an external contributor's Windows 11 x86_64 workspace (native build,
        no WSL/Docker), 2026-07-24: the exact error sequence (cffi missing -> setuptools
        missing -> VS-not-found -> vswhere-on-PATH fix -> DLL-load-failed ->
        add_dll_directory fix) was reproduced step by step, ending in a successful
        combined `import hakopy; import hakoniwa_pdu; from hakoniwa_pdu_endpoint
        .c_endpoint import Endpoint, PduKey` and then full Go1 + Shadow Hand
        three-terminal (plant / sender / hako-cmd start-stop) smoke runs reaching each
        README's documented expected signals.
  expert_input: []

