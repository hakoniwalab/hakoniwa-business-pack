promotion_rationale:
  - The DAE preprocessing support and source-adapter need are component-specific MBody conversion knowledge.
  - The verified Tracer conversion path belongs in the Tracer Recipe validation record.
  - The finding is not a Hakoniwa runtime rule because no shared-memory, PDU, lifecycle, or Conductor behavior is involved.

resolution:
  promoted_to:
    - catalog/components/hakoniwa-mbody-registry.yaml
    - recipes/examples/agilex-tracer-urdf-to-mujoco.yaml
  notes:
