confidence: medium

contradictions:
  - target: knowledge/candidates/generic-rover-asset-from-fr5-and-tb3-patterns.yaml
    existing_claim: >
      AgileX Tracer should move toward a generic rover/mobile-base Hakoniwa asset
      using geometry_msgs/Twist.
    new_evidence: >
      The generic rover target is still appropriate, but implementation should
      be staged behind a MuJoCo-only actuator/contact validation sample.

validation:
  status: partially_verified
  required:
    - Observe the Tracer MuJoCo-only actuator sample in the viewer and confirm acceptable base motion.
    - Observe generated Tracer primitive contacts in the viewer and confirm the headless forward-displacement result is visually acceptable.
    - Tune primitive wheel/caster dimensions and initial pose when viewer inspection shows oversized collision geoms or chassis tilt.
    - Add state output and optional sensor output after command input is stable.
    - Generalize the prototype so robot geometry and limits come from config rather than hard-coded example constants.
  notes:
    - The pattern is verified in existing tutorials and partially executed for AgileX Tracer through actuator/collision/contact/world generation, MuJoCo load, and a non-viewer C++ actuator smoke check.
    - Tracer minimal-world MuJoCo load after collision/contact tuning reported nbody=13, njnt=11, ngeom=25, nu=2, nexclude=10 and actuators left_motor/right_motor.
    - agilex-tracer-rover-example --check completed with check ok after binding both wheel actuators, advancing simulation for 1 second, and verifying positive forward displacement.
    - rover-twist-hakoniwa-asset plus send_rover_twist.py validated Python geometry_msgs/Twist command input through Hakoniwa shared memory after hako-cmd start.
    - The Tracer plant log after visual-scale collision tuning showed cmd=(0.200, 0.000), wheel=(-2.439, 2.439), and base x progression from 0.000m to 0.300m over the command window.
    - The Go1 MuJoCo-only C++ sample built as unitree-go1-joint-io-example and its --check run printed nu=12, the 12 actuator mapping, time=1.000, base=(0.002, 0.000, 0.265), FR_thigh=1.004, RL_thigh=0.975, and check ok.
    - The Go1 Hakoniwa PDU smoke reached WAIT START for the plant and sender, hako-cmd start created PDU shared memory, the plant entered WAIT RUNNING, and the sender logged joint_position_targets plus JointState feedback for FR_thigh/RL_thigh.
    - The Go1 default creep walk-pattern smoke reached warmup, creep, cooldown, and done phases, moved slowly in the stable backward direction, and kept plant base z approximately 0.264m to 0.267m during the short run.
    - The earlier Go1 diagonal trot-pattern smoke reached warmup, trot, cooldown, and done phases with larger visible motion, but user viewer feedback showed it can tip over.
    - Viewer observation is required before promotion because primitive collision overlays can be physically useful but visually oversized or stance-distorting.

