id: mujoco-first-actuator-sensor-validation-sequence
title: New MuJoCo robot recipes should validate actuator and sensor behavior before Hakoniwa PDU integration
status: candidate

knowledge_type:
  - usage_pattern
  - validation_rule
  - recipe_design

summary: >
  For a new robot such as AgileX Tracer, the lowest-risk Recipe sequence is to
  first create a MuJoCo-only sample that proves model loading, actuator binding,
  contact behavior, and optional sensor binding. The Hakoniwa asset adapter and
  Python PDU controller/reader should be added only after the same model and JSON
  configs work in standalone MuJoCo. For source-derived robot bodies, actuator
  and world additions should remain tool-chain inputs layered onto generated
  MJCF rather than hand-maintained MJCF forks.

observation:
  context: >
    Reviewing hakoniwa-mujoco-robots examples/actuators and examples/sensors
    while planning the next AgileX Tracer Recipe after URDF-to-MuJoCo conversion.
  details:
    - The joint actuator tutorial starts with a MuJoCo-only executable that loads a model, loads JSON actuator configs, creates JointActuatorImpl instances, and directly applies SetTarget() into MuJoCo ctrl[].
    - The joint actuator Hakoniwa example reuses the same model/config pattern, then adds Endpoint, Hakoniwa lifecycle, Float64 command PDUs, and JointState output.
    - The Python actuator sender is a separate controller asset, so PDU behavior is validated after the MuJoCo actuator behavior is already visible.
    - The ultrasonic tutorial follows the same sequence: first bind a sensor to an MJCF site and verify deterministic measurements and viewer ray visualization, then publish sensor_msgs/Range as a Hakoniwa PDU, then read it from Python.
    - The color camera tutorial also separates MuJoCo camera capture from Hakoniwa image PDU publication and Python consumption.
    - This staged structure cleanly separates physics/contact/model defects from Hakoniwa Endpoint/PDU integration defects.
    - For AgileX Tracer, this implies a first sample with a ground plane, freejoint, left/right wheel velocity actuators, passive caster joints as generated, and keyboard or scripted Twist-like velocity targets before building a generic rover Hakoniwa asset.
    - The Tracer validation then proceeded to the next stage with a Hakoniwa plant asset and a Python controller asset using geometry_msgs/Twist.
    - The runtime order was plant asset executable starts conductor and registers RoverTwistAsset, Python sender registers RoverTwistSender, then hako-cmd start transitions both from WAIT START into simulation.
    - To preserve source reproducibility, Tracer actuator, collision, contact, and world additions should be expressed as tool-chain inputs such as actuators.yaml, collision_primitives.yaml, contact_excludes.yaml, and mujoco_world.yaml, not as a hand-maintained fork of the generated MJCF.
    - This was partially executed for Tracer by adding MBody tool-chain configs, generating tracer_v1.actuated.xml, tracer_v1.actuated.collision.xml, tracer_v1.actuated.collision.contact.xml, and tracer_v1.minimal_world.xml, and running a MuJoCo-only C++ --check smoke in hakoniwa-mujoco-robots.
    - As-is mesh contact was not sufficient for Tracer drive validation: internal base/caster contacts appeared and wheel-driven translation was poor. Adding primitive wheel/caster collision geoms and contact excludes produced stable headless forward displacement.
    - Viewer inspection later showed that passing headless displacement is not enough: the initial Tracer drive-wheel collision primitive radius of 0.082m was visibly larger than the visual wheel mesh radius of about 0.0605m and could contribute to tilt. The primitive radius was then reduced to 0.0605m and the initial base height was lowered to z=0.1425. Primitive overlays must be checked for visual scale, stance, and contact height together.

