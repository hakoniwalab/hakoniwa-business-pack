      statement: >
        Prefer AI-friendly, generic command PDUs that can evolve rather than
        jumping to a narrow robot-specific asset contract too early.

confidence: medium

contradictions:
  - target: future-walking-controller-contract
    existing_claim: >
      A future walking controller may need a richer command abstraction than
      raw joint-position arrays.
    new_evidence: >
      Float64MultiArray is suitable for Step 2 joint I/O validation but should
      not be treated as the final walking abstraction until a controller is
      selected and validated.

validation:
  status: partially_verified
  required:
    - Add automated runtime smoke coverage for the plant/sender/hako-cmd start sequence.
    - Validate whether future controller integrations prefer JointTrajectory, cmd_vel-to-gait, or a richer quadruped-specific command.
  notes:
    - Unitree Go1 runtime smoke showed target changes reflected in FR_thigh and RL_thigh JointState readback.
    - Unitree Go1 walk-pattern smoke showed warmup, trot, cooldown, and done logs with thigh JointState readback and finite plant base state over a short run.
    - A transient invalid initial PDU read may appear before the first publisher frame; later command/state logs should be used as smoke evidence.
    - Plant assets that can run before their first controller command should either seed the command channel or probe it at a low rate until a valid command arrives.

promotion_targets:
  catalog:
