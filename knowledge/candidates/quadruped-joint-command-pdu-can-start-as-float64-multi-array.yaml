promotion_rationale:
  - The rule helps future robot Recipes choose a generic first command boundary without blocking on final controller design.
  - It belongs near component asset and PDU contract guidance after another multi-joint robot validates the same pattern.

resolution:
  promoted_to: []
  notes:
    - Candidate created after Unitree Go1 Step 2 Hakoniwa PDU smoke succeeded.
    - Candidate updated after pose and open-loop walk-pattern senders reused the same generic joint command contract.
