id: quadruped-joint-command-pdu-can-start-as-float64-multi-array
title: Quadruped joint command PDU can start as Float64MultiArray with a stable joint order
status: candidate

knowledge_type:
  - recipe_design
  - data_contract
  - validation_rule

summary: >
  For a simulation-first quadruped Recipe, a first Hakoniwa joint command
  contract can use std_msgs/Float64MultiArray instead of a robot-specific PDU,
  as long as the Recipe documents a stable joint order and validates command
  length, actuator mapping, and state readback. This keeps the command boundary
  generic while the walking-controller contract is still undecided.

observation:
  context: >
    Implementing the Unitree Go1 Menagerie MJCF Step 2 Hakoniwa PDU runtime.
  details:
    - The Go1 MJCF already defines 12 position actuators.
    - A robot-specific fixed struct would encode the same 12 doubles but would be less reusable before a walking-controller interface is selected.
    - The implemented contract uses joint_position_targets as std_msgs/Float64MultiArray and joint_states as sensor_msgs/JointState.
    - The command order is FR_hip, FR_thigh, FR_calf, FL_hip, FL_thigh, FL_calf, RR_hip, RR_thigh, RR_calf, RL_hip, RL_thigh, RL_calf.
    - The plant asset rejects command arrays whose length is not 12.
    - The plant clamps command values through each MJCF actuator ctrlrange before writing MuJoCo ctrl[].
    - The Python sender uses the same order and reads JointState feedback for FR_thigh and RL_thigh.
    - Runtime smoke verified command and state flow after plant asset registration, sender registration, and hako-cmd start.
    - The same Float64MultiArray contract was reused for pose_bounce_go1.py and walk_go1.py without adding robot-specific command structs.
    - An experimental open-loop trot-like sender could therefore be added as a controller-side script while keeping the plant asset and PDU schema unchanged.
    - Before the first controller command is published, the plant should avoid tight-loop reads of an unwritten command PDU; probing at a lower rate until the first valid command prevents noisy null-PDU conversion logs.

