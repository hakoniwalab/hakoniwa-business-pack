      revision: main
    - repository: hakoniwalab/hakoniwa-godot
      path: README.md
      revision: main
  runtime_evidence:
    - description: >-
        Reproduced on an external contributor's Windows 11 x86_64 workspace (native build,
        no WSL/Docker), 2026-07-24: the exact SCRIPT ERROR (broken symlink),
        then hakoniwa_simevent_init error=-1 (stale HAKO_CONFIG_PATH), then a
        run truncated right after HAKO_CORE_SMOKE_START_FEEDBACK_OK
        (--quit race) were each reproduced, diagnosed, and fixed in
        sequence, ending in a clean HAKO_CORE_SMOKE_OK / exit 0 /
        "[run-core-pro-smoke.ps1] passed" run showing the full
        start/stop/reset/restart lifecycle plus 3 time-synced simulation
        steps (simtime=20000/40000/60000 matching world time exactly).
  expert_input: []

