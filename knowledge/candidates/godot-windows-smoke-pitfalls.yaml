  - Directly reusable for anyone on a multi-project Windows dev machine bringing up hakoniwa-godot, and the symlink/CLI-flag pitfalls generalize to any git repo that vendors POSIX symlinks or mixes an engine-level --quit flag with a script's own asynchronous completion signal.

