id: knowledge-candidate-id
title: Human readable knowledge candidate title
status: candidate | validating | promoted | rejected

knowledge_type:
  - implementation_fact | capability | interface_contract | runtime_rule | design_intent | architectural_principle | usage_pattern | known_pitfall | validation_rule | agency_boundary

summary: >
  What was learned and why it may matter beyond the current task.

observation:
  context: >
    What the agent or human was doing when this knowledge was discovered.
  details:
    - Concrete observed fact, correction, runtime behavior, or design explanation.

sources:
  repositories:
    - repository: hakoniwalab/component
      path: path/to/source-or-doc
      revision: main
  runtime_evidence:
    - description: Optional runtime, test, CI, log, screenshot, or generated-artifact evidence.
  expert_input:
    - source: developer-or-domain-expert
      statement: Optional concise explanation or correction.

confidence: low | medium | high

contradictions:
  - target: path/or/catalog-entry
    existing_claim: Existing understanding, if any.
    new_evidence: What appears to contradict or refine it.

validation:
  status: not_tested | partially_verified | verified | blocked
  required:
    - What still needs to be checked before promotion.
  notes:
    - Validation findings or remaining uncertainty.

promotion_targets:
  catalog:
    - component-id
  runtime_primer: false
  base_ecosystem_guide: false
  component_asset_guide: false
  recipes:
    - optional-recipe-or-pattern-id
  executable_guardrails:
    - repository: hakoniwalab/component
      kind: doctor | validator | test | ci
      path: optional/target/path
      mode: detect-only | detect-and-suggest-remediation
      notes:
        - Use when the validated knowledge can be checked reproducibly by software.
        - Prefer detection and explanation before automatic repair.

promotion_rationale:
  - Why the selected knowledge layer is appropriate.
  - Explain why an executable guardrail is or is not appropriate when the candidate contains a reusable runtime or validation rule.

resolution:
  promoted_to:
    - Optional path or Catalog entry after promotion.
  executable_guardrails:
    - Optional repository/path or PR after a machine-detectable rule is guarded.
  notes:
    - Final decision, rejection reason, or follow-up.
