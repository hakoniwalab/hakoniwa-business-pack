schema_version: 0.1
required_fields:
  - id
  - title
  - usecase_version
  - audience
  - situation
  - problem
  - desired_outcome
  - status
  - realized_by
  - supported_by
  - limitations
  - next_steps

controlled_fields:
  audience.primary:
    description: Stable audience identifiers used to search and group Usecases.
    values:
      - control-software-developer
      - demonstration-owner
      - development-team
      - manufacturing-engineering-team
      - robot-control-developer
      - robot-development-team
      - robot-system-integrator
      - technical-sales
    authoring_notes:
      - Reuse an existing value when it represents the same audience role.
      - Add a new value to this list before using it in a Usecase.
      - Prefer role-oriented identifiers over organization names or market segments.

status:
  feasibility:
    allowed:
      - feasible
      - partially_feasible
      - unknown
  validation:
    allowed:
      - verified
      - partially_verified
      - not_tested
      - blocked
  confidence:
    allowed:
      - high
      - medium
      - low

reference_rules:
  realized_by:
    target: recipes/examples/*.yaml
    notes:
      - Use an empty list when no Recipe exists.
  supported_by:
    target: catalog/components/*.yaml
    notes:
      - Every component ID must exist in the Catalog.

communication_rules:
  current_model: inline-usecase-guardrails
  notes:
    - communication_notes stores Usecase-specific safe and unsafe wording.
    - A future Claim layer may own reusable claims and restrictions.
    - When Claim IDs are introduced, retain inline notes only for context-specific boundaries and migrate reusable statements to claim_refs.

validation:
  command: ruby usecases/tools/validate_usecases.rb

authoring_rules:
  - Separate feasibility from validation.
  - A verified Recipe supports only the representative behavior and environment it records.
  - Do not infer customer outcomes such as lower cost, higher safety, or production readiness without evidence.
  - Do not describe local browser visualization as remote access unless networking and deployment are validated.
  - Commercial and private dependencies must remain explicit.
  - Missing Recipes and validation gaps belong in next_steps.
